<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>xstore</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#08090f;color:#eef0ff;min-height:100vh;overscroll-behavior:none;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{width:0}
button,a{font-family:inherit;cursor:pointer}
:root{
  --bg:#08090f;
  --g1:rgba(255,255,255,.045);--g2:rgba(255,255,255,.08);--g3:rgba(255,255,255,.13);
  --b:rgba(255,255,255,.07);--b2:rgba(255,255,255,.13);
  --gold:#f5a524;--gold2:#e8380d;--gg:linear-gradient(135deg,#f5a524,#e8380d);
  --green:#20c75a;--red:#f03e4d;--blue:#3b8ff3;
  --muted:rgba(238,240,255,.42);--muted2:rgba(238,240,255,.2);
  --r:16px;--r2:12px;--r3:8px;
  --blur:blur(24px);--blur2:blur(48px);
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 55% 45% at 5% 5%,rgba(0,120,212,.17) 0%,transparent 70%),
    radial-gradient(ellipse 45% 40% at 95% 10%,rgba(88,101,242,.13) 0%,transparent 70%),
    radial-gradient(ellipse 50% 45% at 85% 90%,rgba(16,185,129,.1) 0%,transparent 70%),
    radial-gradient(ellipse 40% 50% at 10% 85%,rgba(245,165,36,.08) 0%,transparent 70%),
    #08090f;
}
#app{position:relative;z-index:1;max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.page{flex:1;overflow-y:auto;padding-bottom:90px}

/* topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;background:transparent;border-bottom:1px solid var(--b);position:sticky;top:0;z-index:20}
.brand{font-size:22px;font-weight:800;letter-spacing:-.8px;background:linear-gradient(135deg,#fff,rgba(255,255,255,.7));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.brand-dot{background:var(--gg);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.cart-pill{display:flex;align-items:center;gap:7px;background:var(--g2);backdrop-filter:var(--blur);border:1px solid var(--b2);border-radius:100px;padding:8px 16px;font-size:13px;font-weight:600;color:#eef0ff;border:none;transition:background .2s}
.cart-pill:active{background:var(--g3)}
.cart-n{background:var(--gg);color:#fff;border-radius:100px;padding:1px 8px;font-size:11px;font-weight:800;display:none}
.cart-n.on{display:block}

/* hero */
.hero{margin:14px 16px 0;background:var(--g1);backdrop-filter:var(--blur2);border:1px solid var(--b);border-radius:var(--r);padding:20px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-50px;right:-50px;width:160px;height:160px;border-radius:50%;background:radial-gradient(rgba(245,165,36,.15),transparent 70%);pointer-events:none}
.sale-tag{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:1.8px;background:rgba(245,165,36,.1);border:1px solid rgba(245,165,36,.2);border-radius:100px;padding:3px 11px;margin-bottom:10px}
.hero-title{font-size:24px;font-weight:800;letter-spacing:-.5px;line-height:1.15;margin-bottom:6px}
.hero-title strong{background:var(--gg);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.5}
.timer{display:flex;gap:6px}
.tu{background:rgba(0,0,0,.3);border:1px solid var(--b);border-radius:var(--r3);padding:7px 10px;min-width:50px;text-align:center}
.tn{font-family:JetBrains Mono,monospace;font-size:20px;font-weight:600;color:var(--gold);line-height:1}
.tl{font-size:9px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.5px}

/* section */
.sec{display:flex;align-items:center;gap:10px;padding:20px 18px 10px}
.sec-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:2.5px;white-space:nowrap}
.sec-rule{flex:1;height:1px;background:var(--b)}

/* product card */
.card{margin:0 16px 12px;background:var(--g1);backdrop-filter:var(--blur2);border:1px solid var(--b);border-radius:var(--r);overflow:hidden;animation:up .4s ease both;transition:border-color .2s}
.card:nth-child(2){animation-delay:.07s}.card:nth-child(3){animation-delay:.14s}
.card:hover{border-color:var(--b2)}
.card-body{padding:18px}
.card-top{display:flex;align-items:flex-start;gap:14px;margin-bottom:14px}
.card-icon{width:52px;height:52px;border-radius:14px;background:var(--g2);border:1px solid var(--b);display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;overflow:hidden}
.card-icon::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.1),transparent 55%)}
.card-name{font-size:17px;font-weight:800;letter-spacing:-.3px;margin-bottom:4px}
.card-tag{font-size:12px;color:var(--muted);line-height:1.45}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 9px;border-radius:100px;letter-spacing:.3px;margin-top:6px}
.card-desc{font-size:13px;color:var(--muted);line-height:1.65;margin-bottom:14px}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.chip{display:inline-flex;align-items:center;gap:5px;background:rgba(0,0,0,.22);border:1px solid var(--b);border-radius:100px;padding:4px 11px;font-size:11px;color:var(--muted)}
.chip i{color:var(--green);font-size:9px}
.specs{background:rgba(0,0,0,.22);border:1px solid var(--b);border-radius:var(--r2);overflow:hidden;margin-bottom:14px}
.sp{display:flex;justify-content:space-between;align-items:center;padding:9px 13px;border-bottom:1px solid var(--b);font-size:12px}
.sp:last-child{border:none}
.sk{color:var(--muted)}
.sv{font-family:JetBrains Mono,monospace;font-size:11px}
.card-foot{padding:14px 18px;background:rgba(0,0,0,.2);border-top:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;gap:12px}
.p-was{font-size:11px;color:var(--muted2);text-decoration:line-through}
.p-now{font-size:26px;font-weight:800;font-family:JetBrains Mono,monospace;background:var(--gg);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-1.5px;line-height:1}
.p-off{display:inline-block;font-size:10px;font-weight:700;color:var(--gold);background:rgba(245,165,36,.1);border:1px solid rgba(245,165,36,.18);padding:2px 7px;border-radius:4px;margin-top:3px}
.card-actions{display:flex;gap:8px;flex-shrink:0}
.btn-ghost{background:var(--g2);border:1px solid var(--b2);color:var(--muted);padding:10px 12px;border-radius:var(--r2);font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;white-space:nowrap;text-decoration:none;transition:color .2s}
.btn-ghost:active{color:#eef0ff}
.btn-add{background:var(--gg);color:#fff;border:none;padding:10px 18px;border-radius:var(--r2);font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px;white-space:nowrap;transition:opacity .15s,transform .1s}
.btn-add:active{opacity:.82;transform:scale(.95)}
.btn-add.added{background:linear-gradient(135deg,var(--green),#16a869)}

/* cart bar */
.cartbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:20;padding:10px 16px calc(10px + env(safe-area-inset-bottom,0px));background:rgba(8,9,15,.9);backdrop-filter:var(--blur2);border-top:1px solid var(--b);display:none}
.cartbar.on{display:block}
.cartbar-btn{width:100%;padding:15px 20px;background:var(--gg);color:#fff;border:none;border-radius:var(--r2);font-size:15px;font-weight:800;display:flex;align-items:center;justify-content:space-between;transition:opacity .2s}
.cartbar-btn:active{opacity:.85}
.cartbar-btn .total{font-family:JetBrains Mono,monospace;font-weight:600}

/* overlay */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(6px);z-index:30;opacity:0;pointer-events:none;transition:opacity .3s}
#overlay.on{opacity:1;pointer-events:all}

/* sheet */
.sheet{position:fixed;bottom:0;left:50%;z-index:40;width:100%;max-width:480px;max-height:93vh;transform:translate(-50%,100%);transition:transform .38s cubic-bezier(.32,.72,0,1);background:rgba(9,10,18,.98);backdrop-filter:var(--blur2);border:1px solid var(--b);border-bottom:none;border-radius:22px 22px 0 0;display:flex;flex-direction:column}
.sheet.on{transform:translate(-50%,0)}
.handle{width:38px;height:4px;background:rgba(255,255,255,.14);border-radius:2px;margin:12px auto 0;flex-shrink:0}
.sh-head{padding:14px 20px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sh-title{font-size:18px;font-weight:800;letter-spacing:-.3px}
.sh-x{width:32px;height:32px;border-radius:50%;background:var(--g2);border:none;color:var(--muted);display:flex;align-items:center;justify-content:center;font-size:13px;transition:background .2s}
.sh-x:active{background:var(--g3)}
.sh-body{flex:1;overflow-y:auto;padding:18px 20px}
.sh-foot{padding:12px 20px calc(14px + env(safe-area-inset-bottom,0px));border-top:1px solid var(--b);background:rgba(0,0,0,.2);flex-shrink:0}

/* cart items */
.ci{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--b)}
.ci:last-child{border:none}
.ci-ico{width:42px;height:42px;border-radius:12px;background:var(--g2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ci-name{font-size:13px;font-weight:700}
.ci-price{font-size:12px;color:var(--muted);margin-top:2px}
.ci-ctrl{display:flex;align-items:center;gap:8px;margin-left:auto}
.qb{width:30px;height:30px;border-radius:var(--r3);background:var(--g2);border:none;color:#eef0ff;font-size:15px;display:flex;align-items:center;justify-content:center;transition:background .15s}
.qb:active{background:var(--g3)}
.qv{font-family:JetBrains Mono,monospace;font-size:14px;min-width:22px;text-align:center}
.rm{background:none;border:none;color:rgba(240,62,77,.65);padding:4px;font-size:13px}
.row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;font-size:13px}
.lbl{color:var(--muted)}
.row.big{font-size:18px;font-weight:800;border-top:1px solid var(--b);margin-top:8px;padding-top:14px}
.disc{color:var(--green)}
.empty{text-align:center;padding:50px 0;color:var(--muted)}
.empty i{font-size:44px;display:block;margin-bottom:12px;opacity:.25}

/* form */
.flabel{display:block;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;margin:15px 0 6px}
.finput{width:100%;padding:13px 15px;background:var(--g1);backdrop-filter:var(--blur);border:1px solid var(--b);border-radius:var(--r2);color:#eef0ff;font-family:inherit;font-size:14px;outline:none;transition:border-color .2s,background .2s}
.finput:focus{border-color:rgba(245,165,36,.45);background:var(--g2)}
.finput.err{border-color:rgba(240,62,77,.55)}
.finput::placeholder{color:var(--muted2)}
.ferr{color:var(--red);font-size:12px;margin-top:8px;display:none}

/* buttons */
.btn-p{width:100%;padding:15px;background:var(--gg);color:#fff;border:none;border-radius:var(--r2);font-size:15px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:9px;transition:opacity .2s,transform .1s}
.btn-p:active{opacity:.85;transform:scale(.98)}
.btn-p:disabled{opacity:.28;cursor:not-allowed}
.btn-s{width:100%;padding:13px;margin-top:9px;background:var(--g1);border:1px solid var(--b);color:#eef0ff;border-radius:var(--r2);font-size:14px;font-weight:600;transition:background .2s}
.btn-s:active{background:var(--g2)}

/* status */
.status{border-radius:var(--r2);padding:24px;text-align:center;margin:8px 0}
.s-wait{background:rgba(59,143,243,.06);border:1px solid rgba(59,143,243,.16)}
.s-ok  {background:rgba(32,199,90,.06); border:1px solid rgba(32,199,90,.16)}
.s-err {background:rgba(240,62,77,.06); border:1px solid rgba(240,62,77,.16)}
.s-ico{font-size:36px;margin-bottom:12px}
.s-ttl{font-size:17px;font-weight:800;margin-bottom:8px;letter-spacing:-.3px}
.s-msg{font-size:13px;color:var(--muted);line-height:1.65}
.s-wait .s-ico{color:var(--blue)}.s-ok .s-ico{color:var(--green)}.s-err .s-ico{color:var(--red)}

/* payment QR */
.amt-hero{text-align:center;margin-bottom:18px}
.amt-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
.amt-big{font-size:56px;font-weight:800;font-family:JetBrains Mono,monospace;background:var(--gg);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-3px;line-height:1}
.amt-cur{font-size:13px;color:var(--muted);margin-top:5px}
.qr-box{background:#fff;border-radius:18px;padding:18px;text-align:center;margin-bottom:16px;box-shadow:0 16px 64px rgba(0,0,0,.5)}
.qr-box img{width:100%;max-width:220px;height:auto;margin:0 auto;border-radius:10px;display:block}
.qr-merchant{font-size:14px;font-weight:700;color:#111;margin-top:12px}
.qr-bank{font-size:12px;color:#666;margin-top:2px}
.steps-box{background:rgba(0,0,0,.22);border:1px solid var(--b);border-radius:var(--r2);padding:16px;margin-bottom:14px}
.steps-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:12px}
.step{display:flex;align-items:center;gap:12px;font-size:13px;margin-bottom:10px}
.step:last-child{margin:0}
.sn{background:var(--gg);color:#fff;border-radius:50%;width:24px;height:24px;min-width:24px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800}
.auto-bar{display:flex;align-items:center;gap:12px;background:rgba(59,143,243,.06);border:1px solid rgba(59,143,243,.16);border-radius:var(--r2);padding:13px 16px}
.ab-text{flex:1}
.ab-title{font-size:13px;font-weight:700}
.ab-sub{font-size:11px;color:var(--muted);margin-top:2px}
.ab-secs{font-family:JetBrains Mono,monospace;font-size:12px;color:var(--muted)}
/* modern payment card */
.pay-card{background:var(--g1);border:1px solid var(--b);border-radius:20px;overflow:hidden;margin-bottom:14px}
.pay-card-top{padding:20px;text-align:center;background:linear-gradient(160deg,rgba(245,165,36,.08),rgba(232,56,13,.04))}
.pay-amount{font-size:48px;font-weight:800;font-family:JetBrains Mono,monospace;background:var(--gg);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-2px;line-height:1}
.pay-amount-sub{font-size:12px;color:var(--muted);margin-top:4px}
.pay-qr-wrap{background:#fff;margin:0 16px 16px;border-radius:14px;padding:14px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.pay-qr-wrap img{width:160px;height:160px;border-radius:8px;display:block;margin:0 auto}
.pay-qr-name{font-size:13px;font-weight:700;color:#111;margin-top:10px}
.pay-qr-bank{font-size:11px;color:#666;margin-top:2px}
.pay-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px 16px}
.pay-action-btn{display:flex;flex-direction:column;align-items:center;gap:5px;background:var(--g2);border:1px solid var(--b2);border-radius:var(--r2);padding:12px 8px;cursor:pointer;text-decoration:none;color:var(--muted);font-size:11px;font-weight:600;transition:background .2s,color .2s}
.pay-action-btn:active{background:var(--g3);color:#eef0ff}
.pay-action-btn i{font-size:18px}
.pay-action-btn.primary{color:var(--gold);border-color:rgba(245,165,36,.25);background:rgba(245,165,36,.07)}
.pay-action-btn.primary:active{background:rgba(245,165,36,.14)}
.pay-watching{display:flex;align-items:center;gap:10px;padding:12px 16px;border-top:1px solid var(--b);font-size:12px}
.pay-dot{width:8px;height:8px;border-radius:50%;background:var(--blue);animation:pulse 1.5s ease infinite;flex-shrink:0}
.pay-watching-txt{flex:1;color:var(--muted)}
.pay-watching-secs{font-family:JetBrains Mono,monospace;font-size:11px;color:var(--muted2)}

/* invoice */
.inv-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
.inv-brand{font-size:22px;font-weight:800;letter-spacing:-.8px}
.inv-brand span{background:var(--gg);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.inv-contact{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.7}
.inv-r{text-align:right;font-size:12px;color:var(--muted);line-height:1.9}
.inv-r strong{font-size:15px;color:#eef0ff;font-weight:800;display:block}
.inv-tbl{width:100%;border-collapse:collapse;font-size:12px;margin:12px 0}
.inv-tbl th{text-align:left;padding:9px 10px;background:rgba(0,0,0,.25);color:var(--muted);font-weight:600}
.inv-tbl th:last-child,.inv-tbl td:last-child{text-align:right}
.inv-tbl td{padding:10px;border-bottom:1px solid var(--b)}
.paid-tag{display:inline-flex;align-items:center;gap:6px;background:rgba(32,199,90,.08);border:1px solid rgba(32,199,90,.2);color:var(--green);padding:5px 14px;border-radius:100px;font-size:12px;font-weight:700;margin-top:12px}

/* license key spoiler */
.key-card{background:rgba(88,101,242,.05);border:1px dashed rgba(88,101,242,.25);border-radius:var(--r2);padding:18px;margin:16px 0}
.key-lbl{display:flex;align-items:center;gap:7px;font-size:10px;font-weight:700;color:#818cf8;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:12px}
.spoiler{position:relative;cursor:pointer;user-select:none;border-radius:var(--r3);overflow:hidden}
.spoiler-txt{font-family:JetBrains Mono,monospace;font-size:13px;word-break:break-all;line-height:1.8;padding:8px;filter:blur(7px);transition:filter .4s}
.spoiler-txt.show{filter:none}
.spoiler-mask{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(9,10,18,.5);backdrop-filter:blur(2px);border-radius:var(--r3);gap:7px;font-size:13px;font-weight:700;color:#818cf8;transition:opacity .3s}
.spoiler-mask.gone{opacity:0;pointer-events:none}
.copy-key{display:none;margin-top:10px;padding:9px 16px;background:rgba(88,101,242,.1);border:1px solid rgba(88,101,242,.2);color:#818cf8;border-radius:var(--r3);font-size:12px;font-weight:700;align-items:center;gap:6px;transition:background .2s}
.copy-key.on{display:inline-flex}
.copy-key:active{background:rgba(88,101,242,.2)}

/* toast */
#toast{position:fixed;top:68px;left:50%;transform:translateX(-50%) translateY(-12px);background:rgba(9,10,18,.98);backdrop-filter:var(--blur);border:1px solid var(--b2);color:#eef0ff;padding:9px 18px;border-radius:100px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;z-index:99}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
#toast i{color:var(--green)}

@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
.spin{animation:spin .75s linear infinite;display:inline-block}
.pulse{animation:pulse 1.6s ease infinite}
</style>
</head>
<body>
<div id="app">

  <header class="topbar">
    <div class="brand">x<span class="brand-dot">store</span></div>
    <button class="cart-pill" id="cartBtn">
      <i class="fas fa-bag-shopping" style="font-size:13px"></i>Cart
      <span class="cart-n" id="cartN">0</span>
    </button>
  </header>

  <div class="page">
    <div class="hero">
      <div class="sale-tag"><i class="fas fa-bolt"></i>Flash Sale</div>
      <div class="hero-title">Save <strong>50%</strong> on every<br>Microsoft license</div>
      <div class="hero-sub">Genuine keys · Instant Telegram delivery · All bank apps accepted</div>
      <div class="timer">
        <div class="tu"><div class="tn" id="tD">00</div><div class="tl">Days</div></div>
        <div class="tu"><div class="tn" id="tH">00</div><div class="tl">Hrs</div></div>

<div class="sheet" id="shInv">

</div>

<div id="toast"><i class="fas fa-check-circle"></i><span id="toastMsg"></span></div>

<script>
'use strict';
var WORKER  = 'https://xstore-notify.chamrong.workers.dev';
var DISC    = 50;
var MULT    = 0.5;
var SALE_MS = 24 * 60 * 60 * 1000;
var POLL_MAX= 10 * 60 * 1000;

var tg = window.Telegram && window.Telegram.WebApp;
if (tg) { try { tg.ready(); tg.expand(); tg.enableClosingConfirmation(); } catch(e) {} }
var buyerChatId = (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) ? tg.initDataUnsafe.user.id : null;

/* ── ICONS ─────────────────────────────────────── */
var ICONS = {
  win11:  '<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 88 88"><path d="M0 12.5 36 7.6l.1 35-36 .2zm40.5-5.5L88 0v42.5l-47.5.4zm-4.4 39.8.1 35L0 76V46.3zm4.4 0 47.5-.4V88l-47.5-6.6z" fill="#0078D4"/></svg>',
  office: '<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 100 100"><defs><linearGradient id="og" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#EB6C10"/><stop offset="100%" stop-color="#C43E1C"/></linearGradient></defs><rect x="4" y="4" width="92" height="92" rx="16" fill="url(#og)"/><text x="50" y="74" font-family="Arial Black" font-weight="900" font-size="60" fill="white" text-anchor="middle">W</text></svg>',
  m365:   '<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 100 100"><rect x="3" y="3" width="44" height="44" rx="7" fill="#F25022"/><rect x="53" y="3" width="44" height="44" rx="7" fill="#7FBA00"/><rect x="3" y="53" width="44" height="44" rx="7" fill="#00A4EF"/><rect x="53" y="53" width="44" height="44" rx="7" fill="#FFB900"/></svg>',
};

/* ── PRODUCTS ──────────────────────────────────── */
var PRODUCTS = [
  { id:101, icon:'win11',  name:'Windows 11 Pro',        badge:'Lifetime', bc:'#0078D4', price:20,
    tagline:'Most secure & intelligent Windows ever',
    desc:'Perpetual license. BitLocker, Remote Desktop, Hyper-V, Windows Hello, Copilot+ AI.',
    url:'https://www.microsoft.com/en-us/windows/compare-windows-11-home-vs-pro',
    chips:['BitLocker','Remote Desktop','Windows Hello','Hyper-V','Copilot+ AI'],
    specs:[{k:'License',v:'Perpetual'},{k:'Devices',v:'1 PC'},{k:'Delivery',v:'Key via Bot'}] },
  { id:202, icon:'office', name:'Office Pro Plus 2024',   badge:'One-Time', bc:'#D83B01', price:30,
    tagline:'Full Office suite — pay once, own forever',
    desc:'Word, Excel, PowerPoint, Outlook, Access, Publisher & OneNote. 100% offline.',
    url:'https://www.microsoft.com/en-us/microsoft-365/office/compare-office-products',
    chips:['Word & Excel','PowerPoint','Outlook','Access & Publisher','Offline Ready'],
    specs:[{k:'License',v:'Perpetual'},{k:'Devices',v:'1 PC'},{k:'Delivery',v:'Key via Bot'}] },
  { id:203, icon:'m365',   name:'Microsoft 365',          badge:'Monthly',  bc:'#0078D4', price:6,
    tagline:'Always up-to-date across all devices',
    desc:'All Office apps + 1TB OneDrive + Teams + Copilot AI. Win, Mac, iOS, Android.',
    url:'https://www.microsoft.com/en-us/microsoft-365/compare-microsoft-365-enterprise-plans',
    chips:['Word, Excel, PowerPoint','1TB OneDrive','Teams','Copilot AI','5 Devices'],
    specs:[{k:'License',v:'Monthly'},{k:'Devices',v:'Up to 5'},{k:'Storage',v:'1TB OneDrive'},{k:'Delivery',v:'Account via Bot'}] },
];

/* ── STATE ─────────────────────────────────────── */
var cart=[],order=null,pollTimer=null,pollStart=0;
var $=function(id){return document.getElementById(id);};
var cartTotal=function(){return cart.reduce(function(s,i){return s+i.price*MULT*i.qty;},0);};
var cartQty  =function(){return cart.reduce(function(s,i){return s+i.qty;},0);};

/* ── SYNC UI ───────────────────────────────────── */
function syncCart(){
  var q=cartQty(),t=cartTotal();
  $('cartN').textContent=q; $('cartN').classList.toggle('on',q>0);
  $('cartBar').classList.toggle('on',q>0); $('barTotal').textContent='$'+t.toFixed(2);
}

/* ── ADD TO CART ───────────────────────────────── */
function addToCart(id,btn){
  var p=PRODUCTS.find(function(x){return x.id===id;});
  var e=cart.find(function(x){return x.id===id;});
  if(e)e.qty++;else cart.push(Object.assign({},p,{qty:1}));
  syncCart(); toast(p.name+' added');
  if(btn){
    btn.classList.add('added'); btn.innerHTML='<i class="fas fa-check"></i> Added';
    setTimeout(function(){btn.classList.remove('added');btn.innerHTML='<i class="fas fa-cart-plus"></i> Add';},1700);
  }
}

/* ── RENDER PRODUCTS ───────────────────────────── */
function renderProducts(){
  var list=$('prodList');
  PRODUCTS.forEach(function(p){
    var disc=(p.price*MULT).toFixed(2),el=document.createElement('div');
    el.className='card';
    el.innerHTML=
      '<div class="card-body">'+
        '<div class="card-top">'+
          '<div class="card-icon">'+ICONS[p.icon]+'</div>'+
          '<div>'+
            '<div class="card-name">'+p.name+'</div>'+
            '<div class="card-tag">'+p.tagline+'</div>'+
            '<span class="badge" style="background:'+p.bc+'18;color:'+p.bc+';border:1px solid '+p.bc+'2e">'+p.badge+'</span>'+
          '</div>'+
        '</div>'+
        '<p class="card-desc">'+p.desc+'</p>'+
        '<div class="chips">'+p.chips.map(function(c){return'<span class="chip"><i class="fas fa-check"></i>'+c+'</span>';}).join('')+'</div>'+
        '<div class="specs">'+p.specs.map(function(s){return'<div class="sp"><span class="sk">'+s.k+'</span><span class="sv">'+s.v+'</span></div>';}).join('')+'</div>'+
      '</div>'+
      '<div class="card-foot">'+
        '<div>'+
          '<div class="p-was">$'+p.price.toFixed(2)+'</div>'+
          '<div class="p-now">$'+disc+'</div>'+
          '<span class="p-off">50% OFF</span>'+
        '</div>'+
        '<div class="card-actions">'+
          '<a class="btn-ghost" href="'+p.url+'" target="_blank" rel="noopener"><i class="fas fa-arrow-up-right-from-square"></i> Details</a>'+
          '<button class="btn-add" data-id="'+p.id+'"><i class="fas fa-cart-plus"></i> Add</button>'+
        '</div>'+
      '</div>';
    list.appendChild(el);
  });
  list.addEventListener('click',function(e){
    var btn=e.target.closest('.btn-add');
    if(btn)addToCart(parseInt(btn.dataset.id,10),btn);
  });
}

/* ── CART SHEET ────────────────────────────────── */
function renderCart(){
  var body=$('cartBody');
  if(!cart.length){
    body.innerHTML='<div class="empty"><i class="fas fa-bag-shopping"></i>Your cart is empty</div>';
    $('toCheckout').disabled=true;
  } else {
    $('toCheckout').disabled=false;
    body.innerHTML=cart.map(function(i){
      return'<div class="ci">'+
        '<div class="ci-ico">'+ICONS[i.icon]+'</div>'+
        '<div style="flex:1;min-width:0"><div class="ci-name">'+i.name+'</div><div class="ci-price">$'+(i.price*MULT).toFixed(2)+' each</div></div>'+
        '<div class="ci-ctrl">'+
          '<button class="qb" data-id="'+i.id+'" data-a="dec">&#8722;</button>'+
          '<span class="qv">'+i.qty+'</span>'+
          '<button class="qb" data-id="'+i.id+'" data-a="inc">+</button>'+
          '<button class="rm" data-id="'+i.id+'" data-a="rm"><i class="fas fa-trash-can"></i></button>'+
        '</div></div>';
    }).join('');
    body.querySelectorAll('[data-a]').forEach(function(b){
      b.onclick=function(){
        var id=parseInt(b.dataset.id,10),a=b.dataset.a;
        var item=cart.find(function(x){return x.id===id;});
        if(a==='inc')item.qty++;
        else if(a==='dec'){item.qty--;if(item.qty<=0)cart=cart.filter(function(x){return x.id!==id;});}
        else cart=cart.filter(function(x){return x.id!==id;});
        syncCart();renderCart();
      };
    });
  }
  var sub=cart.reduce(function(s,i){return s+i.price*i.qty;},0),tot=cartTotal();
  $('cartTotals').innerHTML=
    '<div class="row"><span class="lbl">Subtotal</span><span>$'+sub.toFixed(2)+'</span></div>'+
    '<div class="row"><span class="lbl">Discount ('+DISC+'%)</span><span class="disc">&#8722;$'+(sub-tot).toFixed(2)+'</span></div>'+
    '<div class="row big"><span>Total</span><span>$'+tot.toFixed(2)+'</span></div>';
}

/* ── CHECKOUT ──────────────────────────────────── */
function renderCoSum(){
  var tot=cartTotal(),sub=cart.reduce(function(s,i){return s+i.price*i.qty;},0);
  $('coSum').innerHTML=
    '<div style="background:rgba(0,0,0,.2);border:1px solid var(--b);border-radius:var(--r2);padding:14px 15px;margin-bottom:4px">'+
    cart.map(function(i){return'<div class="row"><span class="lbl">'+i.name+' &times;'+i.qty+'</span><span>$'+(i.price*MULT*i.qty).toFixed(2)+'</span></div>';}).join('')+
    '<div class="row"><span class="lbl">Discount</span><span class="disc">&#8722;$'+(sub-tot).toFixed(2)+'</span></div>'+
    '<div class="row big"><span>Total</span><span>$'+tot.toFixed(2)+'</span></div></div>';
}

function validPhone(p){return /^(?:\+855|0)[1-9]\d{7,8}$/.test(p.replace(/[\s\-().]/g,''));}
function validEmail(e){return !e.trim()||/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);}

function startPayment(){
  var name=$('fName').value.trim(),phone=$('fPhone').value.trim(),email=$('fEmail').value.trim();
  [$('fName'),$('fPhone'),$('fEmail')].forEach(function(el){el.classList.remove('err');});
  $('fErr').style.display='none';
  if(!name){$('fName').classList.add('err');$('fErr').textContent='Please enter your full name.';$('fErr').style.display='block';return;}
  if(!validPhone(phone)){$('fPhone').classList.add('err');$('fErr').textContent='Please enter a valid Cambodian phone number.';$('fErr').style.display='block';return;}
  if(!validEmail(email)){$('fEmail').classList.add('err');$('fErr').textContent='Please enter a valid email address.';$('fErr').style.display='block';return;}
  var now=new Date(),sub=cart.reduce(function(s,i){return s+i.price*i.qty;},0),tot=cartTotal();
  order={
    invoiceNumber:Math.floor(Math.random()*900000)+100000,
    issueDate:now.toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}),
    issueTime:now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}),
    subtotal:sub,discountAmount:sub-tot,total:tot,
    customerName:name,customerPhone:phone,customerEmail:email,
    items:cart.map(function(i){return Object.assign({},i);}),
    buyerChatId:buyerChatId,
  };
  closeSheet('shCheckout'); openSheet('shPay'); renderPayScreen(tot);
}

/* ── PAYMENT SCREEN ────────────────────────────── */
function renderPayScreen(total){
  $('payBody').innerHTML=
    '<div class="amt-hero">'+
      '<div class="amt-lbl">Generating KHQR</div>'+
      '<div class="amt-big">$'+total.toFixed(2)+'</div>'+
    '</div>'+
    '<div style="text-align:center;padding:48px 0">'+
      '<i class="fas fa-circle-notch spin" style="font-size:36px;color:var(--blue)"></i>'+
      '<div style="font-size:13px;color:var(--muted);margin-top:16px">Generating QR code&hellip;</div>'+
    '</div>';
  $('payFoot').innerHTML='<button class="btn-s" style="margin-top:0" id="cancelInit">Cancel</button>';
  $('cancelInit').onclick=function(){stopPolling();closeSheet('shPay');};

  fetch(WORKER+'/create-qr',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({invoiceNumber:order.invoiceNumber,amount:total}),
  })
  .then(function(r){return r.json();})
  .catch(function(e){return{error:e.message};})
  .then(function(qr){
    if(qr&&qr.success&&qr.qrString){showQR(total,qr);}
    else{
      $('payBody').innerHTML=
        '<div class="status s-err">'+
          '<div class="s-ico"><i class="fas fa-triangle-exclamation"></i></div>'+
          '<div class="s-ttl">Setup Required</div>'+
          '<div class="s-msg">Add <strong>BAKONG_TOKEN</strong> and <strong>BAKONG_ACCOUNT</strong> to Cloudflare Worker secrets.</div>'+
        '</div>';
    }
  });
}

function showQR(total, qr) {
  var imgUrl = qr.qrImage;

  $('payBody').innerHTML =
    /* ── Amount ── */
    '<div style="text-align:center;padding:24px 20px 16px;' +
      'background:linear-gradient(160deg,rgba(245,165,36,.12) 0%,rgba(232,56,13,.06) 100%);' +
      'border-radius:18px 18px 0 0">' +
      '<div style="font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px">Total to Pay</div>' +
      '<div style="font-size:52px;font-weight:800;font-family:JetBrains Mono,monospace;' +
        'background:var(--gg);-webkit-background-clip:text;-webkit-text-fill-color:transparent;' +
        'background-clip:text;letter-spacing:-2px;line-height:1">$' + total.toFixed(2) + '</div>' +
      '<div style="font-size:12px;color:var(--muted);margin-top:6px">USD &nbsp;&bull;&nbsp; Bakong KHQR &nbsp;&bull;&nbsp; All banks</div>' +
    '</div>' +
    /* ── QR — no background, fits cleanly ── */
    '<div style="padding:16px 28px 8px;text-align:center">' +
      '<div style="background:rgba(255,255,255,.96);border-radius:16px;padding:12px;display:inline-block;' +
        'box-shadow:0 4px 24px rgba(0,0,0,.35)">' +
        '<img src="' + imgUrl + '" alt="KHQR" id="qrImg" ' +
          'style="width:200px;height:200px;border-radius:8px;display:block">' +
      '</div>' +
    '</div>' +
    /* ── Save QR button ── */
    '<div style="padding:12px 20px 4px">' +
      '<button id="saveQrBtn" style="width:100%;display:flex;align-items:center;justify-content:center;gap:9px;' +
        'background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);' +
        'color:var(--muted);border-radius:var(--r2);padding:13px;' +
        'font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .2s">' +
        '<i class="fas fa-download" style="font-size:14px"></i>Save QR to Phone' +
      '</button>' +
    '</div>' +
    /* ── Watching strip ── */
    '<div style="display:flex;align-items:center;gap:10px;padding:14px 20px 18px">' +
      '<div style="width:7px;height:7px;border-radius:50%;background:var(--blue);flex-shrink:0;animation:pulse 1.5s ease infinite"></div>' +
      '<span style="flex:1;font-size:12px;color:var(--muted)">Watching for payment<span id="adots">.</span></span>' +
      '<span style="font-family:JetBrains Mono,monospace;font-size:11px;color:var(--muted2)" id="psecs">0s</span>' +
    '</div>';

  /* ── Save QR — Web Share API → native Save to Photos on iOS/Android ── */
  $('saveQrBtn').onclick = function () {
    var btn = $('saveQrBtn');
    btn.innerHTML = '<i class="fas fa-circle-notch spin" style="font-size:14px"></i> Preparing...';

    var img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = function () {
      var canvas = document.createElement('canvas');
      canvas.width  = img.naturalWidth  || 300;
      canvas.height = img.naturalHeight || 300;
      canvas.getContext('2d').drawImage(img, 0, 0);
      canvas.toBlob(function (blob) {
        btn.innerHTML = '<i class="fas fa-download" style="font-size:14px"></i> Save QR to Phone';
        var file = new File([blob], 'khqr-$' + total.toFixed(2) + '.png', { type: 'image/png' });
        if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
          navigator.share({ files: [file], title: 'KHQR $' + total.toFixed(2) + ' USD' })
            .then(function () { toast('QR saved!'); })
            .catch(function () {});
        } else {
          var url = URL.createObjectURL(blob);
          var a   = document.createElement('a');
          a.href = url; a.download = 'khqr.png';
          document.body.appendChild(a); a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          toast('QR downloaded!');
        }
      }, 'image/png');
    };
    img.onerror = function () {
      btn.innerHTML = '<i class="fas fa-download" style="font-size:14px"></i> Save QR to Phone';
      if (tg && tg.openLink) { tg.openLink(imgUrl); }
      else { window.open(imgUrl, '_blank'); }
    };
    img.src = imgUrl + (imgUrl.includes('?') ? '&' : '?') + 'cb=' + Date.now();
  };

  $('payFoot').innerHTML = '<button class="btn-s" style="margin-top:0" id="cancelPay">Cancel Payment</button>';
  $('cancelPay').onclick = function () { stopPolling(); closeSheet('shPay'); };
  startPolling(total);
}


/* ── POLLING ───────────────────────────────────── */
function startPolling(total){
  stopPolling(); pollStart=Date.now();
  var dots=0,secs=0;
  var dT=setInterval(function(){var el=$('adots');if(el)el.textContent='.'.repeat((dots++%3)+1);},500);
  var sT=setInterval(function(){var el=$('psecs');if(el)el.textContent=(++secs)+'s';},1000);
  pollTimer=setInterval(function(){
    if(Date.now()-pollStart>=POLL_MAX){
      stopPolling();clearInterval(dT);clearInterval(sT);
      $('payBody').innerHTML=
        '<div class="amt-hero"><div class="amt-lbl">Timed out</div><div class="amt-big">$'+(total||order.total).toFixed(2)+'</div></div>'+
        '<div class="status s-err"><div class="s-ico"><i class="fas fa-clock"></i></div><div class="s-ttl">No Payment Detected</div>'+
        '<div class="s-msg">10 minutes passed. If you paid, contact <strong>@chamrong_vann</strong>.</div></div>';
      $('payFoot').innerHTML='<button class="btn-p" id="retryBtn"><i class="fas fa-rotate-right"></i>Try Again</button>';
      $('retryBtn').onclick=function(){renderPayScreen(order.total);};
      return;
    }
    fetch(WORKER+'/verify?invoice='+order.invoiceNumber+'&amount='+order.total.toFixed(2))
      .then(function(r){return r.json();})
      .then(function(d){if(d.verified){stopPolling();clearInterval(dT);clearInterval(sT);onVerified(d);}})
      .catch(function(){});
  },4000);
}
function stopPolling(){if(pollTimer){clearInterval(pollTimer);pollTimer=null;}}

/* ── ON VERIFIED ───────────────────────────────── */
function onVerified(v){
  $('payBody').innerHTML=
    '<div class="status s-ok">'+
      '<div class="s-ico"><i class="fas fa-circle-check"></i></div>'+
      '<div class="s-ttl">Payment Confirmed!</div>'+
      '<div class="s-msg">$'+order.total.toFixed(2)+' USD received<br><span class="pulse">Generating invoice &amp; releasing key&hellip;</span></div>'+
    '</div>';
  $('payFoot').innerHTML='';
  fetch(WORKER+'/notify',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({text:adminMsg(order,v),order:order,verifyData:v})
  }).catch(function(){});
  setTimeout(function(){closeSheet('shPay');showInvoice(order,v);cart=[];syncCart();order=null;},2000);
}

/* ── INVOICE ───────────────────────────────────── */
function showInvoice(o,v){
  $('invBody').innerHTML=
    '<div class="inv-hd">'+

    (v.transaction_hash?'<div style="font-size:11px;color:var(--muted);margin-top:7px">Tx: '+v.transaction_hash+'</div>':'')+

  return '\u2705 *New Order \u2014 xstore*\n\n'+

/* ── SHEETS ────────────────────────────────────── */
var SHEETS=['shCart','shCheckout','shPay','shInv'];
function openSheet(id){$('overlay').classList.add('on');$(id).classList.add('on');if(tg){try{tg.BackButton.show();}catch(e){}}}
function closeSheet(id){$(id).classList.remove('on');if(!SHEETS.some(function(s){return $(s).classList.contains('on');})){$('overlay').classList.remove('on');if(tg){try{tg.BackButton.hide();}catch(e){}}}}
function closeAll(){SHEETS.forEach(function(s){$(s).classList.remove('on');});$('overlay').classList.remove('on');if(tg){try{tg.BackButton.hide();}catch(e){}}}

/* ── TOAST ─────────────────────────────────────── */
var tT;
function toast(msg){$('toastMsg').textContent=msg;$('toast').classList.add('on');clearTimeout(tT);tT=setTimeout(function(){$('toast').classList.remove('on');},2300);}

/* ── COUNTDOWN ─────────────────────────────────── */
function startCountdown(){
  var end=parseInt(localStorage.getItem('xsale')||'0',10);
  if(!end||Date.now()>end){end=Date.now()+SALE_MS;localStorage.setItem('xsale',end);}
  function tick(){
    var d=end-Date.now();
    if(d<0){localStorage.removeItem('xsale');startCountdown();return;}
    $('tD').textContent=String(Math.floor(d/86400000)).padStart(2,'0');
    $('tH').textContent=String(Math.floor(d%86400000/3600000)).padStart(2,'0');
    $('tM').textContent=String(Math.floor(d%3600000/60000)).padStart(2,'0');
    $('tS').textContent=String(Math.floor(d%60000/1000)).padStart(2,'0');
  }
  tick();setInterval(tick,1000);
}

/* ── EVENTS ────────────────────────────────────── */
$('cartBtn').onclick    =function(){renderCart();openSheet('shCart');};
$('cartBarBtn').onclick =function(){renderCart();openSheet('shCart');};
$('cartX').onclick      =function(){closeSheet('shCart');};
$('cartContinue').onclick=function(){closeSheet('shCart');};
$('coX').onclick        =function(){closeSheet('shCheckout');};
$('invX').onclick       =function(){closeSheet('shInv');};
$('doneBtn').onclick    =closeAll;
$('toCheckout').onclick =function(){renderCoSum();closeSheet('shCart');openSheet('shCheckout');};
$('backCart').onclick   =function(){closeSheet('shCheckout');renderCart();openSheet('shCart');};
$('payBtn').onclick     =startPayment;
$('overlay').onclick    =function(e){if(e.target===$('overlay')&&!$('shPay').classList.contains('on'))closeAll();};
if(tg){try{tg.BackButton.onClick(function(){var r=SHEETS.slice().reverse();for(var i=0;i<r.length;i++){if($(r[i]).classList.contains('on')){closeSheet(r[i]);return;}}});}catch(e){}}

renderProducts();
startCountdown();
</script>
