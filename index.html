<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>xstore</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* ━━━ TOKENS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
:root {
  --bg0:      #050810;
  --bg1:      #080c18;
  --glass:    rgba(255,255,255,0.055);
  --glass2:   rgba(255,255,255,0.09);
  --glassbdr: rgba(255,255,255,0.1);
  --glassbdr2:rgba(255,255,255,0.18);
  --blur:     blur(24px);
  --blur2:    blur(40px);
  --gold:     #f5a623;
  --gold2:    #ff7730;
  --goldglow: rgba(245,166,35,0.35);
  --green:    #2dd480;
  --red:      #ff5f70;
  --blue:     #5b9cf6;
  --violet:   #a78bfa;
  --text:     #f0f2ff;
  --muted:    rgba(240,242,255,0.45);
  --muted2:   rgba(240,242,255,0.25);
  --r:        18px;
  --r2:       12px;
  --r3:       8px;
  font-size: 15px;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0 }
html, body {
  height:100%; font-family:'Outfit',sans-serif;
  background:var(--bg0); color:var(--text);
  overscroll-behavior:none; -webkit-tap-highlight-color:transparent;
}
::-webkit-scrollbar { width:0 }

/* ━━━ AURORA BACKGROUND ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.aurora {
  position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none;
}
.orb {
  position:absolute; border-radius:50%;
  filter:blur(80px); opacity:.55; animation:drift 18s ease-in-out infinite alternate;
}
.orb1 { width:420px; height:420px; background:radial-gradient(circle,#1a3a8f 0%,transparent 70%); top:-100px; left:-80px; animation-duration:20s; }
.orb2 { width:340px; height:340px; background:radial-gradient(circle,#6b21a8 0%,transparent 70%); top:30%; right:-80px; animation-duration:25s; animation-delay:-8s; }
.orb3 { width:300px; height:300px; background:radial-gradient(circle,#0e4f3a 0%,transparent 70%); bottom:-80px; left:20%; animation-duration:22s; animation-delay:-14s; }
.orb4 { width:200px; height:200px; background:radial-gradient(circle,rgba(245,166,35,.3) 0%,transparent 70%); top:60%; left:10%; animation-duration:16s; animation-delay:-5s; }
@keyframes drift {
  from { transform:translate(0,0) scale(1); }
  to   { transform:translate(30px,20px) scale(1.1); }
}
.grain {
  position:fixed; inset:0; z-index:1; pointer-events:none; opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* ━━━ LAYOUT ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
#app { position:relative; z-index:2; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
.scroll { flex:1; overflow-y:auto; padding:0 14px 110px; }

/* ━━━ TOPBAR ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.topbar {
  padding:14px 16px; display:flex; align-items:center; justify-content:space-between;
  background:rgba(5,8,16,0.6); backdrop-filter:var(--blur);
  border-bottom:1px solid var(--glassbdr); flex-shrink:0;
}
.logo { font-size:22px; font-weight:800; letter-spacing:-1px; }
.logo-x { color:var(--gold); }
.logo-store { color:var(--text); }
.cart-btn {
  display:flex; align-items:center; gap:8px;
  background:var(--glass2); backdrop-filter:var(--blur);
  border:1px solid var(--glassbdr2); border-radius:100px;
  padding:8px 16px; font-size:13px; font-weight:600; cursor:pointer;
  color:var(--text); transition:all .2s; font-family:'Outfit',sans-serif;
}
.cart-btn:active { background:rgba(255,255,255,.14); transform:scale(.97); }
.cart-count {
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#000; border-radius:100px; padding:1px 8px;
  font-size:11px; font-weight:800; display:none;
}
.cart-count.on { display:block; }

/* ━━━ SALE BANNER ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.sale-banner {
  margin:12px 14px;
  background:linear-gradient(135deg,rgba(245,166,35,.1),rgba(255,119,48,.06));
  backdrop-filter:var(--blur);
  border:1px solid rgba(245,166,35,.2);
  border-radius:var(--r); padding:16px;
  position:relative; overflow:hidden;
}
.sale-banner::before {
  content:''; position:absolute; top:-30px; right:-30px;
  width:120px; height:120px; border-radius:50%;
  background:radial-gradient(circle,rgba(245,166,35,.15) 0%,transparent 70%);
}
.sale-top { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
.sale-left {}
.sale-pill {
  display:inline-flex; align-items:center; gap:5px;
  font-size:10px; font-weight:700; color:var(--gold); text-transform:uppercase; letter-spacing:1.5px;
  background:rgba(245,166,35,.1); border:1px solid rgba(245,166,35,.2);
  border-radius:100px; padding:3px 10px; margin-bottom:6px;
}
.sale-title { font-size:22px; font-weight:800; letter-spacing:-.5px; line-height:1.1; }
.sale-title em { color:var(--gold); font-style:normal; }
.timer { display:flex; gap:6px; margin-top:10px; }
.tu {
  background:rgba(255,255,255,.06); border:1px solid var(--glassbdr);
  border-radius:var(--r3); padding:6px 10px; text-align:center; min-width:46px;
}
.tn { font-family:'JetBrains Mono',monospace; font-size:18px; font-weight:600; line-height:1; }
.tl { font-size:9px; color:var(--muted); margin-top:2px; text-transform:uppercase; letter-spacing:.5px; }

/* ━━━ SECTION LABEL ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.section-label {
  font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase;
  letter-spacing:2px; margin:20px 2px 12px;
}

/* ━━━ PRODUCT CARD ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.pcard {
  background:var(--glass); backdrop-filter:var(--blur2);
  border:1px solid var(--glassbdr); border-radius:var(--r);
  margin-bottom:12px; overflow:hidden;
  animation:fadeup .5s ease both; transition:border-color .25s;
}
.pcard:hover { border-color:var(--glassbdr2); }
.pcard-body { padding:18px }
.pcard-top { display:flex; gap:14px; align-items:flex-start; margin-bottom:14px; }
.pcard-icon {
  width:54px; height:54px; border-radius:var(--r2);
  background:rgba(255,255,255,.07); border:1px solid var(--glassbdr);
  display:flex; align-items:center; justify-content:center;
  font-size:26px; flex-shrink:0;
}
.pcard-info { flex:1; min-width:0; }
.pcard-name { font-size:17px; font-weight:700; letter-spacing:-.3px; margin-bottom:5px; }
.badge {
  display:inline-block; font-size:10px; font-weight:700;
  padding:3px 9px; border-radius:100px; letter-spacing:.3px;
}
.pcard-tagline { font-size:12px; color:var(--muted); margin-top:5px; line-height:1.5; }
.pcard-desc { font-size:13px; color:var(--muted); line-height:1.65; margin-bottom:14px; }

/* chips */
.chips { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px; }
.chip {
  background:rgba(255,255,255,.055); border:1px solid var(--glassbdr);
  border-radius:100px; padding:4px 11px; font-size:11px; font-weight:500;
  display:flex; align-items:center; gap:5px; color:var(--muted);
}
.chip i { color:var(--green); font-size:9px; }

/* specs */
.specs {
  background:rgba(0,0,0,.25); border:1px solid var(--glassbdr);
  border-radius:var(--r2); overflow:hidden; margin-bottom:14px;
}
.spec-row {
  display:flex; justify-content:space-between; align-items:center;
  padding:10px 14px; border-bottom:1px solid var(--glassbdr); font-size:12px;
}
.spec-row:last-child { border:none; }
.sk { color:var(--muted); }
.sv { font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:500; }

/* compare */
.cmp-toggle {
  display:flex; align-items:center; gap:8px; font-size:12px;
  font-weight:600; color:var(--muted); cursor:pointer; padding:10px 0;
  border-top:1px solid var(--glassbdr); user-select:none;
}
.cmp-toggle .icon { color:var(--gold); }
.caret { margin-left:auto; font-size:10px; transition:transform .25s; }
.cmp-body { display:none; padding-bottom:4px; }
.cmp-body.open { display:block; }
.cmp-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:10px; }
.cmp-head { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; margin-bottom:7px; }
.cmp-item { font-size:11px; color:var(--muted); margin-bottom:4px; line-height:1.4; }

/* card footer */
.pcard-foot {
  padding:14px 18px; background:rgba(0,0,0,.2);
  border-top:1px solid var(--glassbdr);
  display:flex; align-items:center; justify-content:space-between; gap:12px;
}
.price-wrap {}
.p-old { font-size:12px; color:var(--muted2); text-decoration:line-through; }
.p-new { font-size:24px; font-weight:800; font-family:'JetBrains Mono',monospace; color:var(--gold); letter-spacing:-1px; line-height:1; }
.p-off {
  display:inline-block; font-size:10px; font-weight:700;
  background:rgba(245,166,35,.12); border:1px solid rgba(245,166,35,.2);
  color:var(--gold); padding:2px 7px; border-radius:4px; margin-top:4px;
}
.card-btns { display:flex; gap:8px; align-items:center; }
.btn-info {
  background:rgba(255,255,255,.07); border:1px solid var(--glassbdr2);
  color:var(--muted); padding:10px 13px; border-radius:var(--r2);
  font-size:12px; font-weight:600; text-decoration:none;
  font-family:'Outfit',sans-serif; display:flex; align-items:center; gap:6px;
  white-space:nowrap; transition:color .2s, border-color .2s;
}
.btn-info:active { color:var(--text); }
.btn-add {
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#000; border:none; padding:10px 18px; border-radius:var(--r2);
  font-size:13px; font-weight:700; font-family:'Outfit',sans-serif;
  cursor:pointer; display:flex; align-items:center; gap:7px;
  white-space:nowrap; transition:all .15s; position:relative; overflow:hidden;
}
.btn-add::after {
  content:''; position:absolute; inset:0;
  background:rgba(255,255,255,0); transition:background .15s;
}
.btn-add:active::after { background:rgba(255,255,255,.2); }
.btn-add:active { transform:scale(.95); }
.btn-add.added { background:linear-gradient(135deg,var(--green),#16a869); color:#000; }

/* ━━━ CART BAR ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.cart-bar {
  position:fixed; bottom:0; left:0; right:0; z-index:30;
  padding:12px 14px calc(12px + env(safe-area-inset-bottom));
  background:rgba(5,8,16,.85); backdrop-filter:var(--blur2);
  border-top:1px solid var(--glassbdr); display:none;
}
.cart-bar.on { display:block; }
.cartbar-btn {
  width:100%; padding:16px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#000; border:none; border-radius:var(--r2);
  font-size:15px; font-weight:800; font-family:'Outfit',sans-serif;
  cursor:pointer; display:flex; align-items:center; justify-content:space-between;
  transition:opacity .2s;
}
.cartbar-btn:active { opacity:.85; }
.cartbar-btn span { font-family:'JetBrains Mono',monospace; font-weight:600; }

/* ━━━ OVERLAY ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.65);
  backdrop-filter:blur(4px); z-index:40;
  opacity:0; pointer-events:none; transition:opacity .3s;
}
.overlay.on { opacity:1; pointer-events:all; }

/* ━━━ BOTTOM SHEET ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.sheet {
  position:fixed; bottom:0; left:0; right:0; z-index:50;
  background:rgba(8,12,24,.95); backdrop-filter:var(--blur2);
  border:1px solid var(--glassbdr); border-bottom:none;
  border-radius:24px 24px 0 0;
  transform:translateY(100%);
  transition:transform .38s cubic-bezier(.32,.72,0,1);
  max-height:92vh; display:flex; flex-direction:column;
}
.sheet.on { transform:translateY(0); }
.sheet-pill {
  width:38px; height:4px; background:rgba(255,255,255,.15);
  border-radius:2px; margin:12px auto 0;
}
.sheet-head {
  padding:14px 20px; border-bottom:1px solid var(--glassbdr);
  display:flex; align-items:center; justify-content:space-between;
}
.sheet-title { font-size:18px; font-weight:700; }
.sheet-close {
  width:32px; height:32px; border-radius:50%;
  background:rgba(255,255,255,.08); border:1px solid var(--glassbdr);
  color:var(--muted); display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:13px; transition:background .2s;
}
.sheet-close:active { background:rgba(255,255,255,.14); }
.sheet-body { flex:1; overflow-y:auto; padding:18px 20px; }
.sheet-foot {
  padding:12px 20px calc(16px + env(safe-area-inset-bottom));
  border-top:1px solid var(--glassbdr);
  background:rgba(0,0,0,.2);
}

/* ━━━ CART ITEMS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.ci {
  display:flex; align-items:center; gap:12px;
  padding:13px 0; border-bottom:1px solid var(--glassbdr);
}
.ci:last-child { border:none; }
.ci-ico {
  width:40px; height:40px; border-radius:var(--r3);
  background:rgba(255,255,255,.07); display:flex; align-items:center;
  justify-content:center; font-size:19px; flex-shrink:0;
}
.ci-info { flex:1; min-width:0; }
.ci-name { font-size:13px; font-weight:600; }
.ci-price { font-size:12px; color:var(--muted); margin-top:2px; }
.ci-ctrl { display:flex; align-items:center; gap:8px; }
.qb {
  width:30px; height:30px; border-radius:var(--r3);
  background:rgba(255,255,255,.07); border:1px solid var(--glassbdr);
  color:var(--text); font-size:14px; display:flex; align-items:center;
  justify-content:center; cursor:pointer; transition:background .15s;
}
.qb:active { background:rgba(255,255,255,.15); }
.qv { font-family:'JetBrains Mono',monospace; font-size:14px; min-width:22px; text-align:center; }
.rm-btn { background:none; border:none; color:rgba(255,87,112,.7); cursor:pointer; padding:4px; font-size:13px; }

/* ━━━ ORDER SUMMARY ROWS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.orow { display:flex; justify-content:space-between; align-items:center; padding:7px 0; font-size:13px; }
.orow .lbl { color:var(--muted); }
.orow.total {
  font-size:18px; font-weight:700; margin-top:8px;
  border-top:1px solid var(--glassbdr); padding-top:14px;
}
.disc-val { color:var(--green); }

/* ━━━ FORM ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.flabel {
  display:block; font-size:11px; font-weight:700; color:var(--muted);
  text-transform:uppercase; letter-spacing:1px; margin:16px 0 7px;
}
.finput {
  width:100%; padding:14px 16px;
  background:rgba(255,255,255,.06); backdrop-filter:var(--blur);
  border:1px solid var(--glassbdr); border-radius:var(--r2);
  color:var(--text); font-family:'Outfit',sans-serif; font-size:14px;
  outline:none; transition:border-color .2s, background .2s;
}
.finput:focus { border-color:rgba(245,166,35,.5); background:rgba(255,255,255,.08); }
.finput.err { border-color:rgba(255,95,112,.6); }
.finput::placeholder { color:var(--muted2); }
.f-err { color:var(--red); font-size:12px; margin-top:9px; display:none; }

/* ━━━ BUTTONS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.btn-primary {
  width:100%; padding:16px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#000; border:none; border-radius:var(--r2);
  font-size:15px; font-weight:800; font-family:'Outfit',sans-serif;
  cursor:pointer; transition:opacity .2s, transform .1s;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.btn-primary:active { opacity:.85; transform:scale(.98); }
.btn-primary:disabled { opacity:.3; cursor:not-allowed; }
.btn-ghost {
  width:100%; padding:14px; margin-top:9px;
  background:rgba(255,255,255,.06); border:1px solid var(--glassbdr);
  color:var(--text); border-radius:var(--r2);
  font-size:14px; font-weight:600; font-family:'Outfit',sans-serif; cursor:pointer;
  transition:background .2s;
}
.btn-ghost:active { background:rgba(255,255,255,.1); }

/* ━━━ STATUS CARDS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.status {
  border-radius:var(--r2); padding:22px; text-align:center; margin:8px 0;
}
.status.wait  { background:rgba(91,156,246,.08); border:1px solid rgba(91,156,246,.18); }
.status.ok    { background:rgba(45,212,128,.08); border:1px solid rgba(45,212,128,.18); }
.status.fail  { background:rgba(255,95,112,.08); border:1px solid rgba(255,95,112,.18); }
.st-ico { font-size:34px; margin-bottom:12px; }
.st-title { font-size:17px; font-weight:700; margin-bottom:7px; }
.st-msg { font-size:13px; color:var(--muted); line-height:1.6; }
.status.wait .st-ico { color:var(--blue); }
.status.ok   .st-ico { color:var(--green); }
.status.fail .st-ico { color:var(--red); }
.prog { width:100%; height:3px; background:rgba(255,255,255,.07); border-radius:2px; overflow:hidden; margin-top:12px; }
.prog-fill { height:100%; width:0%; background:linear-gradient(90deg,var(--gold),var(--gold2)); transition:width 1s linear; }

/* ━━━ QR PAYMENT ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.amt-block { text-align:center; margin-bottom:18px; }
.amt-lbl { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:8px; }
.amt-val {
  font-size:58px; font-weight:800; font-family:'JetBrains Mono',monospace;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text; letter-spacing:-2px; line-height:1;
}
.amt-usd { font-size:14px; color:var(--muted); margin-top:5px; }
.qr-frame {
  background:#fff; border-radius:20px; padding:18px;
  text-align:center; margin-bottom:16px;
  box-shadow:0 8px 40px rgba(0,0,0,.4);
}
.qr-frame img { width:100%; max-width:220px; height:auto; display:block; margin:0 auto; border-radius:10px; }
.qr-merchant { font-size:14px; font-weight:700; color:#111; margin-top:12px; }
.qr-bank { font-size:12px; color:#666; margin-top:2px; }
.pay-steps {
  background:rgba(255,255,255,.04); border:1px solid var(--glassbdr);
  border-radius:var(--r2); padding:16px; margin-bottom:14px;
}
.pay-steps-label { font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:12px; }
.step { display:flex; align-items:center; gap:12px; font-size:13px; margin-bottom:10px; }
.step:last-child { margin:0; }
.snum {
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#000; border-radius:50%; width:24px; height:24px;
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:800; flex-shrink:0;
}
.warn-box {
  background:rgba(245,166,35,.07); border:1px solid rgba(245,166,35,.18);
  border-radius:var(--r2); padding:12px 14px;
  display:flex; gap:10px; align-items:center;
  font-size:12px; color:var(--muted); line-height:1.5; margin-bottom:14px;
}
.warn-box i { color:var(--gold); flex-shrink:0; font-size:14px; }

/* ━━━ INVOICE ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.inv-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:18px; }
.inv-brand { font-size:26px; font-weight:800; letter-spacing:-1px; }
.inv-brand span { color:var(--gold); }
.inv-contact { font-size:11px; color:var(--muted); margin-top:3px; line-height:1.7; }
.inv-right { text-align:right; font-size:12px; color:var(--muted); line-height:1.8; }
.inv-right strong { font-size:16px; color:var(--text); font-weight:700; }
.inv-sec { margin:14px 0; }
.inv-sec-label { font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
.inv-sec-val { font-size:13px; line-height:1.7; }
.inv-table { width:100%; border-collapse:collapse; font-size:12px; margin:12px 0; }
.inv-table th { text-align:left; padding:9px 10px; background:rgba(255,255,255,.05); color:var(--muted); font-weight:600; }
.inv-table th:last-child, .inv-table td:last-child { text-align:right; }
.inv-table td { padding:10px; border-bottom:1px solid var(--glassbdr); }
.paid-pill {
  display:inline-flex; align-items:center; gap:6px;
  background:rgba(45,212,128,.1); border:1px solid rgba(45,212,128,.25);
  color:var(--green); padding:5px 14px; border-radius:100px;
  font-size:12px; font-weight:700; margin-top:12px;
}

/* ━━━ LICENSE KEY / SPOILER ━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.key-box {
  background:rgba(245,166,35,.06); border:1px dashed rgba(245,166,35,.25);
  border-radius:var(--r2); padding:18px; margin:16px 0;
}
.key-box-label {
  display:flex; align-items:center; gap:7px;
  font-size:11px; font-weight:700; color:var(--gold); text-transform:uppercase;
  letter-spacing:1px; margin-bottom:12px;
}
.spoiler-wrap { position:relative; cursor:pointer; user-select:none; border-radius:var(--r3); overflow:hidden; }
.spoiler-text {
  font-family:'JetBrains Mono',monospace; font-size:13px; word-break:break-all;
  line-height:1.8; filter:blur(7px); transition:filter .4s cubic-bezier(.22,.68,0,1.2);
  color:var(--text); padding:8px;
}
.spoiler-text.open { filter:none; }
.spoiler-mask {
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  background:rgba(8,12,24,.5); backdrop-filter:blur(2px);
  border-radius:var(--r3); gap:7px; font-size:13px; font-weight:600; color:var(--gold);
  transition:opacity .3s;
}
.spoiler-mask.gone { opacity:0; pointer-events:none; }
.copy-key-btn {
  display:none; margin-top:10px; padding:9px 16px;
  background:rgba(245,166,35,.1); border:1px solid rgba(245,166,35,.2);
  color:var(--gold); border-radius:var(--r3);
  font-size:12px; font-weight:700; cursor:pointer; font-family:'Outfit',sans-serif;
  transition:background .2s;
}
.copy-key-btn.on { display:inline-flex; align-items:center; gap:6px; }
.copy-key-btn:active { background:rgba(245,166,35,.2); }

/* ━━━ TOAST ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
#toast {
  position:fixed; top:72px; left:50%; transform:translateX(-50%) translateY(-14px);
  background:rgba(12,16,28,.95); backdrop-filter:var(--blur);
  border:1px solid var(--glassbdr2); color:var(--text);
  padding:10px 18px; border-radius:100px; font-size:13px; font-weight:600;
  display:flex; align-items:center; gap:8px;
  opacity:0; transition:all .28s; pointer-events:none; white-space:nowrap; z-index:999;
}
#toast.on { opacity:1; transform:translateX(-50%) translateY(0); }
#toast i { color:var(--green); }

/* ━━━ EMPTY STATE ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.empty { text-align:center; padding:50px 0; color:var(--muted); }
.empty i { font-size:46px; display:block; margin-bottom:12px; opacity:.3; }

/* ━━━ ANIMATIONS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
@keyframes fadeup { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
@keyframes spin    { to { transform:rotate(360deg); } }
@keyframes pulse   { 0%,100% { opacity:1; } 50% { opacity:.5; } }
.spin    { animation:spin .75s linear infinite; display:inline-block; }
.pulse   { animation:pulse 1.5s ease infinite; }
</style>
</head>
<body>

<!-- AURORA BACKGROUND -->
<div class="aurora">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="orb orb4"></div>
</div>
<div class="grain"></div>

<!-- ═══════════════════════════════════════════ APP -->
<div id="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="logo"><span class="logo-x">x</span><span class="logo-store">store</span></div>
    <button class="cart-btn" id="cartBtn">
      <i class="fas fa-bag-shopping" style="font-size:13px"></i>
      Cart
      <span class="cart-count" id="cartCount">0</span>
    </button>
  </div>

  <!-- SCROLL CONTENT -->
  <div class="scroll">

    <!-- Sale Banner -->
    <div class="sale-banner">
      <div class="sale-top">
        <div class="sale-left">
          <div class="sale-pill"><i class="fas fa-bolt"></i> Flash Sale</div>
          <div class="sale-title">Save <em>50%</em><br>on all licenses</div>
          <div class="timer">
            <div class="tu"><div class="tn" id="tD">00</div><div class="tl">d</div></div>
            <div class="tu"><div class="tn" id="tH">00</div><div class="tl">h</div></div>
            <div class="tu"><div class="tn" id="tM">00</div><div class="tl">m</div></div>
            <div class="tu"><div class="tn" id="tS">00</div><div class="tl">s</div></div>
          </div>
        </div>
      </div>
    </div>

    <div class="section-label">Available Licenses</div>
    <div id="productList"></div>

  </div><!-- /scroll -->

  <!-- Cart Bar -->
  <div class="cart-bar" id="cartBar">
    <button class="cartbar-btn" id="cartBarBtn">
      <span style="display:flex;align-items:center;gap:9px"><i class="fas fa-bag-shopping"></i>View Cart</span>
      <span id="barTotal">$0.00</span>
    </button>
  </div>

</div><!-- /app -->

<!-- OVERLAY -->
<div class="overlay" id="overlay"></div>

<!-- ═══ CART SHEET -->
<div class="sheet" id="sheetCart">
  <div class="sheet-pill"></div>
  <div class="sheet-head">
    <span class="sheet-title">Your Cart</span>
    <button class="sheet-close" id="cartClose"><i class="fas fa-times"></i></button>
  </div>
  <div class="sheet-body" id="cartBody"></div>
  <div class="sheet-foot">
    <div id="cartTotals"></div>
    <button class="btn-primary" id="toCheckout" style="margin-top:16px"><i class="fas fa-arrow-right"></i>Checkout</button>
    <button class="btn-ghost" id="cartContinue">Continue Shopping</button>
  </div>
</div>

<!-- ═══ CHECKOUT SHEET -->
<div class="sheet" id="sheetCheckout">
  <div class="sheet-pill"></div>
  <div class="sheet-head">
    <span class="sheet-title">Checkout</span>
    <button class="sheet-close" id="coClose"><i class="fas fa-times"></i></button>
  </div>
  <div class="sheet-body">
    <div id="coSummary"></div>
    <label class="flabel">Full Name *</label>
    <input class="finput" id="fName" placeholder="Chamrong Vann" autocomplete="name">
    <label class="flabel">Phone Number *</label>
    <input class="finput" id="fPhone" type="tel" placeholder="012 345 678" autocomplete="tel">
    <label class="flabel">Email (Optional)</label>
    <input class="finput" id="fEmail" type="email" placeholder="you@email.com" autocomplete="email">
    <div class="f-err" id="fErr"></div>
  </div>
  <div class="sheet-foot">
    <button class="btn-primary" id="payBtn"><i class="fas fa-lock"></i>Pay with ABA</button>
    <button class="btn-ghost" id="backCart">&#x2190; Back to Cart</button>
  </div>
</div>

<!-- ═══ PAYMENT SHEET -->
<div class="sheet" id="sheetPay">
  <div class="sheet-pill"></div>
  <div class="sheet-head"><span class="sheet-title">Payment</span></div>
  <div class="sheet-body" id="payBody"></div>
  <div class="sheet-foot" id="payFoot"></div>
</div>

<!-- ═══ INVOICE SHEET -->
<div class="sheet" id="sheetInvoice">
  <div class="sheet-pill"></div>
  <div class="sheet-head">
    <span class="sheet-title">Invoice</span>
    <button class="sheet-close" id="invClose"><i class="fas fa-times"></i></button>
  </div>
  <div class="sheet-body" id="invBody"></div>
  <div class="sheet-foot">
    <button class="btn-ghost" id="doneBtn">Done</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast"><i class="fas fa-check-circle"></i><span id="toastMsg"></span></div>

<script>
/* ──────────────────────────────────────────────
   CONFIG
────────────────────────────────────────────── */
const WORKER   = 'https://xstore-notify.chamrong.workers.dev';
const DISC     = 50;
const MULT     = 1 - DISC / 100;
const SALE_DUR = 24 * 60 * 60 * 1000;
const QR_IMG   = 'qr.png';

/* ──────────────────────────────────────────────
   TELEGRAM
────────────────────────────────────────────── */
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); tg.enableClosingConfirmation(); }
const buyerChatId = tg?.initDataUnsafe?.user?.id || null;

/* ──────────────────────────────────────────────
   PRODUCTS
────────────────────────────────────────────── */
const PRODUCTS = [
  {
    id: 101, ico: '&#x1FA9F;', name: 'Windows 11 Pro',
    badge: 'Lifetime', badgeColor: '#5b9cf6',
    tagline: 'The most secure & intelligent Windows ever',
    desc: 'One-time license. BitLocker, Hyper-V, Remote Desktop, Windows Hello and AI Copilot+ features included.',
    url: 'https://www.microsoft.com/en-us/windows/windows-11',
    price: 20,
    chips: ['BitLocker Encryption','Remote Desktop','Windows Hello','Hyper-V','Copilot+ AI','Quick Machine Recovery'],
    specs: [{k:'Type',v:'Perpetual / Lifetime'},{k:'Devices',v:'1 PC'},{k:'Version',v:'Win 11 Pro 25H2'},{k:'Delivery',v:'Key via Bot'}],
    compare: null,
  },
  {
    id: 202, ico: '&#x1F4CA;', name: 'Office Pro Plus 2024',
    badge: 'One-Time', badgeColor: '#f97316',
    tagline: 'Full Office suite — pay once, own forever',
    desc: 'Word, Excel, PowerPoint, Outlook, Access, Publisher & OneNote. Works 100% offline. No subscription needed.',
    url: 'https://www.microsoft.com/en-us/microsoft-365/office/compare-office-products',
    price: 30,
    chips: ['Word & Excel','PowerPoint','Outlook','Access & Publisher','OneNote','Offline Ready'],
    specs: [{k:'Type',v:'Perpetual / Lifetime'},{k:'Devices',v:'1 PC'},{k:'Version',v:'Office 2024 Pro+'},{k:'Delivery',v:'Key via Bot'}],
    compare: { vs:'vs Microsoft 365', pros:['Pay once, no monthly fees','Works 100% offline','Full Access & Publisher','Data stays local'], cons:['No cloud storage','No auto feature updates','Single device only'] },
  },
  {
    id: 203, ico: '&#x2601;&#xFE0F;', name: 'Microsoft 365',
    badge: 'Monthly', badgeColor: '#2dd480',
    tagline: 'Always up-to-date across all your devices',
    desc: 'All Office apps + 1TB OneDrive + Teams + Copilot AI. Runs on Windows, Mac, iOS & Android.',
    url: 'https://www.microsoft.com/en-us/microsoft-365/compare-microsoft-365-enterprise-plans',
    price: 6,
    chips: ['Word, Excel, PowerPoint','1TB OneDrive','Microsoft Teams','Copilot AI','Up to 5 Devices','Always Updated'],
    specs: [{k:'Type',v:'Monthly Subscription'},{k:'Devices',v:'Up to 5'},{k:'Storage',v:'1TB OneDrive'},{k:'Delivery',v:'Account via Bot'}],
    compare: { vs:'vs Office Pro Plus', pros:['All devices (Win/Mac/iOS)','1TB cloud storage','Latest features + Copilot','Teams collaboration'], cons:['Recurring monthly cost','Needs internet to activate','No Access on basic plan'] },
  },
];

/* ──────────────────────────────────────────────
   STATE
────────────────────────────────────────────── */
let cart = [], order = null, pollTimer = null;
const $ = id => document.getElementById(id);

/* ──────────────────────────────────────────────
   CART LOGIC
────────────────────────────────────────────── */
const cartTotal = () => cart.reduce((s,i) => s + i.price * MULT * i.qty, 0);
const cartQty   = () => cart.reduce((s,i) => s + i.qty, 0);

function addToCart(id, btn) {
  const p = PRODUCTS.find(x => x.id === id);
  const e = cart.find(x => x.id === id);
  if (e) e.qty++; else cart.push({...p, qty:1});
  syncCartUI();
  showToast(p.name + ' added to cart');
  if (btn) {
    btn.classList.add('added');
    btn.innerHTML = '<i class="fas fa-check"></i> Added';
    setTimeout(() => { btn.classList.remove('added'); btn.innerHTML = '<i class="fas fa-cart-plus"></i> Add'; }, 1700);
  }
}

function syncCartUI() {
  const q = cartQty(), t = cartTotal();
  $('cartCount').textContent = q;
  $('cartCount').classList.toggle('on', q > 0);
  $('cartBar').classList.toggle('on', q > 0);
  $('barTotal').textContent = '$' + t.toFixed(2);
}

/* ──────────────────────────────────────────────
   RENDER PRODUCTS
────────────────────────────────────────────── */
function renderProducts() {
  const list = $('productList');
  PRODUCTS.forEach((p, i) => {
    const disc = (p.price * MULT).toFixed(2);
    const el = document.createElement('div');
    el.className = 'pcard';
    el.style.animationDelay = (i * 0.1) + 's';
    el.innerHTML = `
      <div class="pcard-body">
        <div class="pcard-top">
          <div class="pcard-icon">${p.ico}</div>
          <div class="pcard-info">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:5px">
              <span class="pcard-name">${p.name}</span>
              <span class="badge" style="background:${p.badgeColor}18;color:${p.badgeColor};border:1px solid ${p.badgeColor}35">${p.badge}</span>
            </div>
            <div class="pcard-tagline">${p.tagline}</div>
          </div>
        </div>
        <p class="pcard-desc">${p.desc}</p>
        <div class="chips">${p.chips.map(c => `<span class="chip"><i class="fas fa-check"></i>${c}</span>`).join('')}</div>
        <div class="specs">${p.specs.map(s => `<div class="spec-row"><span class="sk">${s.k}</span><span class="sv">${s.v}</span></div>`).join('')}</div>
        ${p.compare ? `
          <div class="cmp-toggle" data-id="${p.id}">
            <i class="fas fa-scale-balanced icon"></i> Compare ${p.compare.vs}
            <i class="fas fa-chevron-down caret" id="crt-${p.id}"></i>
          </div>
          <div class="cmp-body" id="cmp-${p.id}">
            <div class="cmp-grid">
              <div><div class="cmp-head" style="color:var(--green)">&#x2713; Pros</div>${p.compare.pros.map(x=>`<div class="cmp-item">&#x2022; ${x}</div>`).join('')}</div>
              <div><div class="cmp-head" style="color:var(--red)">&#x2717; Cons</div>${p.compare.cons.map(x=>`<div class="cmp-item">&#x2022; ${x}</div>`).join('')}</div>
            </div>
          </div>` : ''}
      </div>
      <div class="pcard-foot">
        <div class="price-wrap">
          <div class="p-old">$${p.price.toFixed(2)}</div>
          <div class="p-new">$${disc}</div>
          <span class="p-off">50% OFF</span>
        </div>
        <div class="card-btns">
          <a class="btn-info" href="${p.url}" target="_blank" rel="noopener"><i class="fas fa-arrow-up-right-from-square"></i> Details</a>
          <button class="btn-add" data-id="${p.id}"><i class="fas fa-cart-plus"></i> Add</button>
        </div>
      </div>`;
    list.appendChild(el);
  });

  list.addEventListener('click', e => {
    const tog = e.target.closest('.cmp-toggle');
    if (tog) {
      const id = tog.dataset.id;
      const open = $('cmp-' + id).classList.toggle('open');
      $('crt-' + id).style.transform = open ? 'rotate(180deg)' : '';
      return;
    }
    const btn = e.target.closest('.btn-add');
    if (btn) addToCart(parseInt(btn.dataset.id), btn);
  });
}

/* ──────────────────────────────────────────────
   CART SHEET
────────────────────────────────────────────── */
function renderCart() {
  const body = $('cartBody');
  if (!cart.length) {
    body.innerHTML = '<div class="empty"><i class="fas fa-bag-shopping"></i>Your cart is empty</div>';
    $('toCheckout').disabled = true;
  } else {
    $('toCheckout').disabled = false;
    body.innerHTML = cart.map(item => `
      <div class="ci">
        <div class="ci-ico">${item.ico}</div>
        <div class="ci-info">
          <div class="ci-name">${item.name}</div>
          <div class="ci-price">$${(item.price * MULT).toFixed(2)} each</div>
        </div>
        <div class="ci-ctrl">
          <button class="qb" data-id="${item.id}" data-a="dec">&#x2212;</button>
          <span class="qv">${item.qty}</span>
          <button class="qb" data-id="${item.id}" data-a="inc">+</button>
          <button class="rm-btn" data-id="${item.id}" data-a="rm"><i class="fas fa-trash-can"></i></button>
        </div>
      </div>`).join('');
    body.querySelectorAll('[data-a]').forEach(b => {
      b.onclick = () => {
        const id = parseInt(b.dataset.id), a = b.dataset.a;
        const item = cart.find(x => x.id === id);
        if (a === 'inc') item.qty++;
        else if (a === 'dec') { item.qty--; if (item.qty <= 0) cart = cart.filter(x => x.id !== id); }
        else cart = cart.filter(x => x.id !== id);
        syncCartUI(); renderCart();
      };
    });
  }
  const sub = cart.reduce((s,i) => s + i.price * i.qty, 0), tot = cartTotal();
  $('cartTotals').innerHTML = `
    <div class="orow"><span class="lbl">Subtotal</span><span>$${sub.toFixed(2)}</span></div>
    <div class="orow"><span class="lbl">Flash Discount (${DISC}%)</span><span class="disc-val">&#x2212;$${(sub-tot).toFixed(2)}</span></div>
    <div class="orow total"><span>Total</span><span>$${tot.toFixed(2)}</span></div>`;
}

/* ──────────────────────────────────────────────
   CHECKOUT
────────────────────────────────────────────── */
function renderCoSummary() {
  const tot = cartTotal(), sub = cart.reduce((s,i) => s + i.price * i.qty, 0);
  $('coSummary').innerHTML = `
    <div style="background:rgba(255,255,255,.05);border:1px solid var(--glassbdr);border-radius:var(--r2);padding:14px;margin-bottom:4px">
      ${cart.map(i => `<div class="orow"><span class="lbl">${i.name} &#xD7;${i.qty}</span><span>$${(i.price*MULT*i.qty).toFixed(2)}</span></div>`).join('')}
      <div class="orow"><span class="lbl">Discount (${DISC}%)</span><span class="disc-val">&#x2212;$${(sub-tot).toFixed(2)}</span></div>
      <div class="orow total"><span>Total</span><span>$${tot.toFixed(2)}</span></div>
    </div>`;
}

const validPhone = p => /^(?:\+855|0)[1-9]\d{7,8}$/.test(p.replace(/[\s\-().]/g,''));
const validEmail = e => !e.trim() || /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);

function startPayment() {
  const name = $('fName').value.trim(), phone = $('fPhone').value.trim(), email = $('fEmail').value.trim();
  [$('fName'),$('fPhone'),$('fEmail')].forEach(el => el.classList.remove('err'));
  $('fErr').style.display = 'none';
  if (!name)              { $('fName').classList.add('err');  $('fErr').textContent='Please enter your full name.'; $('fErr').style.display='block'; return; }
  if (!validPhone(phone)) { $('fPhone').classList.add('err'); $('fErr').textContent='Please enter a valid Cambodian phone number.'; $('fErr').style.display='block'; return; }
  if (!validEmail(email)) { $('fEmail').classList.add('err'); $('fErr').textContent='Please enter a valid email address.'; $('fErr').style.display='block'; return; }
  const now = new Date(), sub = cart.reduce((s,i)=>s+i.price*i.qty,0), tot = cartTotal();
  order = {
    invoiceNumber: Math.floor(Math.random()*900000)+100000,
    issueDate: now.toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}),
    issueTime: now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}),
    subtotal:sub, discountAmount:sub-tot, total:tot,
    customerName:name, customerPhone:phone, customerEmail:email,
    items:cart.map(i=>({...i})), buyerChatId,
  };
  closeSheet('sheetCheckout'); openSheet('sheetPay'); renderQRScreen(tot);
}

/* ──────────────────────────────────────────────
   QR PAYMENT SCREEN
────────────────────────────────────────────── */
function renderQRScreen(total) {
  $('payBody').innerHTML = `
    <div class="amt-block">
      <div class="amt-lbl">Scan &amp; pay exactly</div>
      <div class="amt-val">$${total.toFixed(2)}</div>
      <div class="amt-usd">USD</div>
    </div>
    <div class="qr-frame">
      <img src="${QR_IMG}" alt="ABA KHQR"
        onerror="this.parentNode.innerHTML='<div style=\\'padding:30px;text-align:center;color:#aaa;font-size:13px;font-family:sans-serif\\'>Upload <strong>qr.png</strong><br>to your GitHub repo</div>'"
      />
      <div class="qr-merchant">VANN SOK SAM RONG</div>
      <div class="qr-bank">ABA Bank &#xB7; KHQR</div>
    </div>
    <div class="pay-steps">
      <div class="pay-steps-label">How to pay</div>
      <div class="step"><span class="snum">1</span>Open <strong>ABA Mobile</strong> app</div>
      <div class="step"><span class="snum">2</span>Tap <strong>Scan QR</strong> &#x2192; scan code above</div>
      <div class="step"><span class="snum">3</span>Enter <strong style="color:var(--gold);font-family:'JetBrains Mono',monospace">$${total.toFixed(2)}</strong> and confirm</div>
      <div class="step"><span class="snum">4</span>Invoice &amp; license key appear <strong>automatically</strong></div>
    </div>
    <div class="warn-box">
      <i class="fas fa-triangle-exclamation"></i>
      Enter <strong style="color:var(--text)">exactly $${total.toFixed(2)}</strong> &#x2014; wrong amount fails verification.
    </div>`;
  /* Auto-detect status strip */
  $('payBody').innerHTML += `
    <div style="display:flex;align-items:center;gap:10px;background:rgba(91,156,246,.08);border:1px solid rgba(91,156,246,.18);border-radius:var(--r2);padding:12px 14px;margin-top:4px">
      <i class="fas fa-circle-notch spin" style="color:var(--blue);font-size:16px;flex-shrink:0"></i>
      <div>
        <div style="font-size:13px;font-weight:600">Waiting for payment<span id="autodots">.</span></div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">Checking automatically every 4 seconds</div>
      </div>
      <div style="margin-left:auto;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted)" id="pollCountEl">0s</div>
    </div>`;

  /* Cancel is the only button — no manual verify needed */
  $('payFoot').innerHTML = `<button class="btn-ghost" id="cancelPayBtn">Cancel Payment</button>`;
  $('cancelPayBtn').onclick = () => { stopPolling(); closeSheet('sheetPay'); };

  /* Auto-start polling immediately */
  startPolling(total);
}

/* ──────────────────────────────────────────────
   POLLING
────────────────────────────────────────────── */
const POLL_MAX = 10 * 60 * 1000;
let pollStart = 0;

function startPolling(total) {
  stopPolling(); // clear any previous timer
  pollStart = Date.now();
  let dots = 0, secs = 0;

  // Animate dots in the auto-detect strip
  const dotsTimer = setInterval(() => {
    const el = $('autodots');
    if (el) el.textContent = '.'.repeat((dots++%3)+1);
  }, 500);

  // Elapsed seconds counter
  const secsTimer = setInterval(() => {
    const el = $('pollCountEl');
    if (el) el.textContent = (++secs) + 's';
  }, 1000);

  pollTimer = setInterval(async () => {
    const elapsed = Date.now() - pollStart;

    if (elapsed >= POLL_MAX) {
      stopPolling(); clearInterval(dotsTimer); clearInterval(secsTimer);
      // Replace body with timeout message (keep amount visible)
      $('payBody').innerHTML = `
        <div class="amt-block">
          <div class="amt-lbl">Payment not detected</div>
          <div class="amt-val">$${(total||order?.total||0).toFixed(2)}</div>
        </div>
        <div class="status fail">
          <div class="st-ico"><i class="fas fa-clock"></i></div>
          <div class="st-title">Timed Out (10 min)</div>
          <div class="st-msg">No payment detected. If you did pay, contact <strong>@chamrong_vann</strong> with your transaction ID.</div>
        </div>`;
      $('payFoot').innerHTML = `
        <button class="btn-primary" id="retryBtn"><i class="fas fa-rotate-right"></i>Show QR Again</button>`;
      $('retryBtn').onclick = () => renderQRScreen(order?.total||0);
      return;
    }

    try {
      const res = await fetch(
        `${WORKER}/verify?invoice=${order.invoiceNumber}&amount=${order.total.toFixed(2)}`
      );
      const data = await res.json();
      if (data.verified) {
        stopPolling(); clearInterval(dotsTimer); clearInterval(secsTimer);
        await onVerified(data);
      }
    } catch(e) { /* network error — retry next tick */ }
  }, 4000);
}

function stopPolling() { clearInterval(pollTimer); pollTimer = null; }

/* ──────────────────────────────────────────────
   PAYMENT VERIFIED
────────────────────────────────────────────── */
async function onVerified(vData) {
  /* Show success state over the QR screen */
  $('payBody').innerHTML = `
    <div class="amt-block">
      <div class="amt-lbl">Payment received</div>
      <div class="amt-val" style="color:var(--green)">$${order.total.toFixed(2)}</div>
      <div class="amt-usd">USD</div>
    </div>
    <div class="status ok">
      <div class="st-ico"><i class="fas fa-circle-check"></i></div>
      <div class="st-title">Payment Confirmed!</div>
      <div class="st-msg">
        <strong style="color:var(--text)">${vData.payment_type}</strong><br>
        Tx: <span style="font-family:'JetBrains Mono',monospace;font-size:11px">${vData.transaction_id}</span><br><br>
        <span class="pulse">Generating invoice &amp; releasing license key&hellip;</span>
      </div>
    </div>`;
  $('payFoot').innerHTML = '';

  /* Send to backend — notifies admin + buyer + auto-delivers license */
  try {
    await fetch(`${WORKER}/notify`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: buildAdminMsg(order, vData), order, verifyData: vData })
    });
  } catch(e) {}

  /* Short pause so user sees the confirmation, then show invoice */
  setTimeout(() => {
    closeSheet('sheetPay');
    showInvoice(order, vData);
    cart = []; syncCartUI(); order = null;
  }, 2000);
}

/* ──────────────────────────────────────────────
   INVOICE
────────────────────────────────────────────── */
function showInvoice(o, vData) {
  const rows = o.items.map(i => `
    <tr>
      <td>${i.name}</td><td style="text-align:center">${i.qty}</td>
      <td style="text-align:right">$${(i.price*MULT).toFixed(2)}</td>
      <td style="text-align:right">$${(i.price*MULT*i.qty).toFixed(2)}</td>
    </tr>`).join('');
  $('invBody').innerHTML = `
    <div class="inv-header">
      <div>
        <div class="inv-brand">x<span>store</span></div>
        <div class="inv-contact">Phnom Penh, Cambodia<br>@chamrong_vann</div>
      </div>
      <div class="inv-right">
        <strong>INVOICE</strong>
        <div>#${o.invoiceNumber}</div>
        <div>${o.issueDate}</div>
        <div>${o.issueTime}</div>
      </div>
    </div>
    <div class="inv-sec">
      <div class="inv-sec-label">Bill To</div>
      <div class="inv-sec-val">${o.customerName}<br>${o.customerPhone}<br>${o.customerEmail||'&#x2014;'}</div>
    </div>
    <table class="inv-table">
      <thead><tr><th>Item</th><th style="text-align:center">Qty</th><th style="text-align:right">Price</th><th style="text-align:right">Total</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="orow"><span class="lbl">Subtotal</span><span>$${o.subtotal.toFixed(2)}</span></div>
    <div class="orow"><span class="lbl">Discount (${DISC}%)</span><span class="disc-val">&#x2212;$${o.discountAmount.toFixed(2)}</span></div>
    <div class="orow total"><span>Total Paid</span><span>$${o.total.toFixed(2)}</span></div>
    <div><span class="paid-pill"><i class="fas fa-circle-check"></i>PAID &#xB7; ${vData.payment_type}</span></div>
    <div style="font-size:11px;color:var(--muted);margin-top:7px">Tx: ${vData.transaction_id}</div>

    <div class="key-box">
      <div class="key-box-label"><i class="fas fa-key"></i>Your License Key</div>
      <div class="spoiler-wrap" id="spoilerWrap">
        <div class="spoiler-text" id="keyText">License key being delivered to your Telegram&hellip;<br>Check messages in a moment.</div>
        <div class="spoiler-mask" id="spoilerMask"><i class="fas fa-eye"></i>Tap to reveal</div>
      </div>
      <button class="copy-key-btn" id="copyKeyBtn"><i class="fas fa-copy"></i>Copy Key</button>
    </div>

    <div style="font-size:12px;color:var(--muted);line-height:1.8;margin-top:8px">
      Your license key is being sent to your Telegram bot.<br>
      Not received within 5 min? Contact <strong style="color:var(--text)">@chamrong_vann</strong>
    </div>`;

  let revealed = false;
  $('spoilerWrap').onclick = () => {
    revealed = !revealed;
    $('keyText').classList.toggle('open', revealed);
    $('spoilerMask').classList.toggle('gone', revealed);
  };
  $('copyKeyBtn').onclick = () => {
    const t = $('keyText')?.textContent;
    if (t) navigator.clipboard?.writeText(t).then(() => showToast('License key copied!'));
  };

  openSheet('sheetInvoice');
}

window.setLicenseKey = key => {
  const kt = $('keyText');
  if (kt) { kt.textContent = key; $('copyKeyBtn').classList.add('on'); }
};

/* ──────────────────────────────────────────────
   TELEGRAM MESSAGE
────────────────────────────────────────────── */
function buildAdminMsg(o, vData) {
  const items = o.items.map(i => `\u2022 ${i.name} \xD7${i.qty} \u2014 $${(i.price*MULT*i.qty).toFixed(2)}`).join('\n');
  return `\u2705 *New Order \u2014 xstore*\n\n\uD83D\uDCCB *Invoice:* #${o.invoiceNumber}\n\uD83D\uDCC5 *Date:* ${o.issueDate} ${o.issueTime}\n\n\uD83D\uDC64 *Customer:*\n${o.customerName} / ${o.customerPhone}${o.customerEmail ? '\n'+o.customerEmail : ''}\n\n\uD83D\uDED2 *Items:*\n${items}\n\n\uD83D\uDCB0 *Total:* $${o.total.toFixed(2)}\n\uD83D\uDCB3 *Method:* ${vData.payment_type}\n\uD83D\uDD17 *Tx:* \`${vData.transaction_id}\`\n\n_Use /deliver ${o.invoiceNumber} to send license key_`;
}

/* ──────────────────────────────────────────────
   SHEET SYSTEM
────────────────────────────────────────────── */
const ALL_SHEETS = ['sheetCart','sheetCheckout','sheetPay','sheetInvoice'];
function openSheet(id) {
  $('overlay').classList.add('on');
  $(id).classList.add('on');
  if (tg) tg.BackButton.show();
}
function closeSheet(id) {
  $(id).classList.remove('on');
  if (!ALL_SHEETS.some(s => $(s).classList.contains('on'))) {
    $('overlay').classList.remove('on');
    if (tg) tg.BackButton.hide();
  }
}
function closeAll() {
  ALL_SHEETS.forEach(s => $(s).classList.remove('on'));
  $('overlay').classList.remove('on');
  if (tg) tg.BackButton.hide();
}

/* ──────────────────────────────────────────────
   TOAST
────────────────────────────────────────────── */
let toastTimer;
function showToast(msg) {
  $('toastMsg').textContent = msg;
  $('toast').classList.add('on');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => $('toast').classList.remove('on'), 2200);
}

/* ──────────────────────────────────────────────
   COUNTDOWN
────────────────────────────────────────────── */
function startCountdown() {
  let end = parseInt(localStorage.getItem('xSaleEnd')||'0');
  if (!end || Date.now() > end) { end = Date.now() + SALE_DUR; localStorage.setItem('xSaleEnd', end); }
  const tick = () => {
    const d = end - Date.now();
    if (d < 0) { localStorage.removeItem('xSaleEnd'); startCountdown(); return; }
    $('tD').textContent = String(Math.floor(d/86400000)).padStart(2,'0');
    $('tH').textContent = String(Math.floor(d%86400000/3600000)).padStart(2,'0');
    $('tM').textContent = String(Math.floor(d%3600000/60000)).padStart(2,'0');
    $('tS').textContent = String(Math.floor(d%60000/1000)).padStart(2,'0');
  };
  tick(); setInterval(tick, 1000);
}

/* ──────────────────────────────────────────────
   EVENTS
────────────────────────────────────────────── */
$('cartBtn').onclick    = () => { renderCart(); openSheet('sheetCart'); };
$('cartBarBtn').onclick = () => { renderCart(); openSheet('sheetCart'); };
$('cartClose').onclick  = () => closeSheet('sheetCart');
$('cartContinue').onclick = () => closeSheet('sheetCart');
$('coClose').onclick    = () => closeSheet('sheetCheckout');
$('invClose').onclick   = () => closeSheet('sheetInvoice');
$('doneBtn').onclick    = closeAll;
$('toCheckout').onclick = () => { renderCoSummary(); closeSheet('sheetCart'); openSheet('sheetCheckout'); };
$('backCart').onclick   = () => { closeSheet('sheetCheckout'); renderCart(); openSheet('sheetCart'); };
$('payBtn').onclick     = startPayment;
$('overlay').onclick    = e => { if (e.target === $('overlay') && !$('sheetPay').classList.contains('on')) closeAll(); };
if (tg) {
  tg.BackButton.onClick(() => {
    for (const s of [...ALL_SHEETS].reverse()) {
      if ($(s).classList.contains('on')) { closeSheet(s); return; }
    }
  });
}

/* ──────────────────────────────────────────────
   INIT
────────────────────────────────────────────── */
renderProducts();
startCountdown();
</script>
