<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>xstore — License Store</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* ─────────────────────────────────────────────
   RESET & BASE
───────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: #0a0b12;
  color: #e8eaf6;
  min-height: 100%;
  overscroll-behavior: none;
  -webkit-tap-highlight-color: transparent;
}
::-webkit-scrollbar { width: 0; }
button { font-family: inherit; cursor: pointer; }
a { text-decoration: none; }

/* ─────────────────────────────────────────────
   TOKENS
───────────────────────────────────────────── */
:root {
  --bg:       #0a0b12;
  --surface:  rgba(255,255,255,0.042);
  --surface2: rgba(255,255,255,0.07);
  --surface3: rgba(255,255,255,0.11);
  --border:   rgba(255,255,255,0.065);
  --border2:  rgba(255,255,255,0.12);
  --accent:   #0078D4;      /* Microsoft blue */
  --accent2:  #005a9e;
  --gold:     #f5a524;
  --gold2:    #e8380d;
  --gg:       linear-gradient(135deg, #f5a524 0%, #e8380d 100%);
  --green:    #20c75a;
  --red:      #f03e4d;
  --blue:     #3b8ff3;
  --text:     #e8eaf6;
  --muted:    rgba(232,234,246,0.45);
  --muted2:   rgba(232,234,246,0.22);
  --r:        16px;
  --r2:       12px;
  --r3:       8px;
  --blur:     blur(24px);
  --blur2:    blur(48px);
}

/* ─────────────────────────────────────────────
   BACKGROUND GRADIENT MESH
───────────────────────────────────────────── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 55% 45% at 5%   5%,   rgba(0,120,212,.18) 0%, transparent 70%),
    radial-gradient(ellipse 45% 40% at 95%  10%,  rgba(88,101,242,.14) 0%, transparent 70%),
    radial-gradient(ellipse 50% 45% at 90%  90%,  rgba(16,185,129,.1)  0%, transparent 70%),
    radial-gradient(ellipse 40% 50% at 10%  85%,  rgba(245,165,36,.09) 0%, transparent 70%),
    #0a0b12;
}

/* ─────────────────────────────────────────────
   LAYOUT
───────────────────────────────────────────── */
#app {
  position: relative; z-index: 1;
  max-width: 480px; margin: 0 auto;
  min-height: 100vh; display: flex; flex-direction: column;
}
.page { flex: 1; overflow-y: auto; padding-bottom: 90px; }

/* ─────────────────────────────────────────────
   TOPBAR
───────────────────────────────────────────── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 15px 18px;
  background: transparent;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 30;
}
.brand {
  font-size: 22px; font-weight: 800; letter-spacing: -0.8px;
  background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,.7) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.brand-accent {
  background: var(--gg);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.cart-pill {
  display: flex; align-items: center; gap: 7px;
  background: var(--surface2); backdrop-filter: var(--blur);
  border: 1px solid var(--border2); border-radius: 100px;
  padding: 8px 16px; font-size: 13px; font-weight: 600; color: var(--text);
  transition: background .2s, transform .1s;
}
.cart-pill:active { background: var(--surface3); transform: scale(.96); }
.cart-badge {
  background: var(--gg); color: #fff; border-radius: 100px;
  padding: 1px 8px; font-size: 11px; font-weight: 800; display: none;
}
.cart-badge.on { display: block; }

/* ─────────────────────────────────────────────
   SALE HERO
───────────────────────────────────────────── */
.hero {
  margin: 14px 16px 0;
  background: var(--surface);
  backdrop-filter: var(--blur2);
  border: 1px solid var(--border);
  border-radius: var(--r); padding: 20px;
  position: relative; overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute; top: -50px; right: -50px;
  width: 160px; height: 160px; border-radius: 50%;
  background: radial-gradient(rgba(245,165,36,.18), transparent 70%);
  pointer-events: none;
}
.sale-tag {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10px; font-weight: 700; color: var(--gold);
  text-transform: uppercase; letter-spacing: 1.8px;
  background: rgba(245,165,36,.1); border: 1px solid rgba(245,165,36,.2);
  border-radius: 100px; padding: 3px 11px; margin-bottom: 10px;
}
.hero-title {
  font-size: 25px; font-weight: 800; letter-spacing: -.6px; line-height: 1.15;
  margin-bottom: 6px;
}
.hero-title strong {
  background: var(--gg);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero-sub { font-size: 13px; color: var(--muted); line-height: 1.55; margin-bottom: 16px; }
.timer { display: flex; gap: 6px; }
.tu {
  background: rgba(0,0,0,.3); border: 1px solid var(--border);
  border-radius: var(--r3); padding: 7px 10px; min-width: 50px; text-align: center;
}
.tn { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 600; color: var(--gold); line-height: 1; }
.tl { font-size: 9px; color: var(--muted); margin-top: 3px; text-transform: uppercase; letter-spacing: .5px; }

/* ─────────────────────────────────────────────
   SECTION LABEL
───────────────────────────────────────────── */
.sec { display: flex; align-items: center; gap: 10px; padding: 20px 18px 10px; }
.sec-lbl { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 2.5px; white-space: nowrap; }
.sec-rule { flex: 1; height: 1px; background: var(--border); }

/* ─────────────────────────────────────────────
   PRODUCT CARD
───────────────────────────────────────────── */
.card {
  margin: 0 16px 12px;
  background: var(--surface); backdrop-filter: var(--blur2);
  border: 1px solid var(--border); border-radius: var(--r);
  overflow: hidden; transition: border-color .2s, transform .15s;
  animation: up .4s ease both;
}
.card:nth-child(2) { animation-delay: .08s; }
.card:nth-child(3) { animation-delay: .16s; }
.card:hover { border-color: var(--border2); }
.card-body { padding: 18px; }

/* icon + name */
.card-top { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 14px; }
.card-icon {
  width: 54px; height: 54px; border-radius: 14px;
  background: var(--surface2); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; position: relative; overflow: hidden;
}
.card-icon::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,.1) 0%, transparent 55%);
  pointer-events: none;
}
.card-meta { flex: 1; min-width: 0; }
.card-name { font-size: 17px; font-weight: 800; letter-spacing: -.3px; margin-bottom: 4px; line-height: 1.2; }
.card-tag { font-size: 12px; color: var(--muted); line-height: 1.45; margin-top: 2px; }
.badge {
  display: inline-block; font-size: 10px; font-weight: 700;
  padding: 3px 9px; border-radius: 100px; letter-spacing: .3px; margin-top: 6px;
}
.card-desc { font-size: 13px; color: var(--muted); line-height: 1.65; margin-bottom: 14px; }

/* chips */
.chips { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 14px; }
.chip {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(0,0,0,.22); border: 1px solid var(--border);
  border-radius: 100px; padding: 4px 11px;
  font-size: 11px; font-weight: 500; color: var(--muted);
}
.chip i { color: var(--green); font-size: 9px; }

/* specs table */
.specs {
  background: rgba(0,0,0,.22); border: 1px solid var(--border);
  border-radius: var(--r2); overflow: hidden; margin-bottom: 14px;
}
.sp { display: flex; justify-content: space-between; align-items: center; padding: 9px 13px; border-bottom: 1px solid var(--border); font-size: 12px; }
.sp:last-child { border: none; }
.sk { color: var(--muted); }
.sv { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 500; }

/* compare toggle */
.cmp-btn {
  display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600;
  color: var(--muted); cursor: pointer; padding: 10px 0;
  border-top: 1px solid var(--border); user-select: none;
}
.cmp-btn .ci { color: var(--gold); }
.chevron { margin-left: auto; font-size: 10px; transition: transform .25s; }
.cmp-panel { display: none; padding-bottom: 4px; }
.cmp-panel.open { display: block; }
.cmp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
.cmp-head { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
.cmp-item { font-size: 11px; color: var(--muted); margin-bottom: 4px; line-height: 1.4; }

/* card footer */
.card-foot {
  padding: 14px 18px;
  background: rgba(0,0,0,.2);
  border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.price-col { flex-shrink: 0; }
.p-was { font-size: 11px; color: var(--muted2); text-decoration: line-through; }
.p-now {
  font-size: 26px; font-weight: 800; font-family: 'JetBrains Mono', monospace;
  background: var(--gg); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; letter-spacing: -1.5px; line-height: 1;
}
.p-save {
  display: inline-block; font-size: 10px; font-weight: 700; color: var(--gold);
  background: rgba(245,165,36,.1); border: 1px solid rgba(245,165,36,.18);
  padding: 2px 7px; border-radius: 4px; margin-top: 3px;
}
.card-actions { display: flex; gap: 8px; flex-shrink: 0; }
.btn-ghost {
  background: var(--surface2); border: 1px solid var(--border2);
  color: var(--muted); padding: 10px 12px; border-radius: var(--r2);
  font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 6px;
  white-space: nowrap; transition: color .2s, background .2s; color: var(--muted);
}
.btn-ghost:active { color: var(--text); background: var(--surface3); }
.btn-add {
  background: var(--gg); color: #fff; border: none;
  padding: 10px 18px; border-radius: var(--r2);
  font-size: 13px; font-weight: 700;
  display: flex; align-items: center; gap: 7px; white-space: nowrap;
  transition: opacity .15s, transform .1s; position: relative; overflow: hidden;
}
.btn-add:active { opacity: .82; transform: scale(.95); }
.btn-add.added { background: linear-gradient(135deg, var(--green), #16a869); }

/* ─────────────────────────────────────────────
   BOTTOM CART BAR
───────────────────────────────────────────── */
.cartbar {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px; z-index: 20;
  padding: 10px 16px calc(10px + env(safe-area-inset-bottom, 0px));
  background: rgba(10,11,18,.88); backdrop-filter: var(--blur2);
  border-top: 1px solid var(--border); display: none;
}
.cartbar.on { display: block; }
.cartbar-btn {
  width: 100%; padding: 15px 20px; background: var(--gg);
  color: #fff; border: none; border-radius: var(--r2);
  font-size: 15px; font-weight: 800;
  display: flex; align-items: center; justify-content: space-between;
  transition: opacity .2s;
}
.cartbar-btn:active { opacity: .85; }
.cartbar-btn .total { font-family: 'JetBrains Mono', monospace; font-weight: 600; }

/* ─────────────────────────────────────────────
   OVERLAY
───────────────────────────────────────────── */
#overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.7);
  backdrop-filter: blur(6px); z-index: 40;
  opacity: 0; pointer-events: none; transition: opacity .3s;
}
#overlay.on { opacity: 1; pointer-events: all; }

/* ─────────────────────────────────────────────
   BOTTOM SHEET
───────────────────────────────────────────── */
.sheet {
  position: fixed; bottom: 0; left: 50%; z-index: 50;
  width: 100%; max-width: 480px; max-height: 93vh;
  transform: translate(-50%, 100%);
  transition: transform .38s cubic-bezier(.32,.72,0,1);
  background: rgba(10,12,22,.98); backdrop-filter: var(--blur2);
  border: 1px solid var(--border); border-bottom: none;
  border-radius: 22px 22px 0 0;
  display: flex; flex-direction: column;
}
.sheet.on { transform: translate(-50%, 0); }
.handle {
  width: 38px; height: 4px; background: rgba(255,255,255,.14);
  border-radius: 2px; margin: 12px auto 0; flex-shrink: 0;
}
.sh-head {
  padding: 14px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.sh-title { font-size: 18px; font-weight: 800; letter-spacing: -.3px; }
.sh-close {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--surface2); border: none;
  color: var(--muted); display: flex; align-items: center; justify-content: center;
  font-size: 13px; transition: background .2s;
}
.sh-close:active { background: var(--surface3); }
.sh-body { flex: 1; overflow-y: auto; padding: 18px 20px; }
.sh-foot {
  padding: 12px 20px calc(14px + env(safe-area-inset-bottom, 0px));
  border-top: 1px solid var(--border); background: rgba(0,0,0,.2); flex-shrink: 0;
}

/* ─────────────────────────────────────────────
   CART ITEMS
───────────────────────────────────────────── */
.ci { display: flex; align-items: center; gap: 12px; padding: 13px 0; border-bottom: 1px solid var(--border); }
.ci:last-child { border: none; }
.ci-ico { width: 42px; height: 42px; border-radius: 12px; background: var(--surface2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.ci-info { flex: 1; min-width: 0; }
.ci-name { font-size: 13px; font-weight: 700; }
.ci-price { font-size: 12px; color: var(--muted); margin-top: 2px; }
.ci-ctrl { display: flex; align-items: center; gap: 8px; }
.qb {
  width: 30px; height: 30px; border-radius: var(--r3);
  background: var(--surface2); border: none; color: var(--text);
  font-size: 15px; display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.qb:active { background: var(--surface3); }
.qv { font-family: 'JetBrains Mono', monospace; font-size: 14px; min-width: 22px; text-align: center; }
.rm-btn { background: none; border: none; color: rgba(240,62,77,.65); padding: 4px; font-size: 13px; }

/* ─────────────────────────────────────────────
   SUMMARY ROWS
───────────────────────────────────────────── */
.row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; font-size: 13px; }
.row .lbl { color: var(--muted); }
.row.big { font-size: 18px; font-weight: 800; border-top: 1px solid var(--border); margin-top: 8px; padding-top: 14px; letter-spacing: -.3px; }
.disc { color: var(--green); }

/* ─────────────────────────────────────────────
   FORM
───────────────────────────────────────────── */
.flabel { display: block; font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1.2px; margin: 15px 0 6px; }
.finput {
  width: 100%; padding: 13px 15px;
  background: var(--surface); backdrop-filter: var(--blur);
  border: 1px solid var(--border); border-radius: var(--r2);
  color: var(--text); font-family: inherit; font-size: 14px;
  outline: none; transition: border-color .2s, background .2s;
}
.finput:focus { border-color: rgba(245,165,36,.45); background: var(--surface2); }
.finput.err { border-color: rgba(240,62,77,.55); }
.finput::placeholder { color: var(--muted2); }
.ferr { color: var(--red); font-size: 12px; margin-top: 8px; display: none; }

/* ─────────────────────────────────────────────
   BUTTONS
───────────────────────────────────────────── */
.btn-primary {
  width: 100%; padding: 15px; background: var(--gg);
  color: #fff; border: none; border-radius: var(--r2);
  font-size: 15px; font-weight: 800;
  display: flex; align-items: center; justify-content: center; gap: 9px;
  transition: opacity .2s, transform .1s;
}
.btn-primary:active { opacity: .85; transform: scale(.98); }
.btn-primary:disabled { opacity: .28; cursor: not-allowed; }
.btn-secondary {
  width: 100%; padding: 13px; margin-top: 9px;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); border-radius: var(--r2);
  font-size: 14px; font-weight: 600; transition: background .2s;
}
.btn-secondary:active { background: var(--surface2); }

/* ─────────────────────────────────────────────
   STATUS CARDS
───────────────────────────────────────────── */
.status-card { border-radius: var(--r2); padding: 24px; text-align: center; margin: 8px 0; }
.s-wait { background: rgba(59,143,243,.06); border: 1px solid rgba(59,143,243,.16); }
.s-ok   { background: rgba(32,199,90,.06);  border: 1px solid rgba(32,199,90,.16);  }
.s-fail { background: rgba(240,62,77,.06);  border: 1px solid rgba(240,62,77,.16);  }
.st-ico { font-size: 36px; margin-bottom: 12px; }
.st-ttl { font-size: 17px; font-weight: 800; margin-bottom: 8px; letter-spacing: -.3px; }
.st-msg { font-size: 13px; color: var(--muted); line-height: 1.65; }
.s-wait .st-ico { color: var(--blue); }
.s-ok   .st-ico { color: var(--green); }
.s-fail .st-ico { color: var(--red); }
.progress { width: 100%; height: 2px; background: rgba(255,255,255,.07); border-radius: 2px; overflow: hidden; margin-top: 14px; }
.progress-fill { height: 100%; width: 0%; background: var(--gg); transition: width 1s linear; }

/* ─────────────────────────────────────────────
   PAYMENT / QR
───────────────────────────────────────────── */
.amt-hero { text-align: center; margin-bottom: 18px; }
.amt-lbl { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
.amt-big {
  font-size: 58px; font-weight: 800; font-family: 'JetBrains Mono', monospace;
  background: var(--gg); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; letter-spacing: -3px; line-height: 1;
}
.amt-cur { font-size: 13px; color: var(--muted); margin-top: 5px; }
.qr-box {
  background: #fff; border-radius: 18px; padding: 18px; text-align: center;
  margin-bottom: 16px; box-shadow: 0 16px 64px rgba(0,0,0,.5);
}
.qr-box img { width: 100%; max-width: 226px; height: auto; margin: 0 auto; border-radius: 10px; display: block; }
.qr-merchant { font-size: 14px; font-weight: 700; color: #111; margin-top: 12px; }
.qr-bank { font-size: 12px; color: #666; margin-top: 2px; }
.steps-box {
  background: rgba(0,0,0,.22); border: 1px solid var(--border);
  border-radius: var(--r2); padding: 16px; margin-bottom: 14px;
}
.steps-lbl { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; }
.step { display: flex; align-items: center; gap: 12px; font-size: 13px; margin-bottom: 10px; }
.step:last-child { margin: 0; }
.sn {
  background: var(--gg); color: #fff; border-radius: 50%;
  width: 24px; height: 24px; min-width: 24px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 800;
}
.auto-bar {
  display: flex; align-items: center; gap: 12px;
  background: rgba(59,143,243,.06); border: 1px solid rgba(59,143,243,.16);
  border-radius: var(--r2); padding: 13px 16px;
}
.ab-text { flex: 1; }
.ab-title { font-size: 13px; font-weight: 700; }
.ab-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.ab-secs { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--muted); }

/* ─────────────────────────────────────────────
   INVOICE
───────────────────────────────────────────── */
.inv-hd { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 18px; }
.inv-brand { font-size: 22px; font-weight: 800; letter-spacing: -.8px; }
.inv-brand span {
  background: var(--gg); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.inv-contact { font-size: 11px; color: var(--muted); margin-top: 3px; line-height: 1.7; }
.inv-r { text-align: right; font-size: 12px; color: var(--muted); line-height: 1.9; }
.inv-r strong { font-size: 15px; color: var(--text); font-weight: 800; display: block; }
.inv-sec { margin: 12px 0; }
.inv-sec-lbl { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 5px; }
.inv-tbl { width: 100%; border-collapse: collapse; font-size: 12px; margin: 12px 0; }
.inv-tbl th { text-align: left; padding: 9px 10px; background: rgba(0,0,0,.25); color: var(--muted); font-weight: 600; }
.inv-tbl th:last-child, .inv-tbl td:last-child { text-align: right; }
.inv-tbl td { padding: 10px; border-bottom: 1px solid var(--border); }
.paid-tag {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(32,199,90,.08); border: 1px solid rgba(32,199,90,.2);
  color: var(--green); padding: 5px 14px; border-radius: 100px;
  font-size: 12px; font-weight: 700; margin-top: 12px;
}

/* ─────────────────────────────────────────────
   LICENSE KEY SPOILER
───────────────────────────────────────────── */
.key-card {
  background: rgba(88,101,242,.05); border: 1px dashed rgba(88,101,242,.25);
  border-radius: var(--r2); padding: 18px; margin: 16px 0;
}
.key-lbl {
  display: flex; align-items: center; gap: 7px; font-size: 10px; font-weight: 700;
  color: #818cf8; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 12px;
}
.spoiler { position: relative; cursor: pointer; user-select: none; border-radius: var(--r3); overflow: hidden; }
.spoiler-text {
  font-family: 'JetBrains Mono', monospace; font-size: 13px;
  word-break: break-all; line-height: 1.8; padding: 8px;
  filter: blur(7px); transition: filter .4s cubic-bezier(.22,.68,0,1.2);
}
.spoiler-text.show { filter: none; }
.spoiler-mask {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  background: rgba(10,11,18,.5); backdrop-filter: blur(2px); border-radius: var(--r3);
  gap: 7px; font-size: 13px; font-weight: 700; color: #818cf8; transition: opacity .3s;
}
.spoiler-mask.hidden { opacity: 0; pointer-events: none; }
.copy-key {
  display: none; margin-top: 10px; padding: 9px 16px;
  background: rgba(88,101,242,.1); border: 1px solid rgba(88,101,242,.2);
  color: #818cf8; border-radius: var(--r3);
  font-size: 12px; font-weight: 700; align-items: center; gap: 6px;
  transition: background .2s;
}
.copy-key.on { display: inline-flex; }
.copy-key:active { background: rgba(88,101,242,.2); }

/* ─────────────────────────────────────────────
   TOAST
───────────────────────────────────────────── */
#toast {
  position: fixed; top: 68px; left: 50%;
  transform: translateX(-50%) translateY(-12px);
  background: rgba(10,12,22,.98); backdrop-filter: var(--blur);
  border: 1px solid var(--border2); color: var(--text);
  padding: 9px 18px; border-radius: 100px;
  font-size: 13px; font-weight: 600;
  display: flex; align-items: center; gap: 8px;
  opacity: 0; transition: all .25s; pointer-events: none;
  white-space: nowrap; z-index: 99;
}
#toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast i { color: var(--green); }

/* ─────────────────────────────────────────────
   EMPTY STATE
───────────────────────────────────────────── */
.empty { text-align: center; padding: 50px 0; color: var(--muted); }
.empty i { font-size: 44px; display: block; margin-bottom: 12px; opacity: .25; }

/* ─────────────────────────────────────────────
   ANIMATIONS
───────────────────────────────────────────── */
@keyframes up    { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
@keyframes spin  { to { transform: rotate(360deg); } }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.45; } }
.spin  { animation: spin  .75s linear infinite; display: inline-block; }
.pulse { animation: pulse 1.6s ease   infinite; }
</style>
</head>
<body>

<!-- Toast -->
<div id="toast"><i class="fas fa-check-circle"></i><span id="toastMsg"></span></div>

<script>
'use strict';

/* ══════════════════════════════════════════
   CONFIG — update WORKER to your deployed URL
══════════════════════════════════════════ */
var WORKER   = 'https://xstore-notify.chamrong.workers.dev';
var DISC     = 50;
var MULT     = 1 - DISC / 100;
var SALE_MS  = 24 * 60 * 60 * 1000;
var POLL_MAX = 10 * 60 * 1000;

/* ── Telegram WebApp ── */
var tg = window.Telegram && window.Telegram.WebApp;
if (tg) { try { tg.ready(); tg.expand(); tg.enableClosingConfirmation(); } catch(e) {} }
var buyerChatId = (tg && tg.initDataUnsafe && tg.initDataUnsafe.user)
  ? tg.initDataUnsafe.user.id : null;

/* ══════════════════════════════════════════
   PRODUCT ICONS — official Microsoft SVGs
══════════════════════════════════════════ */
var ICONS = {

  /* Windows 11 — official 4-pane flag */
  win11: '<svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 88 88">'
       + '<path d="M0 12.5 36 7.6l.1 35-36 .2z" fill="#0078D4"/>'
       + '<path d="M40.5 7 88 0v42.5l-47.5.4z" fill="#0078D4"/>'
       + '<path d="M36.1 46.5l.1 35L0 76V46.3z" fill="#0078D4"/>'
       + '<path d="M40.5 46.9l47.5-.4V88l-47.5-6.6z" fill="#0078D4"/>'
       + '</svg>',

  /* Office 2024 Pro Plus — orange W on white rounded rect */
  office: '<svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 100 100">'
        + '<defs><linearGradient id="wg" x1="0%" y1="0%" x2="0%" y2="100%">'
        + '<stop offset="0%" stop-color="#EB6C10"/>'
        + '<stop offset="100%" stop-color="#C43E1C"/>'
        + '</linearGradient></defs>'
        + '<rect x="4" y="4" width="92" height="92" rx="16" fill="url(#wg)"/>'
        + '<text x="50" y="74" font-family="Arial Black,Arial" font-weight="900" font-size="60" fill="white" text-anchor="middle">W</text>'
        + '</svg>',

  /* Microsoft 365 — 4-square grid (Windows/Office colors) */
  m365: '<svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 100 100">'
      + '<rect x="3"  y="3"  width="44" height="44" rx="7" fill="#F25022"/>'
      + '<rect x="53" y="3"  width="44" height="44" rx="7" fill="#7FBA00"/>'
      + '<rect x="3"  y="53" width="44" height="44" rx="7" fill="#00A4EF"/>'
      + '<rect x="53" y="53" width="44" height="44" rx="7" fill="#FFB900"/>'
      + '</svg>',
};

/* ══════════════════════════════════════════
   PRODUCTS
══════════════════════════════════════════ */
var PRODUCTS = [
  {
    id: 101, icon: 'win11', name: 'Windows 11 Pro',
    badge: 'Lifetime', bc: '#0078D4',
    tagline: 'The most secure & intelligent Windows ever built',
    desc: 'One-time perpetual license. Includes BitLocker encryption, Hyper-V, Remote Desktop, Windows Hello and AI Copilot+ features.',
    url: 'https://www.microsoft.com/en-us/windows/compare-windows-11-home-vs-pro',
    price: 20,
    chips: ['BitLocker','Remote Desktop','Windows Hello','Hyper-V','Copilot+ AI','Quick Machine Recovery'],
    specs: [
      { k: 'License',  v: 'Perpetual' },
      { k: 'Devices',  v: '1 PC' },
      { k: 'Version',  v: 'Win 11 Pro 25H2' },
      { k: 'Delivery', v: 'Key via Bot' },
    ],
    cmp: null,
  },
  {
    id: 202, icon: 'office', name: 'Office Pro Plus 2024',
    badge: 'One-Time', bc: '#D83B01',
    tagline: 'Full Office suite — pay once, own forever',
    desc: 'Includes Word, Excel, PowerPoint, Outlook, Access, Publisher & OneNote. Works 100% offline — no monthly fees.',
    url: 'https://www.microsoft.com/en-us/microsoft-365/office/compare-office-products',
    price: 30,
    chips: ['Word & Excel','PowerPoint','Outlook','Access & Publisher','OneNote','100% Offline'],
    specs: [
      { k: 'License',  v: 'Perpetual' },
      { k: 'Devices',  v: '1 PC' },
      { k: 'Version',  v: 'Office 2024 Pro+' },
      { k: 'Delivery', v: 'Key via Bot' },
    ],
    cmp: {
      vs: 'vs Microsoft 365',
      pros: ['Pay once — no fees','Works offline','Access & Publisher included','Data stays local'],
      cons: ['No cloud storage','No auto feature updates','Single device only'],
    },
  },
  {
    id: 203, icon: 'm365', name: 'Microsoft 365',
    badge: 'Monthly', bc: '#0078D4',
    tagline: 'Always up-to-date across all your devices',
    desc: 'All Office apps + 1TB OneDrive + Teams + Copilot AI. Works on Windows, Mac, iOS & Android.',
    url: 'https://www.microsoft.com/en-us/microsoft-365/compare-microsoft-365-enterprise-plans',
    price: 6,
    chips: ['Word, Excel, PowerPoint','1TB OneDrive','Microsoft Teams','Copilot AI','Up to 5 Devices','Always Latest'],
    specs: [
      { k: 'License',  v: 'Monthly Sub' },
      { k: 'Devices',  v: 'Up to 5' },
      { k: 'Storage',  v: '1TB OneDrive' },
      { k: 'Delivery', v: 'Account via Bot' },
    ],
    cmp: {
      vs: 'vs Office Pro Plus',
      pros: ['Win, Mac, iOS, Android','1TB cloud + Teams','Always latest + Copilot','Multi-device'],
      cons: ['Monthly recurring cost','Needs internet','No Access on basic plan'],
    },
  },
];

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
var cart = [], order = null, pollTimer = null, pollStart = 0;
function $(id) { return document.getElementById(id); }

/* ══════════════════════════════════════════
   CART
══════════════════════════════════════════ */
function cartTotal() {
  return cart.reduce(function(s, i) { return s + i.price * MULT * i.qty; }, 0);
}
function cartQty() {
  return cart.reduce(function(s, i) { return s + i.qty; }, 0);
}
function addToCart(id, btn) {
  var p = PRODUCTS.find(function(x) { return x.id === id; });
  var e = cart.find(function(x) { return x.id === id; });
  if (e) { e.qty++; } else { cart.push(Object.assign({}, p, { qty: 1 })); }
  syncCart();
  toast(p.name + ' added');
  if (btn) {
    btn.classList.add('added');
    btn.innerHTML = '<i class="fas fa-check"></i> Added';
    setTimeout(function() {
      btn.classList.remove('added');
      btn.innerHTML = '<i class="fas fa-cart-plus"></i> Add';
    }, 1700);
  }
}
function syncCart() {
  var q = cartQty(), t = cartTotal();
  $('cartBadge').textContent = q;
  $('cartBadge').classList.toggle('on', q > 0);
  $('cartBar').classList.toggle('on', q > 0);
  $('barTotal').textContent = '$' + t.toFixed(2);
}

/* ══════════════════════════════════════════
   RENDER PRODUCTS
══════════════════════════════════════════ */
function renderProducts() {
  var list = $('prodList');
  PRODUCTS.forEach(function(p) {
    var disc = (p.price * MULT).toFixed(2);
    var el = document.createElement('div');
    el.className = 'card';
    el.innerHTML =
      '<div class="card-body">' +
        '<div class="card-top">' +
          '<div class="card-icon">' + ICONS[p.icon] + '</div>' +
          '<div class="card-meta">' +
            '<div class="card-name">' + p.name + '</div>' +
            '<div class="card-tag">' + p.tagline + '</div>' +
            '<span class="badge" style="background:' + p.bc + '18;color:' + p.bc + ';border:1px solid ' + p.bc + '2e">' + p.badge + '</span>' +
          '</div>' +
        '</div>' +
        '<p class="card-desc">' + p.desc + '</p>' +
        '<div class="chips">' +
          p.chips.map(function(c) { return '<span class="chip"><i class="fas fa-check"></i>' + c + '</span>'; }).join('') +
        '</div>' +
        '<div class="specs">' +
          p.specs.map(function(s) { return '<div class="sp"><span class="sk">' + s.k + '</span><span class="sv">' + s.v + '</span></div>'; }).join('') +
        '</div>' +
        (p.cmp
          ? '<div class="cmp-btn" data-id="' + p.id + '">' +
              '<i class="fas fa-scale-balanced ci"></i> Compare ' + p.cmp.vs +
              '<i class="fas fa-chevron-down chevron" id="chev' + p.id + '"></i>' +
            '</div>' +
            '<div class="cmp-panel" id="cmpP' + p.id + '">' +
              '<div class="cmp-grid">' +
                '<div><div class="cmp-head" style="color:var(--green)">&#10003; Pros</div>' +
                  p.cmp.pros.map(function(x) { return '<div class="cmp-item">&#8226; ' + x + '</div>'; }).join('') +
                '</div>' +
                '<div><div class="cmp-head" style="color:var(--red)">&#10007; Cons</div>' +
                  p.cmp.cons.map(function(x) { return '<div class="cmp-item">&#8226; ' + x + '</div>'; }).join('') +
                '</div>' +
              '</div>' +
            '</div>'
          : '') +
      '</div>' +
      '<div class="card-foot">' +
        '<div class="price-col">' +
          '<div class="p-was">$' + p.price.toFixed(2) + '</div>' +
          '<div class="p-now">$' + disc + '</div>' +
          '<span class="p-save">50% OFF</span>' +
        '</div>' +
        '<div class="card-actions">' +
          '<a class="btn-ghost" href="' + p.url + '" target="_blank" rel="noopener">' +
            '<i class="fas fa-arrow-up-right-from-square"></i> Details' +
          '</a>' +
          '<button class="btn-add" data-id="' + p.id + '">' +
            '<i class="fas fa-cart-plus"></i> Add' +
          '</button>' +
        '</div>' +
      '</div>';
    list.appendChild(el);
  });

  list.addEventListener('click', function(e) {
    var tog = e.target.closest('.cmp-btn');
    if (tog) {
      var id = tog.dataset.id;
      var open = $('cmpP' + id).classList.toggle('open');
      $('chev' + id).style.transform = open ? 'rotate(180deg)' : '';
      return;
    }
    var btn = e.target.closest('.btn-add');
    if (btn) { addToCart(parseInt(btn.dataset.id, 10), btn); }
  });
}

/* ══════════════════════════════════════════
   CART SHEET
══════════════════════════════════════════ */
function renderCart() {
  var body = $('cartBody');
  if (!cart.length) {
    body.innerHTML = '<div class="empty"><i class="fas fa-bag-shopping"></i>Your cart is empty</div>';
    $('toCheckout').disabled = true;
  } else {
    $('toCheckout').disabled = false;
    body.innerHTML = cart.map(function(item) {
      return '<div class="ci">' +
        '<div class="ci-ico">' + ICONS[item.icon] + '</div>' +
        '<div class="ci-info">' +
          '<div class="ci-name">' + item.name + '</div>' +
          '<div class="ci-price">$' + (item.price * MULT).toFixed(2) + ' each</div>' +
        '</div>' +
        '<div class="ci-ctrl">' +
          '<button class="qb" data-id="' + item.id + '" data-a="dec">&#8722;</button>' +
          '<span class="qv">' + item.qty + '</span>' +
          '<button class="qb" data-id="' + item.id + '" data-a="inc">+</button>' +
          '<button class="rm-btn" data-id="' + item.id + '" data-a="rm"><i class="fas fa-trash-can"></i></button>' +
        '</div>' +
      '</div>';
    }).join('');

    body.querySelectorAll('[data-a]').forEach(function(b) {
      b.onclick = function() {
        var id = parseInt(b.dataset.id, 10), a = b.dataset.a;
        var item = cart.find(function(x) { return x.id === id; });
        if (a === 'inc') { item.qty++; }
        else if (a === 'dec') {
          item.qty--;
          if (item.qty <= 0) { cart = cart.filter(function(x) { return x.id !== id; }); }
        } else {
          cart = cart.filter(function(x) { return x.id !== id; });
        }
        syncCart(); renderCart();
      };
    });
  }

  var sub = cart.reduce(function(s, i) { return s + i.price * i.qty; }, 0);
  var tot = cartTotal();
  $('cartTotals').innerHTML =
    '<div class="row"><span class="lbl">Subtotal</span><span>$' + sub.toFixed(2) + '</span></div>' +
    '<div class="row"><span class="lbl">Discount (' + DISC + '%)</span><span class="disc">&#8722;$' + (sub - tot).toFixed(2) + '</span></div>' +
    '<div class="row big"><span>Total</span><span>$' + tot.toFixed(2) + '</span></div>';
}

/* ══════════════════════════════════════════
   CHECKOUT
══════════════════════════════════════════ */
function renderCoSummary() {
  var tot = cartTotal(), sub = cart.reduce(function(s, i) { return s + i.price * i.qty; }, 0);
  $('coSummary').innerHTML =
    '<div style="background:rgba(0,0,0,.2);border:1px solid var(--border);border-radius:var(--r2);padding:14px 15px;margin-bottom:4px">' +
    cart.map(function(i) {
      return '<div class="row"><span class="lbl">' + i.name + ' &times;' + i.qty + '</span>' +
             '<span>$' + (i.price * MULT * i.qty).toFixed(2) + '</span></div>';
    }).join('') +
    '<div class="row"><span class="lbl">Discount</span><span class="disc">&#8722;$' + (sub - tot).toFixed(2) + '</span></div>' +
    '<div class="row big"><span>Total</span><span>$' + tot.toFixed(2) + '</span></div>' +
    '</div>';
}

function validPhone(p) { return /^(?:\+855|0)[1-9]\d{7,8}$/.test(p.replace(/[\s\-().]/g, '')); }
function validEmail(e) { return !e.trim() || /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }

function startPayment() {
  var name = $('fName').value.trim();
  var phone = $('fPhone').value.trim();
  var email = $('fEmail').value.trim();

  [$('fName'), $('fPhone'), $('fEmail')].forEach(function(el) { el.classList.remove('err'); });
  $('fErr').style.display = 'none';

  if (!name) {
    $('fName').classList.add('err');
    $('fErr').textContent = 'Please enter your full name.';
    $('fErr').style.display = 'block'; return;
  }
  if (!validPhone(phone)) {
    $('fPhone').classList.add('err');
    $('fErr').textContent = 'Please enter a valid Cambodian phone number.';
    $('fErr').style.display = 'block'; return;
  }
  if (!validEmail(email)) {
    $('fEmail').classList.add('err');
    $('fErr').textContent = 'Please enter a valid email address.';
    $('fErr').style.display = 'block'; return;
  }

  var now = new Date();
  var sub = cart.reduce(function(s, i) { return s + i.price * i.qty; }, 0);
  var tot = cartTotal();
  order = {
    invoiceNumber: Math.floor(Math.random() * 900000) + 100000,
    issueDate: now.toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' }),
    issueTime: now.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' }),
    subtotal: sub, discountAmount: sub - tot, total: tot,
    customerName: name, customerPhone: phone, customerEmail: email,
    items: cart.map(function(i) { return Object.assign({}, i); }),
    buyerChatId: buyerChatId,
  };

  closeSheet('shCheckout');
  openSheet('shPay');
  renderPayScreen(tot);
}

/* ══════════════════════════════════════════
   PAYMENT SCREEN
   1. Call Worker /create-payment → PayWay API
   2. Display dynamic QR (amount pre-filled)
   3. Auto-poll /verify every 4s
   4. On verified → send to /notify → invoice + key
══════════════════════════════════════════ */
function renderPayScreen(total) {
  /* Loading state */
  $('payBody').innerHTML =
    '<div class="amt-hero">' +
      '<div class="amt-lbl">Preparing your payment</div>' +
      '<div class="amt-big">$' + total.toFixed(2) + '</div>' +

    '<div style="text-align:center;padding:50px 0">' +

        '</div>' +

            '<code style="background:rgba(255,255,255,.07);padding:2px 8px;border-radius:4px">PAYWAY_MERCHANT_ID</code><br>' +
            '<code style="background:rgba(255,255,255,.07);padding:2px 8px;border-radius:4px">PAYWAY_API_KEY</code><br>' +
            '<code style="background:rgba(255,255,255,.07);padding:2px 8px;border-radius:4px">PAYWAY_ENV</code> (sandbox / production)<br><br>' +
            'Register at <strong style="color:var(--text)">developer.payway.com.kh</strong><br>' +
            'MID: <strong style="color:var(--text)">125092910240277</strong>' +
          '</div>' +

      $('payFoot').innerHTML = '<button class="btn-secondary" style="margin-top:0" id="closePayErr">Close</button>';
      $('closePayErr').onclick = function() { closeSheet('shPay'); };

}

function showPayWayQR(total, qr) {

     On desktop: show QR code for scanning with phone. */
  var isMobile = ('ontouchstart' in window) || (window.innerWidth < 640);
  var deeplink = qr.abapay_deeplink || '';

  var qrSection = isMobile && deeplink
    ? '<div style="text-align:center;padding:10px 0 4px">' +
        '<div style="font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.6">' +
          'You are on your phone.<br>Tap the button below to open ABA Mobile.' +
        '</div>' +
        '<button id="abaBtn" data-link="' + encodeURIComponent(deeplink) + '" style="display:inline-flex;align-items:center;gap:10px;' +
          'background:linear-gradient(135deg,#D32F2F,#B71C1C);color:#fff;border:none;' +
          'padding:14px 28px;border-radius:14px;font-size:16px;font-weight:800;' +
          'box-shadow:0 4px 20px rgba(211,47,47,.4);font-family:inherit;cursor:pointer">' +
          '<svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>' +
          'Open ABA Mobile' +
        '</button>' +
        '<div style="font-size:11px;color:var(--muted);margin-top:12px">Or scroll down to scan QR with another device</div>' +
      '</div>' +
      '<div class="qr-box" style="margin-top:14px;opacity:.7">' +
        '<img src="' + qr.qrImage + '" alt="ABA PayWay QR">' +
        '<div class="qr-merchant">VANN SOK SAM RONG</div>' +
        '<div class="qr-bank">ABA Bank &middot; KHQR &middot; Valid 30 min</div>' +
      '</div>'
    : '<div class="qr-box">' +
        '<img src="' + qr.qrImage + '" alt="ABA PayWay QR">' +
        '<div class="qr-merchant">VANN SOK SAM RONG</div>' +
        '<div class="qr-bank">ABA Bank &middot; KHQR &middot; Valid 30 min</div>' +
      '</div>' +
      '<div class="steps-box">' +
        '<div class="steps-lbl">How to pay</div>' +
        '<div class="step"><span class="sn">1</span>Open <strong>ABA Mobile</strong> on your phone</div>' +
        '<div class="step"><span class="sn">2</span>Tap <strong>Scan QR</strong> &rarr; scan the code</div>' +
        '<div class="step"><span class="sn">3</span><span style="color:var(--green);font-weight:700">Amount already set</span> &mdash; just confirm</div>' +
        '<div class="step"><span class="sn">4</span>Invoice &amp; license key delivered <strong>automatically</strong></div>' +
      '</div>';

  $('payBody').innerHTML =
    '<div class="amt-hero">' +
      '<div class="amt-lbl">Amount pre-filled &#8212; just confirm &amp; pay</div>' +
      '<div class="amt-big">$' + total.toFixed(2) + '</div>' +
      '<div class="amt-cur">USD &bull; <span style="color:var(--green);font-weight:700">No manual entry</span></div>' +
    '</div>' +

  $('payFoot').innerHTML = '<button class="btn-secondary" style="margin-top:0" id="cancelPay">Cancel Payment</button>';
  $('cancelPay').onclick = function() { stopPolling(); closeSheet('shPay'); };

  /* Wire up ABA Mobile button after DOM is ready */
  var abaBtn = $('abaBtn');
  if (abaBtn) {
    abaBtn.onclick = function() {
      var link = decodeURIComponent(abaBtn.getAttribute('data-link') || '');
      if (!link) return;
      /* Telegram WebApp: use openLink for custom schemes */
      if (tg && tg.openLink) {
        try { tg.openLink(link); return; } catch(e) {}
      }
      /* Fallback: direct navigation */
      window.location.href = link;
    };
  }

  startPolling(total);
}

/* ══════════════════════════════════════════
   POLLING — verified ONLY via real webhook
   Worker /verify is read-only; writes come
   only from PayWay → /webhook → KV
══════════════════════════════════════════ */
function startPolling(total) {
  stopPolling();
  pollStart = Date.now();
  var dots = 0, secs = 0;

  var dotsT = setInterval(function() {
    var el = $('adots'); if (el) { el.textContent = '.'.repeat((dots++ % 3) + 1); }
  }, 500);

  var secsT = setInterval(function() {
    var el = $('psecs'); if (el) { el.textContent = (++secs) + 's'; }
  }, 1000);

  pollTimer = setInterval(function() {
    var elapsed = Date.now() - pollStart;

    if (elapsed >= POLL_MAX) {
      stopPolling(); clearInterval(dotsT); clearInterval(secsT);
      $('payBody').innerHTML =
        '<div class="amt-hero">' +
          '<div class="amt-lbl">Not detected</div>' +
          '<div class="amt-big">$' + (total || order.total).toFixed(2) + '</div>' +
        '</div>' +
        '<div class="status-card s-fail">' +
          '<div class="st-ico"><i class="fas fa-clock"></i></div>' +
          '<div class="st-ttl">Timed Out</div>' +
          '<div class="st-msg">No payment received in 10 min.<br>If you paid, contact <strong>@chamrong_vann</strong></div>' +
        '</div>';
      $('payFoot').innerHTML = '<button class="btn-primary" id="retryBtn"><i class="fas fa-rotate-right"></i>Try Again</button>';
      $('retryBtn').onclick = function() { renderPayScreen(order.total); };
      return;
    }

    fetch(WORKER + '/verify?invoice=' + order.invoiceNumber + '&amount=' + order.total.toFixed(2))
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.verified) {
          stopPolling(); clearInterval(dotsT); clearInterval(secsT);
          onPaymentVerified(d);
        }
      })
      .catch(function() { /* network error — retry next tick */ });
  }, 4000);
}

function stopPolling() { if (pollTimer) { clearInterval(pollTimer); pollTimer = null; } }

/* ══════════════════════════════════════════
   PAYMENT VERIFIED
══════════════════════════════════════════ */
function onPaymentVerified(vData) {

  $('payBody').innerHTML =

      '<div class="amt-lbl">Payment received</div>' +
      '<div class="amt-big" style="background:linear-gradient(135deg,var(--green),#16a869);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">' +
        '$' + order.total.toFixed(2) +
      '</div>' +
    '</div>' +
    '<div class="status-card s-ok">' +
      '<div class="st-ico"><i class="fas fa-circle-check"></i></div>' +
      '<div class="st-ttl">Payment Confirmed!</div>' +
      '<div class="st-msg">' +
        '<strong style="color:var(--text)">' + (vData.payment_type || 'ABA Pay') + '</strong><br>' +
        'Tx: <span style="font-family:\'JetBrains Mono\',monospace;font-size:11px">' + vData.transaction_id + '</span><br><br>' +
        '<span class="pulse">Generating invoice &amp; releasing license key&hellip;</span>' +
      '</div>' +
    '</div>';
  $('payFoot').innerHTML = '';

  /* Notify backend: sends Telegram to admin + buyer, delivers license key */
  fetch(WORKER + '/notify', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      text: buildAdminMsg(order, vData),
      order: order,
      verifyData: vData,
    }),
  }).catch(function() {});

  /* Show invoice after brief pause */
  setTimeout(function() {
    closeSheet('shPay');
    showInvoice(order, vData);
    cart = []; syncCart(); order = null;
  }, 2000);
}

window.setLicenseKey = function(key) {

  return '\u2705 *New Order \u2014 xstore*\n\n' +
    '\uD83D\uDCCB *Invoice:* #' + o.invoiceNumber + '\n' +
    '\uD83D\uDCC5 *Date:* ' + o.issueDate + ' ' + o.issueTime + '\n\n' +
    '\uD83D\uDC64 *Customer:*\n' + o.customerName + '\n' + o.customerPhone + (o.customerEmail ? '\n' + o.customerEmail : '') + '\n\n' +
    '\uD83D\uDED2 *Items:*\n' + items + '\n\n' +
    '\uD83D\uDCB0 *Total:* $' + o.total.toFixed(2) + '\n' +
    '\uD83D\uDCB3 *Method:* ' + (vData.payment_type || 'ABA Pay') + '\n' +
    '\uD83D\uDD17 *Tx:* `' + vData.transaction_id + '`\n\n' +
    '_/deliver ' + o.invoiceNumber + ' to send license key_';
}

/* ══════════════════════════════════════════
   SHEET SYSTEM
══════════════════════════════════════════ */
var SHEETS = ['shCart', 'shCheckout', 'shPay', 'shInv'];

function openSheet(id) {
  $('overlay').classList.add('on');
  $(id).classList.add('on');
  if (tg) { try { tg.BackButton.show(); } catch(e) {} }
}
function closeSheet(id) {
  $(id).classList.remove('on');
  var any = SHEETS.some(function(s) { return $(s).classList.contains('on'); });
  if (!any) {
    $('overlay').classList.remove('on');
    if (tg) { try { tg.BackButton.hide(); } catch(e) {} }
  }
}
function closeAll() {
  SHEETS.forEach(function(s) { $(s).classList.remove('on'); });
  $('overlay').classList.remove('on');
  if (tg) { try { tg.BackButton.hide(); } catch(e) {} }
}

/* ══════════════════════════════════════════
   TOAST
══════════════════════════════════════════ */
var toastTimer;
function toast(msg) {
  $('toastMsg').textContent = msg;
  $('toast').classList.add('on');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { $('toast').classList.remove('on'); }, 2300);
}

/* ══════════════════════════════════════════
   COUNTDOWN
══════════════════════════════════════════ */
function startCountdown() {
  var end = parseInt(localStorage.getItem('xs_sale') || '0', 10);
  if (!end || Date.now() > end) {
    end = Date.now() + SALE_MS;
    localStorage.setItem('xs_sale', end);
  }
  function tick() {
    var d = end - Date.now();
    if (d < 0) { localStorage.removeItem('xs_sale'); startCountdown(); return; }
    $('tD').textContent = String(Math.floor(d / 86400000)).padStart(2, '0');
    $('tH').textContent = String(Math.floor(d % 86400000 / 3600000)).padStart(2, '0');
    $('tM').textContent = String(Math.floor(d % 3600000 / 60000)).padStart(2, '0');
    $('tS').textContent = String(Math.floor(d % 60000 / 1000)).padStart(2, '0');
  }
  tick(); setInterval(tick, 1000);
}

if (tg) {

    tg.BackButton.onClick(function() {
      var rev = SHEETS.slice().reverse();
      for (var i = 0; i < rev.length; i++) {
        if ($(rev[i]).classList.contains('on')) { closeSheet(rev[i]); return; }
      }
    });
  } catch(e) {}
}

/* ══════════════════════════════════════════
   OPEN ABA MOBILE DEEPLINK
   Telegram WebApp blocks <a href> for custom
   URL schemes — must use these methods instead
══════════════════════════════════════════ */
function openABA(deeplink) {
  if (!deeplink) return;
  // Method 1: Telegram WebApp openLink (works in Telegram)
  if (tg && tg.openLink) {
    try { tg.openLink(deeplink); return; } catch(e) {}
  }
  // Method 2: window.location for native scheme
  try { window.location.href = deeplink; } catch(e) {}
}
