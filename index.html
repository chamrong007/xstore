<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>xstore</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* ━━━ RESET ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Outfit',sans-serif;
  background:#06080f;
  color:#eef0ff;
  min-height:100vh;
  overscroll-behavior:none;
  -webkit-tap-highlight-color:transparent;
}
::-webkit-scrollbar{width:0}
img{display:block;max-width:100%}
button,a{cursor:pointer;font-family:'Outfit',sans-serif}

/* ━━━ CSS VARIABLES ━━━━━━━━━━━━━━━━━━━━━━━━ */
:root{
  --bg:         #06080f;
  --g1:         rgba(255,255,255,.055);
  --g2:         rgba(255,255,255,.09);
  --gb:         rgba(255,255,255,.08);
  --gb2:        rgba(255,255,255,.16);
  --blur:       blur(28px);
  --blur2:      blur(48px);
  --gold:       #f4a224;
  --gold2:      #ff6b2b;
  --ggrad:      linear-gradient(135deg,#f4a224,#ff6b2b);
  --green:      #2de07a;
  --red:        #ff5068;
  --blue:       #5b9cf6;
  --violet:     #a78bfa;
  --text:       #eef0ff;
  --sub:        rgba(238,240,255,.45);
  --sub2:       rgba(238,240,255,.25);
  --r:          18px;
  --r2:         12px;
  --r3:         8px;
}

/* ━━━ AURORA ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
#aurora{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.5}
.o1{width:500px;height:500px;background:radial-gradient(#1a3a8f,transparent 70%);top:-120px;left:-100px;animation:drift 22s ease-in-out infinite alternate}
.o2{width:380px;height:380px;background:radial-gradient(#5b21b6,transparent 70%);top:35%;right:-90px;animation:drift 28s ease-in-out infinite alternate;animation-delay:-10s}
.o3{width:320px;height:320px;background:radial-gradient(#0d4f3c,transparent 70%);bottom:-60px;left:15%;animation:drift 24s ease-in-out infinite alternate;animation-delay:-16s}
.o4{width:200px;height:200px;background:radial-gradient(rgba(244,162,36,.25),transparent 70%);top:55%;left:5%;animation:drift 18s ease-in-out infinite alternate;animation-delay:-6s}
@keyframes drift{from{transform:translate(0,0) scale(1)}to{transform:translate(28px,18px) scale(1.08)}}

/* ━━━ LAYOUT ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
#root{position:relative;z-index:1;max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.page{flex:1;overflow-y:auto;padding-bottom:100px}

/* ━━━ TOPBAR ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.topbar{
  padding:14px 16px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(6,8,15,.7);backdrop-filter:var(--blur);
  border-bottom:1px solid var(--gb);position:sticky;top:0;z-index:20;
}
.logo{font-size:21px;font-weight:900;letter-spacing:-1px;line-height:1}
.logo-x{color:var(--gold)}
.cart-btn{
  display:flex;align-items:center;gap:7px;
  background:var(--g2);backdrop-filter:var(--blur);
  border:1px solid var(--gb2);border-radius:100px;
  padding:8px 15px;font-size:13px;font-weight:600;color:var(--text);
  transition:background .2s,transform .1s;border:none;
}
.cart-btn:active{background:rgba(255,255,255,.14);transform:scale(.96)}
.cart-num{
  background:var(--ggrad);color:#000;border-radius:100px;
  padding:1px 8px;font-size:11px;font-weight:800;display:none;
}
.cart-num.on{display:block}

/* ━━━ SALE BANNER ━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.sale{
  margin:12px 14px;
  background:linear-gradient(135deg,rgba(244,162,36,.1),rgba(255,107,43,.06));
  border:1px solid rgba(244,162,36,.2);border-radius:var(--r);
  padding:16px;position:relative;overflow:hidden;
}
.sale::after{
  content:'';position:absolute;top:-40px;right:-40px;
  width:140px;height:140px;border-radius:50%;
  background:radial-gradient(rgba(244,162,36,.12),transparent 70%);
  pointer-events:none;
}
.sale-pill{
  display:inline-flex;align-items:center;gap:5px;
  font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;
  letter-spacing:1.5px;background:rgba(244,162,36,.1);
  border:1px solid rgba(244,162,36,.2);border-radius:100px;
  padding:3px 10px;margin-bottom:7px;
}
.sale-title{font-size:23px;font-weight:900;letter-spacing:-.5px;line-height:1.1}
.sale-title em{color:var(--gold);font-style:normal}
.timer{display:flex;gap:6px;margin-top:10px}
.tu{
  background:rgba(255,255,255,.06);border:1px solid var(--gb);
  border-radius:var(--r3);padding:6px 10px;text-align:center;min-width:48px;
}
.tn{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:600;line-height:1}
.tl{font-size:9px;color:var(--sub);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}

/* ━━━ SECTION LABEL ━━━━━━━━━━━━━━━━━━━━━━━━ */
.sec-lbl{
  font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;
  letter-spacing:2.5px;margin:20px 16px 10px;
}

/* ━━━ PRODUCT CARD ━━━━━━━━━━━━━━━━━━━━━━━━━ */
.pcard{
  margin:0 14px 12px;
  background:var(--g1);backdrop-filter:var(--blur2);
  border:1px solid var(--gb);border-radius:var(--r);
  overflow:hidden;animation:up .45s ease both;
  transition:border-color .25s;
}
.pcard:nth-child(2){animation-delay:.08s}
.pcard:nth-child(3){animation-delay:.16s}
.pcard-body{padding:18px}
.pcard-head{display:flex;align-items:flex-start;gap:14px;margin-bottom:14px}
.pcard-icon{
  width:54px;height:54px;border-radius:var(--r2);
  background:rgba(255,255,255,.07);border:1px solid var(--gb);
  display:flex;align-items:center;justify-content:center;
  font-size:26px;flex-shrink:0;
}
.pcard-meta{flex:1;min-width:0}
.pcard-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:5px}
.pcard-name{font-size:17px;font-weight:700;letter-spacing:-.3px}
.badge{
  font-size:10px;font-weight:700;padding:3px 9px;
  border-radius:100px;letter-spacing:.3px;
}
.pcard-tagline{font-size:12px;color:var(--sub);line-height:1.5}
.pcard-desc{font-size:13px;color:var(--sub);line-height:1.65;margin-bottom:14px}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.chip{
  background:rgba(255,255,255,.05);border:1px solid var(--gb);
  border-radius:100px;padding:4px 11px;
  font-size:11px;font-weight:500;color:var(--sub);
  display:flex;align-items:center;gap:5px;
}
.chip i{color:var(--green);font-size:9px}
.specs{
  background:rgba(0,0,0,.3);border:1px solid var(--gb);
  border-radius:var(--r2);overflow:hidden;margin-bottom:14px;
}
.srow{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 14px;border-bottom:1px solid var(--gb);font-size:12px;
}
.srow:last-child{border:none}
.sk{color:var(--sub)}
.sv{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500}
.cmp-toggle{
  display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;
  color:var(--sub);cursor:pointer;padding:10px 0;
  border-top:1px solid var(--gb);user-select:none;
}
.cmp-toggle .ci{color:var(--gold)}
.caret{margin-left:auto;font-size:10px;transition:transform .25s}
.cmp-body{display:none;padding-bottom:4px}
.cmp-body.open{display:block}
.cmp-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:10px}
.cmp-head{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.cmp-item{font-size:11px;color:var(--sub);margin-bottom:4px;line-height:1.4}

/* card footer */
.pcard-foot{
  padding:14px 18px;background:rgba(0,0,0,.25);
  border-top:1px solid var(--gb);
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.price-wrap{}
.p-old{font-size:12px;color:var(--sub2);text-decoration:line-through}
.p-new{font-size:25px;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--gold);letter-spacing:-1px;line-height:1}
.p-off{
  display:inline-block;font-size:10px;font-weight:700;
  background:rgba(244,162,36,.12);border:1px solid rgba(244,162,36,.2);
  color:var(--gold);padding:2px 7px;border-radius:4px;margin-top:4px;
}
.card-actions{display:flex;gap:8px}
.btn-info{
  background:rgba(255,255,255,.06);border:1px solid var(--gb2);
  color:var(--sub);padding:10px 12px;border-radius:var(--r2);
  font-size:12px;font-weight:600;text-decoration:none;color:var(--sub);
  display:flex;align-items:center;gap:6px;white-space:nowrap;
  transition:color .2s;
}
.btn-info:active{color:var(--text)}
.btn-add{
  background:var(--ggrad);color:#000;border:none;
  padding:10px 18px;border-radius:var(--r2);
  font-size:13px;font-weight:800;
  display:flex;align-items:center;gap:7px;white-space:nowrap;
  transition:opacity .15s,transform .1s;
}
.btn-add:active{opacity:.8;transform:scale(.94)}
.btn-add.added{background:linear-gradient(135deg,var(--green),#16a869);color:#000}

/* ━━━ CART BAR ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.cartbar{
  position:fixed;bottom:0;left:0;right:0;z-index:25;
  padding:12px 14px;
  background:rgba(6,8,15,.9);backdrop-filter:var(--blur2);
  border-top:1px solid var(--gb);display:none;
  max-width:480px;margin:0 auto;left:50%;transform:translateX(-50%);width:100%;
}
.cartbar.on{display:block}
.cartbar-btn{
  width:100%;padding:15px;background:var(--ggrad);
  color:#000;border:none;border-radius:var(--r2);
  font-size:15px;font-weight:800;
  display:flex;align-items:center;justify-content:space-between;
  transition:opacity .2s;
}
.cartbar-btn:active{opacity:.85}
.cartbar-btn span{font-family:'JetBrains Mono',monospace;font-weight:600}

/* ━━━ OVERLAY ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
#overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);
  backdrop-filter:blur(5px);z-index:30;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
#overlay.on{opacity:1;pointer-events:all}

/* ━━━ BOTTOM SHEET ━━━━━━━━━━━━━━━━━━━━━━━━━ */
.sheet{
  position:fixed;bottom:0;left:50%;z-index:40;
  width:100%;max-width:480px;max-height:93vh;
  transform:translate(-50%,100%);
  transition:transform .38s cubic-bezier(.32,.72,0,1);
  background:rgba(8,11,22,.97);backdrop-filter:var(--blur2);
  border:1px solid var(--gb);border-bottom:none;
  border-radius:22px 22px 0 0;
  display:flex;flex-direction:column;
}
.sheet.on{transform:translate(-50%,0)}
.pill{
  width:38px;height:4px;background:rgba(255,255,255,.14);
  border-radius:2px;margin:12px auto 0;flex-shrink:0;
}
.sh-head{
  padding:14px 20px;border-bottom:1px solid var(--gb);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.sh-title{font-size:18px;font-weight:700}
.sh-x{
  width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,.07);border:1px solid var(--gb);
  color:var(--sub);display:flex;align-items:center;justify-content:center;
  font-size:13px;border:none;transition:background .2s;
}
.sh-x:active{background:rgba(255,255,255,.14)}
.sh-body{flex:1;overflow-y:auto;padding:18px 20px}
.sh-foot{
  padding:12px 20px calc(14px + env(safe-area-inset-bottom,0px));
  border-top:1px solid var(--gb);background:rgba(0,0,0,.2);flex-shrink:0;
}

/* ━━━ CART ITEMS ━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.ci{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--gb)}
.ci:last-child{border:none}
.ci-ico{width:40px;height:40px;border-radius:var(--r3);background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:13px;font-weight:600}
.ci-price{font-size:12px;color:var(--sub);margin-top:2px}
.ci-ctrl{display:flex;align-items:center;gap:8px}
.qb{width:30px;height:30px;border-radius:var(--r3);background:rgba(255,255,255,.07);border:1px solid var(--gb);color:var(--text);font-size:15px;display:flex;align-items:center;justify-content:center;transition:background .15s;border:none}
.qb:active{background:rgba(255,255,255,.16)}
.qv{font-family:'JetBrains Mono',monospace;font-size:14px;min-width:22px;text-align:center}
.rm{background:none;border:none;color:rgba(255,80,104,.7);padding:4px;font-size:13px}

/* ━━━ ORDER ROWS ━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.orow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;font-size:13px}
.lbl{color:var(--sub)}
.orow.total{font-size:18px;font-weight:700;border-top:1px solid var(--gb);margin-top:8px;padding-top:14px}
.disc{color:var(--green)}

/* ━━━ FORM ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.flabel{display:block;font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:1px;margin:15px 0 6px}
.finput{
  width:100%;padding:13px 15px;
  background:rgba(255,255,255,.06);backdrop-filter:var(--blur);
  border:1px solid var(--gb);border-radius:var(--r2);
  color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;
  outline:none;transition:border-color .2s,background .2s;
}
.finput:focus{border-color:rgba(244,162,36,.5);background:rgba(255,255,255,.09)}
.finput.err{border-color:rgba(255,80,104,.6)}
.finput::placeholder{color:var(--sub2)}
.ferr{color:var(--red);font-size:12px;margin-top:8px;display:none}

/* ━━━ BUTTONS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.btn-p{
  width:100%;padding:15px;background:var(--ggrad);
  color:#000;border:none;border-radius:var(--r2);
  font-size:15px;font-weight:800;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:opacity .2s,transform .1s;
}
.btn-p:active{opacity:.85;transform:scale(.98)}
.btn-p:disabled{opacity:.3;cursor:not-allowed}
.btn-g{
  width:100%;padding:13px;margin-top:9px;
  background:rgba(255,255,255,.05);border:1px solid var(--gb);
  color:var(--text);border-radius:var(--r2);
  font-size:14px;font-weight:600;
  transition:background .2s;border:none;
}
.btn-g:active{background:rgba(255,255,255,.1)}

/* ━━━ STATUS CARDS ━━━━━━━━━━━━━━━━━━━━━━━━━ */
.status{border-radius:var(--r2);padding:22px;text-align:center;margin:8px 0}
.s-wait{background:rgba(91,156,246,.07);border:1px solid rgba(91,156,246,.18)}
.s-ok  {background:rgba(45,224,122,.07);border:1px solid rgba(45,224,122,.18)}
.s-err {background:rgba(255,80,104,.07);border:1px solid rgba(255,80,104,.18)}
.s-ico{font-size:34px;margin-bottom:12px}
.s-title{font-size:16px;font-weight:700;margin-bottom:7px}
.s-msg{font-size:13px;color:var(--sub);line-height:1.65}
.s-wait .s-ico{color:var(--blue)}
.s-ok   .s-ico{color:var(--green)}
.s-err  .s-ico{color:var(--red)}
.prog-bar{width:100%;height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;margin-top:12px}
.prog-fill{height:100%;width:0%;background:var(--ggrad);transition:width 1s linear}

/* ━━━ QR FRAME ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.amt-block{text-align:center;margin-bottom:18px}
.amt-lbl{font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}
.amt-val{
  font-size:58px;font-weight:900;font-family:'JetBrains Mono',monospace;
  background:var(--ggrad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;letter-spacing:-2px;line-height:1;
}
.amt-sub{font-size:13px;color:var(--sub);margin-top:5px}
.qr-frame{
  background:#fff;border-radius:18px;padding:18px;text-align:center;
  margin-bottom:16px;box-shadow:0 8px 48px rgba(0,0,0,.5);
}
.qr-frame img{width:100%;max-width:230px;height:auto;margin:0 auto;border-radius:10px}
.qr-name{font-size:14px;font-weight:700;color:#111;margin-top:12px}
.qr-bank{font-size:12px;color:#666;margin-top:2px}
.pay-steps{
  background:rgba(255,255,255,.04);border:1px solid var(--gb);
  border-radius:var(--r2);padding:15px;margin-bottom:14px;
}
.pay-steps-lbl{font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px}
.step{display:flex;align-items:center;gap:12px;font-size:13px;margin-bottom:10px}
.step:last-child{margin:0}
.snum{
  background:var(--ggrad);color:#000;border-radius:50%;
  width:24px;height:24px;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;flex-shrink:0;
}
.auto-strip{
  display:flex;align-items:center;gap:10px;
  background:rgba(91,156,246,.07);border:1px solid rgba(91,156,246,.18);
  border-radius:var(--r2);padding:12px 14px;
}
.auto-strip-text{flex:1}
.auto-strip-title{font-size:13px;font-weight:600}
.auto-strip-sub{font-size:11px;color:var(--sub);margin-top:2px}
.poll-secs{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--sub);flex-shrink:0}

/* ━━━ INVOICE ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.inv-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
.inv-brand{font-size:26px;font-weight:900;letter-spacing:-1px}
.inv-brand span{color:var(--gold)}
.inv-sub{font-size:11px;color:var(--sub);margin-top:3px;line-height:1.7}
.inv-right{text-align:right;font-size:12px;color:var(--sub);line-height:1.9}
.inv-right strong{font-size:15px;color:var(--text);font-weight:700;display:block}
.inv-sec{margin:14px 0}
.inv-sec-lbl{font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.inv-sec-val{font-size:13px;line-height:1.7}
.inv-tbl{width:100%;border-collapse:collapse;font-size:12px;margin:12px 0}
.inv-tbl th{text-align:left;padding:9px 10px;background:rgba(255,255,255,.05);color:var(--sub);font-weight:600}
.inv-tbl th:last-child,.inv-tbl td:last-child{text-align:right}
.inv-tbl td{padding:10px;border-bottom:1px solid var(--gb)}
.paid-tag{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(45,224,122,.09);border:1px solid rgba(45,224,122,.22);
  color:var(--green);padding:5px 14px;border-radius:100px;
  font-size:12px;font-weight:700;margin-top:12px;
}

/* ━━━ LICENSE KEY SPOILER ━━━━━━━━━━━━━━━━━━ */
.key-box{
  background:rgba(244,162,36,.06);
  border:1px dashed rgba(244,162,36,.28);
  border-radius:var(--r2);padding:18px;margin:16px 0;
}
.key-box-lbl{
  display:flex;align-items:center;gap:7px;
  font-size:10px;font-weight:700;color:var(--gold);
  text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;
}
.spoiler{position:relative;cursor:pointer;user-select:none;border-radius:var(--r3);overflow:hidden}
.spoiler-txt{
  font-family:'JetBrains Mono',monospace;font-size:13px;
  word-break:break-all;line-height:1.8;padding:8px;
  filter:blur(7px);transition:filter .4s cubic-bezier(.22,.68,0,1.2);
}
.spoiler-txt.open{filter:none}
.spoiler-mask{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(6,8,15,.5);backdrop-filter:blur(2px);border-radius:var(--r3);
  gap:7px;font-size:13px;font-weight:600;color:var(--gold);
  transition:opacity .3s;
}
.spoiler-mask.gone{opacity:0;pointer-events:none}
.copy-btn{
  display:none;margin-top:10px;padding:9px 16px;
  background:rgba(244,162,36,.1);border:1px solid rgba(244,162,36,.2);
  color:var(--gold);border-radius:var(--r3);
  font-size:12px;font-weight:700;
  align-items:center;gap:6px;transition:background .2s;
}
.copy-btn.on{display:inline-flex}
.copy-btn:active{background:rgba(244,162,36,.2)}

/* ━━━ TOAST ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
#toast{
  position:fixed;top:70px;left:50%;
  transform:translateX(-50%) translateY(-12px);
  background:rgba(10,14,28,.97);backdrop-filter:var(--blur);
  border:1px solid var(--gb2);color:var(--text);
  padding:9px 18px;border-radius:100px;
  font-size:13px;font-weight:600;
  display:flex;align-items:center;gap:8px;
  opacity:0;transition:all .25s;pointer-events:none;
  white-space:nowrap;z-index:99;
}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
#toast i{color:var(--green)}

/* ━━━ EMPTY ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.empty{text-align:center;padding:50px 0;color:var(--sub)}
.empty i{font-size:44px;display:block;margin-bottom:12px;opacity:.28}

/* ━━━ ANIMATIONS ━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.spin{animation:spin .75s linear infinite;display:inline-block}
.pulse{animation:pulse 1.5s ease infinite}
</style>
</head>
<body>

<!-- aurora -->
<div id="aurora">
  <div class="orb o1"></div>
  <div class="orb o2"></div>
  <div class="orb o3"></div>
  <div class="orb o4"></div>
</div>

<div id="root">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="logo"><span class="logo-x">x</span>store</div>
    <button class="cart-btn" id="cartBtn">
      <i class="fas fa-bag-shopping" style="font-size:13px"></i>Cart
      <span class="cart-num" id="cartNum">0</span>
    </button>
  </header>

  <!-- PAGE -->
  <div class="page" id="page">

    <!-- Sale -->
    <div class="sale">
      <div class="sale-pill"><i class="fas fa-bolt"></i>Flash Sale</div>
      <div class="sale-title">Save <em>50%</em><br>on all licenses</div>
      <div class="timer">
        <div class="tu"><div class="tn" id="tD">00</div><div class="tl">d</div></div>
        <div class="tu"><div class="tn" id="tH">00</div><div class="tl">h</div></div>
        <div class="tu"><div class="tn" id="tM">00</div><div class="tl">m</div></div>
        <div class="tu"><div class="tn" id="tS">00</div><div class="tl">s</div></div>
      </div>
    </div>

    <div class="sec-lbl">Available Licenses</div>
    <div id="prodList"></div>

  </div><!-- /page -->

  <!-- Cart bar -->
  <div class="cartbar" id="cartBar">
    <button class="cartbar-btn" id="cartBarBtn">
      <span><i class="fas fa-bag-shopping" style="margin-right:8px"></i>View Cart</span>
      <span id="barTotal">$0.00</span>
    </button>
  </div>

</div><!-- /root -->

<!-- overlay -->
<div id="overlay"></div>

<!-- ─── CART SHEET ──────────────────────── -->
<div class="sheet" id="shCart">
  <div class="pill"></div>
  <div class="sh-head">
    <span class="sh-title">Your Cart</span>
    <button class="sh-x" id="cartClose"><i class="fas fa-times"></i></button>
  </div>
  <div class="sh-body" id="cartBody"></div>
  <div class="sh-foot">
    <div id="cartTotals"></div>
    <button class="btn-p" id="toCheckout" style="margin-top:16px"><i class="fas fa-arrow-right"></i>Checkout</button>
    <button class="btn-g" id="cartContinue">Continue Shopping</button>
  </div>
</div>

<!-- ─── CHECKOUT SHEET ─────────────────── -->
<div class="sheet" id="shCheckout">
  <div class="pill"></div>
  <div class="sh-head">
    <span class="sh-title">Checkout</span>
    <button class="sh-x" id="coClose"><i class="fas fa-times"></i></button>
  </div>
  <div class="sh-body">
    <div id="coSummary"></div>
    <label class="flabel">Full Name *</label>
    <input class="finput" id="fName" placeholder="Chamrong Vann" autocomplete="name">
    <label class="flabel">Phone Number *</label>
    <input class="finput" id="fPhone" type="tel" placeholder="012 345 678" autocomplete="tel">
    <label class="flabel">Email (Optional)</label>
    <input class="finput" id="fEmail" type="email" placeholder="you@email.com" autocomplete="email">
    <div class="ferr" id="fErr"></div>
  </div>
  <div class="sh-foot">
    <button class="btn-p" id="payBtn"><i class="fas fa-lock"></i>Pay with ABA</button>
    <button class="btn-g" id="backCart">&#8592; Back to Cart</button>
  </div>
</div>

<!-- ─── PAYMENT SHEET ──────────────────── -->
<div class="sheet" id="shPay">
  <div class="pill"></div>
  <div class="sh-head"><span class="sh-title">Payment</span></div>
  <div class="sh-body" id="payBody"></div>
  <div class="sh-foot" id="payFoot"></div>
</div>

<!-- ─── INVOICE SHEET ─────────────────── -->
<div class="sheet" id="shInv">
  <div class="pill"></div>
  <div class="sh-head">
    <span class="sh-title">Invoice</span>
    <button class="sh-x" id="invClose"><i class="fas fa-times"></i></button>
  </div>
  <div class="sh-body" id="invBody"></div>
  <div class="sh-foot"><button class="btn-g" id="doneBtn">Done</button></div>
</div>

<!-- toast -->
<div id="toast"><i class="fas fa-check-circle"></i><span id="toastMsg"></span></div>

<script>
'use strict';
/* ══════════════════════════════════════════════
   CONFIG
══════════════════════════════════════════════ */
const WORKER   = 'https://xstore-notify.chamrong.workers.dev';
const DISC     = 50;
const MULT     = 1 - DISC / 100;
const SALE_MS  = 24 * 60 * 60 * 1000;
const POLL_MAX = 10 * 60 * 1000;

/* ══════════════════════════════════════════════
   TELEGRAM
══════════════════════════════════════════════ */
const tg = window.Telegram && window.Telegram.WebApp;
if (tg) {
  try { tg.ready(); tg.expand(); tg.enableClosingConfirmation(); } catch(e) {}
}
const buyerChatId = tg && tg.initDataUnsafe && tg.initDataUnsafe.user
  ? tg.initDataUnsafe.user.id : null;

/* ══════════════════════════════════════════════
   PRODUCTS
══════════════════════════════════════════════ */
const PRODUCTS = [
  {
    id: 101, ico: '&#x1FA9F;', name: 'Windows 11 Pro',
    badge: 'Lifetime', bc: '#5b9cf6',
    tagline: 'The most secure & intelligent Windows ever',
    desc: 'One-time license. BitLocker, Hyper-V, Remote Desktop, Windows Hello and AI Copilot+ features included.',
    url: 'https://www.microsoft.com/en-us/windows/windows-11',
    price: 20,
    chips: ['BitLocker','Remote Desktop','Windows Hello','Hyper-V','Copilot+ AI','Quick Machine Recovery'],
    specs: [
      {k:'License',v:'Perpetual'},{k:'Devices',v:'1 PC'},
      {k:'Version',v:'Win 11 Pro 25H2'},{k:'Delivery',v:'Key via Bot'},
    ],
    cmp: null,
  },
  {
    id: 202, ico: '&#x1F4CA;', name: 'Office Pro Plus 2024',
    badge: 'One-Time', bc: '#f97316',
    tagline: 'Full Office suite — pay once, own forever',
    desc: 'Word, Excel, PowerPoint, Outlook, Access, Publisher & OneNote. Works 100% offline. No subscription.',
    url: 'https://www.microsoft.com/en-us/microsoft-365/office/compare-office-products',
    price: 30,
    chips: ['Word & Excel','PowerPoint','Outlook','Access & Publisher','OneNote','Offline Ready'],
    specs: [
      {k:'License',v:'Perpetual'},{k:'Devices',v:'1 PC'},
      {k:'Version',v:'Office 2024 Pro+'},{k:'Delivery',v:'Key via Bot'},
    ],
    cmp: {
      vs:'vs Microsoft 365',
      pros:['Pay once — no monthly fees','100% offline capable','Access & Publisher included','Data stays local'],
      cons:['No cloud storage','No auto feature updates','Single device only'],
    },
  },
  {
    id: 203, ico: '&#x2601;&#xFE0F;', name: 'Microsoft 365',
    badge: 'Monthly', bc: '#2de07a',
    tagline: 'Always up-to-date across all your devices',
    desc: 'All Office apps + 1TB OneDrive + Teams + Copilot AI. Works on Windows, Mac, iOS & Android.',
    url: 'https://www.microsoft.com/en-us/microsoft-365/compare-microsoft-365-enterprise-plans',
    price: 6,
    chips: ['Word, Excel, PowerPoint','1TB OneDrive','Microsoft Teams','Copilot AI','Up to 5 Devices','Always Latest'],
    specs: [
      {k:'License',v:'Monthly Sub'},{k:'Devices',v:'Up to 5'},
      {k:'Storage',v:'1TB OneDrive'},{k:'Delivery',v:'Account via Bot'},
    ],
    cmp: {
      vs:'vs Office Pro Plus',
      pros:['Win, Mac, iOS, Android','1TB cloud storage','Latest features + Copilot','Teams collaboration'],
      cons:['Monthly recurring cost','Needs internet','No Access on basic plan'],
    },
  },
];

/* ══════════════════════════════════════════════
   STATE
══════════════════════════════════════════════ */
let cart = [], order = null, pollTimer = null, pollStart = 0;
const $ = id => document.getElementById(id);

/* ══════════════════════════════════════════════
   CART
══════════════════════════════════════════════ */
function cartTotal() { return cart.reduce((s,i) => s + i.price * MULT * i.qty, 0); }
function cartQty()   { return cart.reduce((s,i) => s + i.qty, 0); }

function addToCart(id, btn) {
  const p = PRODUCTS.find(x => x.id === id);
  const e = cart.find(x => x.id === id);
  if (e) e.qty++; else cart.push({ ...p, qty: 1 });
  syncCart();
  showToast(p.name + ' added');
  if (btn) {
    btn.classList.add('added');
    btn.innerHTML = '<i class="fas fa-check"></i> Added';
    setTimeout(function() {
      btn.classList.remove('added');
      btn.innerHTML = '<i class="fas fa-cart-plus"></i> Add';
    }, 1700);
  }
}

function syncCart() {
  const q = cartQty(), t = cartTotal();
  $('cartNum').textContent = q;
  $('cartNum').classList.toggle('on', q > 0);
  $('cartBar').classList.toggle('on', q > 0);
  $('barTotal').textContent = '$' + t.toFixed(2);
}

/* ══════════════════════════════════════════════
   RENDER PRODUCTS
══════════════════════════════════════════════ */
function renderProducts() {
  const list = $('prodList');
  PRODUCTS.forEach(function(p) {
    const disc = (p.price * MULT).toFixed(2);
    const el   = document.createElement('div');
    el.className = 'pcard';
    el.innerHTML =
      '<div class="pcard-body">' +
        '<div class="pcard-head">' +
          '<div class="pcard-icon">' + p.ico + '</div>' +
          '<div class="pcard-meta">' +
            '<div class="pcard-row">' +
              '<span class="pcard-name">' + p.name + '</span>' +
              '<span class="badge" style="background:' + p.bc + '1a;color:' + p.bc + ';border:1px solid ' + p.bc + '33">' + p.badge + '</span>' +
            '</div>' +
            '<div class="pcard-tagline">' + p.tagline + '</div>' +
          '</div>' +
        '</div>' +
        '<p class="pcard-desc">' + p.desc + '</p>' +
        '<div class="chips">' + p.chips.map(function(c) { return '<span class="chip"><i class="fas fa-check"></i>' + c + '</span>'; }).join('') + '</div>' +
        '<div class="specs">' + p.specs.map(function(s) { return '<div class="srow"><span class="sk">' + s.k + '</span><span class="sv">' + s.v + '</span></div>'; }).join('') + '</div>' +
        (p.cmp ?
          '<div class="cmp-toggle" data-id="' + p.id + '">' +
            '<i class="fas fa-scale-balanced ci"></i> Compare ' + p.cmp.vs +
            '<i class="fas fa-chevron-down caret" id="crt' + p.id + '"></i>' +
          '</div>' +
          '<div class="cmp-body" id="cmp' + p.id + '">' +
            '<div class="cmp-grid">' +
              '<div><div class="cmp-head" style="color:var(--green)">&#10003; Pros</div>' + p.cmp.pros.map(function(x) { return '<div class="cmp-item">&#8226; ' + x + '</div>'; }).join('') + '</div>' +
              '<div><div class="cmp-head" style="color:var(--red)">&#10007; Cons</div>'  + p.cmp.cons.map(function(x) { return '<div class="cmp-item">&#8226; ' + x + '</div>'; }).join('') + '</div>' +
            '</div>' +
          '</div>'
        : '') +
      '</div>' +
      '<div class="pcard-foot">' +
        '<div class="price-wrap">' +
          '<div class="p-old">$' + p.price.toFixed(2) + '</div>' +
          '<div class="p-new">$' + disc + '</div>' +
          '<span class="p-off">50% OFF</span>' +
        '</div>' +
        '<div class="card-actions">' +
          '<a class="btn-info" href="' + p.url + '" target="_blank" rel="noopener"><i class="fas fa-arrow-up-right-from-square"></i> Details</a>' +
          '<button class="btn-add" data-id="' + p.id + '"><i class="fas fa-cart-plus"></i> Add</button>' +
        '</div>' +
      '</div>';
    list.appendChild(el);
  });

  list.addEventListener('click', function(e) {
    var tog = e.target.closest('.cmp-toggle');
    if (tog) {
      var id = tog.dataset.id;
      var open = $('cmp' + id).classList.toggle('open');
      $('crt' + id).style.transform = open ? 'rotate(180deg)' : '';
      return;
    }
    var btn = e.target.closest('.btn-add');
    if (btn) addToCart(parseInt(btn.dataset.id), btn);
  });
}

/* ══════════════════════════════════════════════
   CART SHEET
══════════════════════════════════════════════ */
function renderCart() {
  var body = $('cartBody');
  if (!cart.length) {
    body.innerHTML = '<div class="empty"><i class="fas fa-bag-shopping"></i>Your cart is empty</div>';
    $('toCheckout').disabled = true;
  } else {
    $('toCheckout').disabled = false;
    body.innerHTML = cart.map(function(item) {
      return '<div class="ci">' +
        '<div class="ci-ico">' + item.ico + '</div>' +
        '<div class="ci-info">' +
          '<div class="ci-name">' + item.name + '</div>' +
          '<div class="ci-price">$' + (item.price * MULT).toFixed(2) + ' each</div>' +
        '</div>' +
        '<div class="ci-ctrl">' +
          '<button class="qb" data-id="' + item.id + '" data-a="dec">&#8722;</button>' +
          '<span class="qv">' + item.qty + '</span>' +
          '<button class="qb" data-id="' + item.id + '" data-a="inc">+</button>' +
          '<button class="rm" data-id="' + item.id + '" data-a="rm"><i class="fas fa-trash-can"></i></button>' +
        '</div>' +
      '</div>';
    }).join('');
    body.querySelectorAll('[data-a]').forEach(function(b) {
      b.onclick = function() {
        var id = parseInt(b.dataset.id), a = b.dataset.a;
        var item = cart.find(function(x) { return x.id === id; });
        if (a === 'inc') { item.qty++; }
        else if (a === 'dec') { item.qty--; if (item.qty <= 0) cart = cart.filter(function(x) { return x.id !== id; }); }
        else { cart = cart.filter(function(x) { return x.id !== id; }); }
        syncCart(); renderCart();
      };
    });
  }
  var sub = cart.reduce(function(s,i) { return s + i.price * i.qty; }, 0);
  var tot = cartTotal();
  $('cartTotals').innerHTML =
    '<div class="orow"><span class="lbl">Subtotal</span><span>$' + sub.toFixed(2) + '</span></div>' +
    '<div class="orow"><span class="lbl">Discount (' + DISC + '%)</span><span class="disc">&#8722;$' + (sub - tot).toFixed(2) + '</span></div>' +
    '<div class="orow total"><span>Total</span><span>$' + tot.toFixed(2) + '</span></div>';
}

/* ══════════════════════════════════════════════
   CHECKOUT
══════════════════════════════════════════════ */
function renderCoSummary() {
  var tot = cartTotal(), sub = cart.reduce(function(s,i) { return s + i.price * i.qty; }, 0);
  $('coSummary').innerHTML =
    '<div style="background:rgba(255,255,255,.05);border:1px solid var(--gb);border-radius:var(--r2);padding:13px 15px;margin-bottom:4px">' +
    cart.map(function(i) {
      return '<div class="orow"><span class="lbl">' + i.name + ' &times;' + i.qty + '</span><span>$' + (i.price * MULT * i.qty).toFixed(2) + '</span></div>';
    }).join('') +
    '<div class="orow"><span class="lbl">Discount</span><span class="disc">&#8722;$' + (sub - tot).toFixed(2) + '</span></div>' +
    '<div class="orow total"><span>Total</span><span>$' + tot.toFixed(2) + '</span></div>' +
    '</div>';
}

function validPhone(p) { return /^(?:\+855|0)[1-9]\d{7,8}$/.test(p.replace(/[\s\-().]/g, '')); }
function validEmail(e) { return !e.trim() || /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }

function startPayment() {
  var name  = $('fName').value.trim();
  var phone = $('fPhone').value.trim();
  var email = $('fEmail').value.trim();
  [$('fName'), $('fPhone'), $('fEmail')].forEach(function(el) { el.classList.remove('err'); });
  $('fErr').style.display = 'none';
  if (!name)              { $('fName').classList.add('err');  $('fErr').textContent = 'Please enter your full name.'; $('fErr').style.display = 'block'; return; }
  if (!validPhone(phone)) { $('fPhone').classList.add('err'); $('fErr').textContent = 'Please enter a valid Cambodian phone number.'; $('fErr').style.display = 'block'; return; }
  if (!validEmail(email)) { $('fEmail').classList.add('err'); $('fErr').textContent = 'Please enter a valid email address.'; $('fErr').style.display = 'block'; return; }
  var now = new Date();
  var sub = cart.reduce(function(s,i) { return s + i.price * i.qty; }, 0);
  var tot = cartTotal();
  order = {
    invoiceNumber: Math.floor(Math.random() * 900000) + 100000,
    issueDate: now.toLocaleDateString('en-US', {year:'numeric', month:'long', day:'numeric'}),
    issueTime: now.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'}),
    subtotal: sub, discountAmount: sub - tot, total: tot,
    customerName: name, customerPhone: phone, customerEmail: email,
    items: cart.map(function(i) { return Object.assign({}, i); }),
    buyerChatId: buyerChatId,
  };
  closeSheet('shCheckout');
  openSheet('shPay');
  renderPayScreen(tot);
}

/* ══════════════════════════════════════════════
   PAYMENT SCREEN
   Tries PayWay dynamic QR first → falls back to
   static qr.png if API not yet configured
══════════════════════════════════════════════ */
function renderPayScreen(total) {
  /* Loading state */
  $('payBody').innerHTML =
    '<div class="amt-block">' +
      '<div class="amt-lbl">Preparing payment</div>' +
      '<div class="amt-val">$' + total.toFixed(2) + '</div>' +
      '<div class="amt-sub">USD</div>' +
    '</div>' +
    '<div style="text-align:center;padding:48px 0">' +
      '<i class="fas fa-circle-notch spin" style="font-size:36px;color:var(--blue)"></i>' +
      '<div style="font-size:13px;color:var(--sub);margin-top:16px;line-height:1.7">Generating QR&hellip;</div>' +
    '</div>';
  $('payFoot').innerHTML = '<button class="btn-g" id="cancelInit">Cancel</button>';
  $('cancelInit').onclick = function() { stopPolling(); closeSheet('shPay'); };

  /* Call PayWay API */
  fetch(WORKER + '/create-payment', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      invoiceNumber: order.invoiceNumber,
      amount: total,
      items: order.items.map(function(i) {
        return { name: i.name, qty: i.qty, price: parseFloat((i.price * MULT).toFixed(2)) };
      }),
    }),
  })
  .then(function(res) { return res.json(); })
  .catch(function(e) { return { error: e.message, fallback: true }; })
  .then(function(qr) {
    if (qr && qr.qrImage && !qr.error) {
      showDynamicQR(total, qr);        /* ✅ Dynamic QR — amount pre-filled */
    } else {
      showStaticQR(total);             /* ⚠️ Fallback — static qr.png */
    }
  });
}

/* ══════════════════════════════════════════════
   POLLING — read-only, cannot fake a payment
   Worker /verify only returns true if the PayWay
   webhook already wrote verified:{invoice} in KV
══════════════════════════════════════════════ */
function startPolling(total) {
  stopPolling();
  pollStart = Date.now();
  var dots = 0, secs = 0;
  var dotsT = setInterval(function() {
    var el = $('adots'); if (el) el.textContent = '.'.repeat((dots++ % 3) + 1);
  }, 500);
  var secsT = setInterval(function() {
    var el = $('psecs'); if (el) el.textContent = (++secs) + 's';
  }, 1000);

  pollTimer = setInterval(function() {
    var elapsed = Date.now() - pollStart;
    if (elapsed >= POLL_MAX) {
      stopPolling(); clearInterval(dotsT); clearInterval(secsT);
      $('payBody').innerHTML =
        '<div class="amt-block"><div class="amt-lbl">Payment not detected</div><div class="amt-val">$' + (total || order.total).toFixed(2) + '</div></div>' +
        '<div class="status s-err">' +
          '<div class="s-ico"><i class="fas fa-clock"></i></div>' +
          '<div class="s-title">Timed Out (10 min)</div>' +
          '<div class="s-msg">No payment received. If you paid, contact <strong>@chamrong_vann</strong> with your transaction ID.</div>' +
        '</div>';
      $('payFoot').innerHTML = '<button class="btn-p" id="retryBtn"><i class="fas fa-rotate-right"></i>Show QR Again</button>';
      $('retryBtn').onclick = function() { renderPayScreen(order.total); };
      return;
    }
    fetch(WORKER + '/verify?invoice=' + order.invoiceNumber + '&amount=' + order.total.toFixed(2))
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.verified) {
          stopPolling(); clearInterval(dotsT); clearInterval(secsT);
          onVerified(data);
        }
      })
      .catch(function() {});
  }, 4000);
}

function stopPolling() { if (pollTimer) { clearInterval(pollTimer); pollTimer = null; } }

/* ══════════════════════════════════════════════
   ON PAYMENT VERIFIED
══════════════════════════════════════════════ */
function onVerified(vData) {
  $('payBody').innerHTML =
    '<div class="amt-block">' +
      '<div class="amt-lbl">Payment received</div>' +
      '<div class="amt-val" style="background:linear-gradient(135deg,var(--green),#16a869);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">$' + order.total.toFixed(2) + '</div>' +
    '</div>' +
    '<div class="status s-ok">' +
      '<div class="s-ico"><i class="fas fa-circle-check"></i></div>' +
      '<div class="s-title">Payment Confirmed!</div>' +
      '<div class="s-msg">' +
        '<strong style="color:var(--text)">' + (vData.payment_type || 'ABA Pay') + '</strong><br>' +
        'Tx: <span style="font-family:\'JetBrains Mono\',monospace;font-size:11px">' + vData.transaction_id + '</span><br><br>' +
        '<span class="pulse">Generating invoice &amp; releasing license&hellip;</span>' +
      '</div>' +
    '</div>';
  $('payFoot').innerHTML = '';

  fetch(WORKER + '/notify', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text: buildAdminMsg(order, vData), order: order, verifyData: vData }),
  }).catch(function() {});

  setTimeout(function() {
    closeSheet('shPay');
    showInvoice(order, vData);
    cart = []; syncCart(); order = null;
  }, 2000);
}

/* ══════════════════════════════════════════════

══════════════════════════════════════════════ */

    '</div>' +

      '<thead><tr><th>Item</th><th style="text-align:center">Qty</th><th style="text-align:right">Price</th><th style="text-align:right">Total</th></tr></thead>' +
      '<tbody>' + rows + '</tbody>' +

    '<div class="orow"><span class="lbl">Discount (' + DISC + '%)</span><span class="disc">&#8722;$' + o.discountAmount.toFixed(2) + '</span></div>' +
    '<div class="orow total"><span>Total Paid</span><span>$' + o.total.toFixed(2) + '</span></div>' +
    '<div><span class="paid-tag"><i class="fas fa-circle-check"></i>PAID &middot; ' + (vData.payment_type || 'ABA Pay') + '</span></div>' +
    '<div style="font-size:11px;color:var(--sub);margin-top:7px">Tx: ' + vData.transaction_id + '</div>' +
    '<div class="key-box">' +
      '<div class="key-box-lbl"><i class="fas fa-key"></i>Your License Key</div>' +
      '<div class="spoiler" id="spoilerWrap">' +
        '<div class="spoiler-txt" id="keyText">Delivering to your Telegram&hellip;<br>Check your messages shortly.</div>' +
        '<div class="spoiler-mask" id="spoilerMask"><i class="fas fa-eye"></i>Tap to reveal</div>' +
      '</div>' +
      '<button class="copy-btn" id="copyKeyBtn"><i class="fas fa-copy"></i>Copy Key</button>' +
    '</div>' +
    '<div style="font-size:12px;color:var(--sub);margin-top:10px;line-height:1.8">' +
      'License key is being sent to your Telegram.<br>' +
      'Not received in 5 min? Contact <strong style="color:var(--text)">@chamrong_vann</strong>' +
    '</div>';

  var revealed = false;
  $('spoilerWrap').onclick = function() {
    revealed = !revealed;
    $('keyText').classList.toggle('open', revealed);
    $('spoilerMask').classList.toggle('gone', revealed);
  };
  $('copyKeyBtn').onclick = function() {
    var t = $('keyText') && $('keyText').textContent;
    if (t && navigator.clipboard) {
      navigator.clipboard.writeText(t).then(function() { showToast('License key copied!'); });
    }
  };

  openSheet('shInv');
}

window.setLicenseKey = function(key) {
  var kt = $('keyText');
  if (kt) { kt.textContent = key; $('copyKeyBtn').classList.add('on'); }
};

function buildAdminMsg(o, vData) {
  var items = o.items.map(function(i) {
    return '\u2022 ' + i.name + ' \xD7' + i.qty + ' \u2014 $' + (i.price * MULT * i.qty).toFixed(2);
  }).join('\n');
  return '\u2705 *New Order \u2014 xstore*\n\n' +
    '\uD83D\uDCCB *Invoice:* #' + o.invoiceNumber + '\n' +
    '\uD83D\uDCC5 *Date:* ' + o.issueDate + ' ' + o.issueTime + '\n\n' +
    '\uD83D\uDC64 *Customer:*\n' + o.customerName + '\n' + o.customerPhone + (o.customerEmail ? '\n' + o.customerEmail : '') + '\n\n' +
    '\uD83D\uDED2 *Items:*\n' + items + '\n\n' +
    '\uD83D\uDCB0 *Total:* $' + o.total.toFixed(2) + '\n' +
    '\uD83D\uDCB3 *Method:* ' + (vData.payment_type || 'ABA Pay') + '\n' +
    '\uD83D\uDD17 *Tx:* `' + vData.transaction_id + '`\n\n' +
    '_/deliver ' + o.invoiceNumber + ' to send license key_';

/* ══════════════════════════════════════════════
   SHEET SYSTEM
══════════════════════════════════════════════ */
var SHEETS = ['shCart', 'shCheckout', 'shPay', 'shInv'];

function openSheet(id) {
  $('overlay').classList.add('on');
  $(id).classList.add('on');
  if (tg) { try { tg.BackButton.show(); } catch(e) {} }
}
function closeSheet(id) {
  $(id).classList.remove('on');
  var any = SHEETS.some(function(s) { return $(s).classList.contains('on'); });
  if (!any) {
    $('overlay').classList.remove('on');
    if (tg) { try { tg.BackButton.hide(); } catch(e) {} }
  }
}
function closeAll() {
  SHEETS.forEach(function(s) { $(s).classList.remove('on'); });
  $('overlay').classList.remove('on');
  if (tg) { try { tg.BackButton.hide(); } catch(e) {} }
}

/* ══════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════ */
var toastT;
function showToast(msg) {
  $('toastMsg').textContent = msg;
  $('toast').classList.add('on');
  clearTimeout(toastT);
  toastT = setTimeout(function() { $('toast').classList.remove('on'); }, 2200);
}

/* ══════════════════════════════════════════════
   COUNTDOWN
══════════════════════════════════════════════ */
function startCountdown() {
  var end = parseInt(localStorage.getItem('xsaleEnd') || '0');
  if (!end || Date.now() > end) {
    end = Date.now() + SALE_MS;
    localStorage.setItem('xsaleEnd', end);
  }
  function tick() {
    var d = end - Date.now();
    if (d < 0) { localStorage.removeItem('xsaleEnd'); startCountdown(); return; }
    $('tD').textContent = String(Math.floor(d / 86400000)).padStart(2, '0');
    $('tH').textContent = String(Math.floor(d % 86400000 / 3600000)).padStart(2, '0');
    $('tM').textContent = String(Math.floor(d % 3600000 / 60000)).padStart(2, '0');
    $('tS').textContent = String(Math.floor(d % 60000 / 1000)).padStart(2, '0');
  }
  tick();
  setInterval(tick, 1000);
}

/* ══════════════════════════════════════════════
   EVENTS
══════════════════════════════════════════════ */
$('cartBtn').onclick    = function() { renderCart(); openSheet('shCart'); };
$('cartBarBtn').onclick = function() { renderCart(); openSheet('shCart'); };
$('cartClose').onclick  = function() { closeSheet('shCart'); };
$('cartContinue').onclick = function() { closeSheet('shCart'); };
$('coClose').onclick    = function() { closeSheet('shCheckout'); };
$('invClose').onclick   = function() { closeSheet('shInv'); };
$('doneBtn').onclick    = closeAll;

$('toCheckout').onclick = function() {
  renderCoSummary();
  closeSheet('shCart');
  openSheet('shCheckout');
};
$('backCart').onclick = function() {
  closeSheet('shCheckout');
  renderCart();
  openSheet('shCart');
};
$('payBtn').onclick = startPayment;

$('overlay').onclick = function(e) {
  if (e.target !== $('overlay')) return;
  if (!$('shPay').classList.contains('on')) closeAll();
};

if (tg) {
  try {
    tg.BackButton.onClick(function() {
      var rev = SHEETS.slice().reverse();
      for (var i = 0; i < rev.length; i++) {
        if ($(rev[i]).classList.contains('on')) { closeSheet(rev[i]); return; }
      }
    });
  } catch(e) {}
}

/* ══════════════════════════════════════════════
   INIT
══════════════════════════════════════════════ */
renderProducts();
startCountdown();
</script>
