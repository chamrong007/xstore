<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>xstore — License Store</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  /* ── TOKENS ─────────────────────────────────────────── */
  :root {
    --bg:        #0d0d0f;
    --surface:   #16161a;
    --surface2:  #1e1e24;
    --border:    rgba(255,255,255,0.07);
    --accent:    #f5a623;
    --accent2:   #ff6b35;
    --green:     #22c55e;
    --red:       #ef4444;
    --blue:      #3b82f6;
    --text:      #f0f0f5;
    --muted:     #6b6b7b;
    --radius:    16px;
    --radius-sm: 10px;
    font-size: 15px;
  }

  /* ── RESET ──────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    overscroll-behavior: none;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── SCROLLBAR ──────────────────────────────────────── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ── LAYOUT ─────────────────────────────────────────── */
  #app { display: flex; flex-direction: column; min-height: 100vh; }

  /* ── HEADER ─────────────────────────────────────────── */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(13,13,15,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 34px; height: 34px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 16px; color: #000;
    letter-spacing: -1px;
  }
  .logo-name { font-weight: 700; font-size: 18px; letter-spacing: -0.5px; }
  .cart-btn {
    position: relative;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    width: 40px; height: 40px;
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; cursor: pointer;
    transition: background 0.2s;
  }
  .cart-btn:active { background: var(--surface); }
  .cart-badge {
    position: absolute; top: -6px; right: -6px;
    background: var(--accent); color: #000;
    font-size: 10px; font-weight: 700;
    width: 18px; height: 18px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    display: none;
  }
  .cart-badge.show { display: flex; }

  /* ── BANNER ─────────────────────────────────────────── */
  .banner {
    margin: 12px 16px;
    background: linear-gradient(135deg, #1a1208, #221509);
    border: 1px solid rgba(245,166,35,0.2);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .banner-left { flex: 1; }
  .banner-label {
    font-size: 11px; font-weight: 600; color: var(--accent);
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px;
  }
  .banner-title { font-size: 18px; font-weight: 700; }
  .banner-title span { color: var(--accent); }
  .timer {
    display: flex; gap: 6px; margin-top: 8px;
  }
  .timer-unit {
    background: rgba(245,166,35,0.1);
    border: 1px solid rgba(245,166,35,0.2);
    border-radius: 8px; padding: 4px 8px;
    text-align: center; min-width: 44px;
  }
  .timer-num { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 500; line-height: 1; }
  .timer-label { font-size: 9px; color: var(--muted); margin-top: 1px; text-transform: uppercase; }

  /* ── MAIN CONTENT ────────────────────────────────────── */
  .content { flex: 1; padding: 0 16px 100px; }

  /* ── CATEGORY HEADER ─────────────────────────────────── */
  .cat-header {
    font-size: 12px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1.5px;
    margin: 20px 0 10px;
  }

  /* ── PRODUCT CARD ────────────────────────────────────── */
  .product-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 12px;
    transition: border-color 0.2s;
    position: relative; overflow: hidden;
  }
  .product-card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: linear-gradient(var(--accent), var(--accent2));
    border-radius: 3px 0 0 3px;
    opacity: 0; transition: opacity 0.2s;
  }
  .product-card:active { border-color: rgba(245,166,35,0.3); }
  .product-card:active::before { opacity: 1; }
  .product-icon {
    width: 42px; height: 42px; border-radius: 12px;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .product-info { flex: 1; min-width: 0; }
  .product-name { font-weight: 600; font-size: 14px; margin-bottom: 2px; }
  .product-desc { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .product-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
  .price-old { font-size: 11px; color: var(--muted); text-decoration: line-through; }
  .price-new { font-size: 16px; font-weight: 700; color: var(--accent); }
  .add-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #000; border: none;
    padding: 6px 14px; border-radius: 8px;
    font-size: 12px; font-weight: 700;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: opacity 0.15s, transform 0.1s;
  }
  .add-btn:active { opacity: 0.8; transform: scale(0.95); }
  .add-btn.added { background: var(--green); color: #fff; }

  /* ── BOTTOM NAV (cart summary) ───────────────────────── */
  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    background: rgba(13,13,15,0.95);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    display: none;
  }
  .bottom-bar.show { display: block; }
  .checkout-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #000; border: none;
    padding: 15px; border-radius: var(--radius-sm);
    font-size: 15px; font-weight: 700;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    display: flex; align-items: center; justify-content: space-between;
    transition: opacity 0.2s;
  }
  .checkout-btn:active { opacity: 0.85; }
  .checkout-btn-label { display: flex; align-items: center; gap: 8px; }
  .checkout-btn-total { font-family: 'DM Mono', monospace; }

  /* ── TOAST ───────────────────────────────────────────── */
  #toast {
    position: fixed; top: 70px; left: 50%; transform: translateX(-50%) translateY(-20px);
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 10px 16px; border-radius: 100px;
    font-size: 13px; font-weight: 500;
    display: flex; align-items: center; gap: 8px;
    opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap;
    z-index: 9999;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast i { color: var(--green); }

  /* ── SHEET (bottom sheet modal) ──────────────────────── */
  .sheet-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 200; opacity: 0; transition: opacity 0.3s;
    pointer-events: none;
  }
  .sheet-overlay.show { opacity: 1; pointer-events: all; }
  .sheet {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    border-top: 1px solid var(--border);
    z-index: 201;
    transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
    max-height: 90vh; display: flex; flex-direction: column;
  }
  .sheet.show { transform: translateY(0); }
  .sheet-handle {
    width: 36px; height: 4px; background: var(--border);
    border-radius: 2px; margin: 12px auto 0;
  }
  .sheet-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .sheet-title { font-size: 17px; font-weight: 700; }
  .sheet-close {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--surface2); border: none; color: var(--muted);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 14px;
  }
  .sheet-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
  .sheet-footer { padding: 12px 20px 24px; border-top: 1px solid var(--border); }

  /* ── CART ITEMS ──────────────────────────────────────── */
  .cart-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .cart-item:last-child { border-bottom: none; }
  .cart-item-icon {
    width: 38px; height: 38px; border-radius: 10px;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .cart-item-info { flex: 1; min-width: 0; }
  .cart-item-name { font-weight: 600; font-size: 13px; }
  .cart-item-price { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .cart-item-controls { display: flex; align-items: center; gap: 8px; }
  .qty-btn {
    width: 28px; height: 28px; border-radius: 8px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .qty-val { font-family: 'DM Mono', monospace; font-size: 14px; min-width: 20px; text-align: center; }
  .remove-btn { color: var(--red); background: none; border: none; cursor: pointer; padding: 4px; font-size: 14px; }

  /* ── CHECKOUT FORM ───────────────────────────────────── */
  .form-group { margin-bottom: 12px; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; display: block; }
  .form-input {
    width: 100%; padding: 12px 14px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    outline: none; transition: border-color 0.2s;
  }
  .form-input:focus { border-color: rgba(245,166,35,0.5); }
  .form-input.error { border-color: var(--red); }
  .form-input::placeholder { color: var(--muted); }

  /* ── ORDER SUMMARY ───────────────────────────────────── */
  .order-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0; font-size: 13px;
  }
  .order-row.total {
    font-size: 17px; font-weight: 700;
    border-top: 1px solid var(--border); margin-top: 6px; padding-top: 14px;
  }
  .order-row .label { color: var(--muted); }
  .order-row.total .label { color: var(--text); }
  .discount-val { color: var(--green); }

  /* ── PRIMARY BUTTON ──────────────────────────────────── */
  .btn-primary {
    width: 100%; padding: 15px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #000; border: none; border-radius: var(--radius-sm);
    font-size: 15px; font-weight: 700; font-family: 'DM Sans', sans-serif;
    cursor: pointer; transition: opacity 0.2s;
  }
  .btn-primary:active { opacity: 0.85; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-secondary {
    width: 100%; padding: 13px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 600; font-family: 'DM Sans', sans-serif;
    cursor: pointer; margin-top: 8px;
  }

  /* ── STATUS CARDS ────────────────────────────────────── */
  .status-card {
    border-radius: var(--radius-sm); padding: 16px;
    display: flex; flex-direction: column; align-items: center;
    text-align: center; gap: 8px; margin: 8px 0;
  }
  .status-card.pending { background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.2); }
  .status-card.success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); }
  .status-card.error   { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); }
  .status-icon { font-size: 28px; }
  .status-title { font-size: 16px; font-weight: 700; }
  .status-msg { font-size: 13px; color: var(--muted); line-height: 1.5; }
  .status-card.pending .status-icon { color: var(--blue); }
  .status-card.success .status-icon { color: var(--green); }
  .status-card.error   .status-icon { color: var(--red); }

  /* ── PROGRESS BAR ────────────────────────────────────── */
  .progress-bar {
    width: 100%; height: 3px; background: var(--surface2);
    border-radius: 3px; overflow: hidden; margin-top: 8px;
  }
  .progress-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 3px; transition: width 1s linear;
  }

  /* ── INVOICE ─────────────────────────────────────────── */
  .invoice-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 16px;
  }
  .invoice-brand { font-size: 20px; font-weight: 700; color: var(--accent); }
  .invoice-meta { text-align: right; font-size: 12px; color: var(--muted); line-height: 1.8; }
  .invoice-section { margin: 14px 0; }
  .invoice-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .invoice-val { font-size: 13px; line-height: 1.7; }
  .invoice-table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 12px; }
  .invoice-table th { text-align: left; padding: 8px; background: var(--surface2); color: var(--muted); font-weight: 600; }
  .invoice-table th:last-child, .invoice-table td:last-child { text-align: right; }
  .invoice-table td { padding: 10px 8px; border-bottom: 1px solid var(--border); }
  .invoice-totals { margin-top: 12px; }
  .paid-badge {
    display: inline-block; background: rgba(34,197,94,0.15);
    border: 1px solid rgba(34,197,94,0.3); color: var(--green);
    padding: 4px 12px; border-radius: 100px; font-size: 12px; font-weight: 700;
    margin-top: 12px;
  }

  /* ── LICENSE KEY BOX ─────────────────────────────────── */
  .license-box {
    background: var(--surface2); border: 1px dashed rgba(245,166,35,0.4);
    border-radius: var(--radius-sm); padding: 14px;
    margin: 10px 0;
  }
  .license-box-label { font-size: 11px; color: var(--accent); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .license-key { font-family: 'DM Mono', monospace; font-size: 13px; word-break: break-all; line-height: 1.6; }
  .copy-btn {
    margin-top: 8px; padding: 7px 14px;
    background: rgba(245,166,35,0.1); border: 1px solid rgba(245,166,35,0.2);
    color: var(--accent); border-radius: 8px;
    font-size: 12px; font-weight: 600; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }

  /* ── SPINNER ─────────────────────────────────────────── */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { animation: spin 0.8s linear infinite; display: inline-block; }

  /* ── ANIMATIONS ──────────────────────────────────────── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .product-card { animation: fadeUp 0.4s ease both; }

  @media print {
    body > *:not(#invoice-print) { display: none !important; }
    #invoice-print { display: block !important; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header class="header">
    <div class="logo">
      <div class="logo-icon">X</div>
      <span class="logo-name">xstore</span>
    </div>
    <button class="cart-btn" id="cartBtn">
      <i class="fas fa-shopping-bag"></i>
      <span class="cart-badge" id="cartBadge">0</span>
    </button>
  </header>

  <!-- BANNER -->
  <div class="banner">
    <div class="banner-left">
      <div class="banner-label">⚡ Flash Promotion</div>
      <div class="banner-title"><span>50% OFF</span> All Licenses</div>
      <div class="timer">
        <div class="timer-unit"><div class="timer-num" id="tDays">00</div><div class="timer-label">Days</div></div>
        <div class="timer-unit"><div class="timer-num" id="tHours">00</div><div class="timer-label">Hrs</div></div>
        <div class="timer-unit"><div class="timer-num" id="tMins">00</div><div class="timer-label">Min</div></div>
        <div class="timer-unit"><div class="timer-num" id="tSecs">00</div><div class="timer-label">Sec</div></div>
      </div>
    </div>
  </div>

  <!-- PRODUCTS -->
  <div class="content" id="productGrid"></div>

</div><!-- #app -->

<!-- BOTTOM BAR -->
<div class="bottom-bar" id="bottomBar">
  <button class="checkout-btn" id="checkoutBarBtn">
    <span class="checkout-btn-label"><i class="fas fa-shopping-bag"></i> View Cart</span>
    <span class="checkout-btn-total" id="barTotal">$0.00</span>
  </button>
</div>

<!-- TOAST -->
<div id="toast"><i class="fas fa-check-circle"></i> <span id="toastMsg"></span></div>

<!-- SHEET OVERLAY -->
<div class="sheet-overlay" id="overlay"></div>

<!-- CART SHEET -->
<div class="sheet" id="cartSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <span class="sheet-title">Your Cart</span>
    <button class="sheet-close" id="cartClose"><i class="fas fa-times"></i></button>
  </div>
  <div class="sheet-body" id="cartBody"></div>
  <div class="sheet-footer">
    <div id="cartTotals"></div>
    <button class="btn-primary" id="toCheckoutBtn" style="margin-top:14px">Proceed to Checkout</button>
    <button class="btn-secondary" id="cartContinueBtn">Continue Shopping</button>
  </div>
</div>

<!-- CHECKOUT SHEET -->
<div class="sheet" id="checkoutSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <span class="sheet-title">Checkout</span>
    <button class="sheet-close" id="checkoutClose"><i class="fas fa-times"></i></button>
  </div>
  <div class="sheet-body">
    <div id="checkoutSummary" style="margin-bottom:16px"></div>
    <div class="form-group">
      <label class="form-label">Full Name *</label>
      <input class="form-input" id="fName" placeholder="e.g. Chamrong Vann" autocomplete="name">
    </div>
    <div class="form-group">
      <label class="form-label">Email (Optional)</label>
      <input class="form-input" id="fEmail" type="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Phone Number *</label>
      <input class="form-input" id="fPhone" type="tel" placeholder="012 345 678" autocomplete="tel">
    </div>
    <div id="checkoutError" style="color:var(--red);font-size:13px;margin-top:8px;display:none"></div>
  </div>
  <div class="sheet-footer">
    <button class="btn-primary" id="payBtn">
      <i class="fas fa-lock" style="margin-right:6px"></i>Pay with ABA PayWay
    </button>
    <button class="btn-secondary" id="backToCartBtn">← Back to Cart</button>
  </div>
</div>

<!-- PAYMENT STATUS SHEET -->
<div class="sheet" id="paymentSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <span class="sheet-title">Payment</span>
  </div>
  <div class="sheet-body" id="paymentBody"></div>
  <div class="sheet-footer" id="paymentFooter"></div>
</div>

<!-- INVOICE SHEET -->
<div class="sheet" id="invoiceSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <span class="sheet-title">Invoice</span>
    <button class="sheet-close" id="invoiceClose"><i class="fas fa-times"></i></button>
  </div>
  <div class="sheet-body" id="invoiceBody"></div>
  <div class="sheet-footer">
    <button class="btn-secondary" id="doneBtn">Done</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// CONFIG — update these values
// ═══════════════════════════════════════════════════════
const WORKER_URL    = 'https://xstore-notify.chamrong.workers.dev';
const PAYWAY_LINK   = 'https://link.payway.com.kh/ABAPAYRF3809168';
const DISCOUNT_PCT  = 50;
const MULTIPLIER    = 1 - DISCOUNT_PCT / 100;
const SALE_DURATION = 24 * 60 * 60 * 1000; // 1 day

// ═══════════════════════════════════════════════════════
// TELEGRAM WEBAPP
// ═══════════════════════════════════════════════════════
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  tg.enableClosingConfirmation();
}

// ═══════════════════════════════════════════════════════
// PRODUCTS
// ═══════════════════════════════════════════════════════

  Windows: '🪟', Office: '📊', Server: '🖥️',

// ═══════════════════════════════════════════════════════
// CART STATE
// ═══════════════════════════════════════════════════════
let cart = [];
let pendingOrder = null;
let pollingTimer = null;

function cartTotal() {
  return cart.reduce((s, i) => s + i.price * MULTIPLIER * i.qty, 0);
}
function cartCount() {
  return cart.reduce((s, i) => s + i.qty, 0);
}

function addToCart(id, btnEl) {
  const p = products.find(x => x.id === id);
  const existing = cart.find(x => x.id === id);
  if (existing) existing.qty++;
  else cart.push({ ...p, qty: 1 });
  updateCartUI();
  showToast(`${p.name} added`);
  if (btnEl) {
    btnEl.classList.add('added');
    btnEl.textContent = '✓ Added';
    setTimeout(() => { btnEl.classList.remove('added'); btnEl.textContent = 'Add'; }, 1500);
  }
}

function updateCartUI() {
  const count = cartCount();
  const badge = document.getElementById('cartBadge');
  badge.textContent = count;
  badge.classList.toggle('show', count > 0);
  document.getElementById('bottomBar').classList.toggle('show', count > 0);
  document.getElementById('barTotal').textContent = `$${cartTotal().toFixed(2)}`;
}

// ═══════════════════════════════════════════════════════
// RENDER PRODUCTS
// ═══════════════════════════════════════════════════════
function renderProducts() {
  const grid = document.getElementById('productGrid');
  const cats = [...new Set(products.map(p => p.cat))];
  let html = '';
  cats.forEach(cat => {
    html += `<div class="cat-header">${ICONS[cat] || '📦'} ${cat}</div>`;
    products.filter(p => p.cat === cat).forEach((p, i) => {
      const discounted = (p.price * MULTIPLIER).toFixed(2);
      html += `
        <div class="product-card" style="animation-delay:${i * 0.05}s">
          <div class="product-icon">${ICONS[p.cat] || '📦'}</div>
          <div class="product-info">
            <div class="product-name">${p.name}</div>
            <div class="product-desc">${p.desc}</div>
          </div>
          <div class="product-right">
            <div>
              <div class="price-old">$${p.price.toFixed(2)}</div>
              <div class="price-new">$${discounted}</div>
            </div>
            <button class="add-btn" data-id="${p.id}">Add</button>
          </div>
        </div>`;
    });
  });
  grid.innerHTML = html;
  grid.addEventListener('click', e => {
    const btn = e.target.closest('.add-btn');
    if (btn) addToCart(parseInt(btn.dataset.id), btn);
  });
}

// ═══════════════════════════════════════════════════════
// CART SHEET
// ═══════════════════════════════════════════════════════
function renderCartSheet() {
  const body = document.getElementById('cartBody');
  if (cart.length === 0) {
    body.innerHTML = `<div style="text-align:center;padding:40px 0;color:var(--muted)">
      <i class="fas fa-shopping-bag" style="font-size:40px;margin-bottom:12px;display:block"></i>
      Your cart is empty
    </div>`;
    document.getElementById('toCheckoutBtn').disabled = true;
  } else {
    document.getElementById('toCheckoutBtn').disabled = false;
    body.innerHTML = cart.map(item => `
      <div class="cart-item">
        <div class="cart-item-icon">${ICONS[item.cat] || '📦'}</div>
        <div class="cart-item-info">
          <div class="cart-item-name">${item.name}</div>
          <div class="cart-item-price">$${(item.price * MULTIPLIER).toFixed(2)} each</div>
        </div>
        <div class="cart-item-controls">
          <button class="qty-btn" data-id="${item.id}" data-action="dec">−</button>
          <span class="qty-val">${item.qty}</span>
          <button class="qty-btn" data-id="${item.id}" data-action="inc">+</button>
          <button class="remove-btn" data-id="${item.id}" data-action="remove"><i class="fas fa-trash"></i></button>
        </div>
      </div>
    `).join('');

    body.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = parseInt(btn.dataset.id);
        const action = btn.dataset.action;
        const item = cart.find(x => x.id === id);
        if (action === 'inc') item.qty++;
        else if (action === 'dec') { item.qty--; if (item.qty <= 0) cart = cart.filter(x => x.id !== id); }
        else if (action === 'remove') cart = cart.filter(x => x.id !== id);
        updateCartUI();
        renderCartSheet();
      });
    });
  }

  const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const total = cartTotal();
  document.getElementById('cartTotals').innerHTML = `
    <div class="order-row"><span class="label">Subtotal</span><span>$${subtotal.toFixed(2)}</span></div>
    <div class="order-row"><span class="label">Flash Discount (${DISCOUNT_PCT}%)</span><span class="discount-val">−$${(subtotal - total).toFixed(2)}</span></div>
    <div class="order-row total"><span class="label">Total</span><span>$${total.toFixed(2)}</span></div>
  `;
}

// ═══════════════════════════════════════════════════════
// VALIDATION
// ═══════════════════════════════════════════════════════
function validatePhone(p) { return /^(?:\+855|0)[1-9]\d{7,8}$/.test(p.replace(/[\s\-().]/g, '')); }
function validateEmail(e) {
  if (!e.trim()) return true;
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);
}

// ═══════════════════════════════════════════════════════
// PAYMENT FLOW
// ═══════════════════════════════════════════════════════
async function startPayment() {
  const name  = document.getElementById('fName').value.trim();
  const email = document.getElementById('fEmail').value.trim();
  const phone = document.getElementById('fPhone').value.trim();
  const errEl = document.getElementById('checkoutError');

  [document.getElementById('fName'), document.getElementById('fEmail'), document.getElementById('fPhone')]
    .forEach(el => el.classList.remove('error'));
  errEl.style.display = 'none';

  if (!name) { document.getElementById('fName').classList.add('error'); errEl.textContent = 'Please enter your full name.'; errEl.style.display = 'block'; return; }
  if (!phone || !validatePhone(phone)) { document.getElementById('fPhone').classList.add('error'); errEl.textContent = 'Please enter a valid Cambodian phone number.'; errEl.style.display = 'block'; return; }
  if (!validateEmail(email)) { document.getElementById('fEmail').classList.add('error'); errEl.textContent = 'Please enter a valid email address.'; errEl.style.display = 'block'; return; }

  const now = new Date();
  const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const total = cartTotal();
  pendingOrder = {
    invoiceNumber: Math.floor(Math.random() * 900000) + 100000,
    issueDate: now.toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' }),
    issueTime: now.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' }),
    subtotal, discountAmount: subtotal - total, total,
    customerName: name, customerEmail: email, customerPhone: phone,
    items: cart.map(i => ({ ...i })),
  };

  closeSheet('checkoutSheet');
  openSheet('paymentSheet');
  renderPaymentInstructions(pendingOrder.total);
}

let pollStartTime = 0;
const POLL_MAX = 10 * 60 * 1000;

function startPolling() {
  pollStartTime = Date.now();
  document.getElementById('paymentBody').innerHTML = `
    <div class="status-card pending">
      <div class="status-icon"><i class="fas fa-circle-notch spinner"></i></div>
      <div class="status-title">Checking Payment</div>
      <div class="status-msg">Waiting for PayWay to confirm<span id="dots">.</span></div>
      <div class="progress-bar"><div class="progress-fill" id="pollBar"></div></div>
    </div>
  `;
  document.getElementById('paymentFooter').innerHTML = `
    <button class="btn-secondary" id="cancelPollBtn">Cancel</button>
  `;
  document.getElementById('cancelPollBtn').addEventListener('click', () => {
    stopPolling(); renderPaymentInstructions(pendingOrder?.total || 0);
  });

  let dots = 0;
  const dotsEl = () => document.getElementById('dots');
  const dotsTimer = setInterval(() => { if (dotsEl()) dotsEl().textContent = '.'.repeat((dots++ % 3) + 1); }, 500);

  pollingTimer = setInterval(async () => {
    const elapsed = Date.now() - pollStartTime;
    const bar = document.getElementById('pollBar');
    if (bar) bar.style.width = Math.min(100, (elapsed / POLL_MAX) * 100) + '%';

    if (elapsed >= POLL_MAX) {
      stopPolling(); clearInterval(dotsTimer);
      renderPaymentError('Verification timed out. Please contact support if you have paid.');
      return;
    }

    try {
      const res = await fetch(`${WORKER_URL}/verify?invoice=${pendingOrder.invoiceNumber}&amount=${pendingOrder.total.toFixed(2)}`);
      const data = await res.json();
      if (data.verified) {
        stopPolling(); clearInterval(dotsTimer);
        await onPaymentSuccess(data);
      }
    } catch(e) { /* retry silently */ }
  }, 4000);
}

function stopPolling() { if (pollingTimer) { clearInterval(pollingTimer); pollingTimer = null; } }

async function onPaymentSuccess(verifyData) {
  document.getElementById('paymentBody').innerHTML = `
    <div class="status-card success">
      <div class="status-icon"><i class="fas fa-check-circle"></i></div>
      <div class="status-title">Payment Confirmed!</div>
      <div class="status-msg">Transaction: ${verifyData.transaction_id}<br>Method: ${verifyData.payment_type}<br>Generating your invoice…</div>
    </div>
  `;
  document.getElementById('paymentFooter').innerHTML = '';

  // Send Telegram notification
  const text = buildTelegramMessage(pendingOrder, verifyData);
  try { await fetch(`${WORKER_URL}/notify`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ text, order: pendingOrder, verifyData }) }); } catch(e) {}

  setTimeout(() => {
    closeSheet('paymentSheet');
    showInvoice(pendingOrder, verifyData);
    // Reset cart
    cart = [];
    updateCartUI();
  }, 2000);
}

function renderPaymentError(msg) {
  document.getElementById('paymentBody').innerHTML = `
    <div class="status-card error">
      <div class="status-icon"><i class="fas fa-times-circle"></i></div>
      <div class="status-title">Verification Failed</div>

    </div>
  `;
  document.getElementById('paymentFooter').innerHTML = `
    <button class="btn-primary" id="retryBtn">Try Again</button>
  `;
  document.getElementById('retryBtn').addEventListener('click', startPolling);
}

  const items = order.items.map(i => `• ${i.name} ×${i.qty} — $${(i.price * MULTIPLIER * i.qty).toFixed(2)}`).join('\n');
  return `✅ *New Order — xstore*\n\n*Invoice:* #${order.invoiceNumber}\n*Date:* ${order.issueDate} ${order.issueTime}\n\n*Customer:*\n${order.customerName}\n${order.customerEmail || 'N/A'}\n${order.customerPhone}\n\n*Items:*\n${items}\n\n*Total Paid:* $${order.total.toFixed(2)}\n*Method:* ${verifyData.payment_type}\n*Transaction:* \`${verifyData.transaction_id}\`\n\n_Reply with /deliver ${order.invoiceNumber} to send license keys_`;
}

function openSheet(id) {
  document.getElementById('overlay').classList.add('show');
  document.getElementById(id).classList.add('show');
  if (tg) tg.BackButton.show();
}
function closeSheet(id) {
  document.getElementById(id).classList.remove('show');
  const anyOpen = ['cartSheet','checkoutSheet','paymentSheet','invoiceSheet'].some(s => document.getElementById(s).classList.contains('show'));
  if (!anyOpen) { document.getElementById('overlay').classList.remove('show'); if (tg) tg.BackButton.hide(); }
}
function closeAllSheets() {
  ['cartSheet','checkoutSheet','paymentSheet','invoiceSheet'].forEach(closeSheet);
  document.getElementById('overlay').classList.remove('show');
  if (tg) tg.BackButton.hide();
}

let toastTimer;
function showToast(msg) {
  document.getElementById('toastMsg').textContent = msg;
  document.getElementById('toast').classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => document.getElementById('toast').classList.remove('show'), 2000);
}

// ═══════════════════════════════════════════════════════
// COUNTDOWN
// ═══════════════════════════════════════════════════════
function startCountdown() {
  let end = parseInt(localStorage.getItem('xSaleEnd') || '0');
  if (!end || Date.now() > end) {
    end = Date.now() + SALE_DURATION;
    localStorage.setItem('xSaleEnd', end);
  }
  const tick = () => {
    const d = end - Date.now();
    if (d < 0) { localStorage.removeItem('xSaleEnd'); startCountdown(); return; }
    document.getElementById('tDays').textContent  = String(Math.floor(d/86400000)).padStart(2,'0');
    document.getElementById('tHours').textContent = String(Math.floor(d%86400000/3600000)).padStart(2,'0');
    document.getElementById('tMins').textContent  = String(Math.floor(d%3600000/60000)).padStart(2,'0');
    document.getElementById('tSecs').textContent  = String(Math.floor(d%60000/1000)).padStart(2,'0');
  };
  tick();
  setInterval(tick, 1000);
}

document.getElementById('cartContinueBtn').addEventListener('click', () => closeSheet('cartSheet'));
document.getElementById('checkoutClose').addEventListener('click', () => closeSheet('checkoutSheet'));
document.getElementById('invoiceClose').addEventListener('click', () => closeSheet('invoiceSheet'));
document.getElementById('doneBtn').addEventListener('click', closeAllSheets);

document.getElementById('toCheckoutBtn').addEventListener('click', () => {
  renderCheckoutSummary();
  closeSheet('cartSheet');
  openSheet('checkoutSheet');
});
document.getElementById('backToCartBtn').addEventListener('click', () => {
  closeSheet('checkoutSheet');
  renderCartSheet();
  openSheet('cartSheet');
});
document.getElementById('payBtn').addEventListener('click', startPayment);

document.getElementById('overlay').addEventListener('click', () => {
  // Don't close payment sheet (user might lose progress)
  if (!document.getElementById('paymentSheet').classList.contains('show')) closeAllSheets();
});

// Telegram Back Button
if (tg) {
  tg.BackButton.onClick(() => {
    const sheets = ['invoiceSheet','paymentSheet','checkoutSheet','cartSheet'];
    for (const s of sheets) {
      if (document.getElementById(s).classList.contains('show')) { closeSheet(s); return; }
    }
  });
}

renderProducts();
startCountdown();
</script>
